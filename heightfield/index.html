<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Heightfield viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a1a1a; color: #ddd; font-family: system-ui, sans-serif; }
  #info { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,.6);
          padding: 10px 12px; border-radius: 6px; font-size: 13px; line-height: 1.5;
          z-index: 10; max-width: 360px; max-height: calc(100vh - 24px);
          overflow-y: auto; }
  #info b { color: #6cf; }
  #info .info-section { margin-top: 8px; border-top: 1px solid rgba(255,255,255,.08); }
  #info .info-section > summary { cursor: pointer; padding: 6px 0 4px;
          font-weight: 600; color: #6cf; font-size: 12px;
          text-transform: uppercase; letter-spacing: .04em;
          list-style: none; user-select: none; }
  #info .info-section > summary::-webkit-details-marker { display: none; }
  #info .info-section > summary::before {
          content: '▸'; display: inline-block; margin-right: 6px;
          transition: transform .12s; color: #889; font-size: 10px; }
  #info .info-section[open] > summary::before { transform: rotate(90deg); }
  #info .info-controls-hint { margin-top: 10px; padding-top: 8px;
          border-top: 1px solid rgba(255,255,255,.08);
          font-size: 11px; color: #889; }
  #stats { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.6);
           padding: 10px 12px; border-radius: 6px; font-size: 12px; z-index: 10;
           font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
           line-height: 1.4; min-width: 140px; }
  #stats .lbl { color: #889; }
  #stats .val { color: #cfd; }
  canvas { display: block; }
  /* Centred loading overlay shown until first frame renders. CSS-only
     spinner so it works before any JS module loads. */
  #loading { position: fixed; inset: 0; display: flex; flex-direction: column;
             align-items: center; justify-content: center;
             background: rgba(20,22,28,.92); color: #ddd; z-index: 100;
             font-family: system-ui, sans-serif; transition: opacity .4s; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spin { width: 44px; height: 44px; border-radius: 50%;
                   border: 4px solid rgba(108,204,255,.18);
                   border-top-color: #6cf;
                   animation: spin 1s linear infinite; margin-bottom: 16px; }
  #loading .title { font-weight: 600; margin-bottom: 4px; color: #6cf; }
  #loading .stage { font-size: 13px; color: #aaa; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    #loading { transition: none; }
    #info .info-section > summary::before { transition: none; }
    #loading .spin { animation-duration: 3s; }
  }
</style>
</head>
<body>
<div id="loading">
  <div class="spin"></div>
  <div class="title" id="load-title">Načítám…</div>
  <div class="stage" id="load-stage">manifest</div>
</div>
<div id="info">
  <b id="loc-title">Heightfield</b><br>
  <span id="data">načítám…</span>

  <details open class="info-section">
    <summary>Zobrazení</summary>
    <label style="display:block;cursor:pointer;">
      <input id="cad-toggle" type="checkbox"> 🗺 Zobrazit katastr
      <span id="cad-status" style="font-size:11px;color:#9c9;"></span>
    </label>
    <label style="display:block;cursor:pointer;">
      <input id="wire-toggle" type="checkbox"> 🔲 Wireframe (bez ortho)
    </label>
    <label style="display:block;cursor:pointer;">
      <input id="shade-toggle" type="checkbox"> 🎨 Flat shaded (by elevation)
    </label>
    <label style="display:block;cursor:pointer;">
      <input id="bare-toggle" type="checkbox"> 🌳 Skrýt vegetaci & domy (DMR5G)
    </label>
    <label style="display:block;cursor:pointer;">
      <input id="osm-toggle" type="checkbox"> 🌍 OSM místo ortho
    </label>
  </details>

  <details class="info-section">
    <summary>Slunce a stíny</summary>
    <label style="display:block;cursor:pointer;">
      <input id="shadow-toggle" type="checkbox"> 🌑 Sluneční svit a stíny
    </label>
    <div id="sun-controls" style="display:none;font-size:11px;margin:2px 0 0 18px;color:#bbb;">
      <label style="display:block;">Hodina <span id="sun-hour-val">14:00</span>
        <input id="sun-hour" type="range" min="4" max="22" value="14" step="0.25"
               style="width:140px;vertical-align:middle;">
      </label>
      <label style="display:block;">Den v roce <span id="sun-doy-val">172 (21.6.)</span>
        <input id="sun-doy" type="range" min="1" max="365" value="172" step="1"
               style="width:140px;vertical-align:middle;">
      </label>
      <div id="sun-readout" style="color:#888;margin-top:2px;">az 215° / el 45°</div>
    </div>
  </details>

  <details open class="info-section">
    <summary>Parcely a POI</summary>
    <label style="display:block;cursor:pointer;">
      <input id="parcels-toggle" type="checkbox"> 🟦 Označit parcely
      <span id="parcels-count" style="font-size:11px;color:#9c9;"></span>
      <button id="parcels-capture" style="display:none;font-size:12px;padding:8px 14px;
              cursor:pointer;margin-left:8px;background:#1a6a8e;color:#fff;border:0;
              border-radius:4px;font-weight:600;min-height:36px;">📸 Generovat náhledy</button>
    </label>
    <div style="margin-left:18px;font-size:11px;">
      <label style="color:#9c9;">Styl:
        <select id="parcel-style" style="font-size:11px;padding:1px 4px;">
          <option value="auto" selected>Auto (dle podkladu)</option>
          <optgroup label="Obrys parcely">
            <option value="classic">Realitka — světlá</option>
            <option value="hero">Realitka — žlutá výplň</option>
            <option value="neon">Realitka — neonová</option>
            <option value="print">Tisk / dokument</option>
            <option value="cadastre">Jako katastr</option>
          </optgroup>
          <optgroup label="Označení">
            <option value="bare">Obrys skrz vegetaci</option>
            <option value="pin">📍 Špendlík</option>
            <option value="beam">💡 Světelný kužel</option>
            <option value="label">🔢 Pouze číslo parcely</option>
          </optgroup>
        </select>
      </label>
      <button id="parcels-clear" style="display:none;font-size:12px;padding:6px 10px;cursor:pointer;margin-left:8px;min-height:32px;border:1px solid #2a2e36;border-radius:4px;background:#1e2530;color:#e7e9ee;">Zrušit výběr</button>
    </div>
    <label style="display:block;cursor:pointer;margin-top:4px;">
      <input id="poi-toggle" type="checkbox"> 📍 POI v okolí
      <span id="poi-status" style="font-size:11px;color:#9c9;"></span>
    </label>
  </details>

  <details id="ortho-quality" class="info-section" style="display:none;">
    <summary>Ortho kvalita <span id="ortho-quality-status" style="font-size:10px;color:#888;font-weight:400;text-transform:none;letter-spacing:0;"></span></summary>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">
      <button class="oq" data-tier="low"   style="padding:8px 14px;font-size:12px;min-height:40px;cursor:pointer;">Low</button>
      <button class="oq" data-tier="mid"   style="padding:8px 14px;font-size:12px;min-height:40px;cursor:pointer;">Mid</button>
      <button class="oq" data-tier="high"  style="padding:8px 14px;font-size:12px;min-height:40px;cursor:pointer;">High</button>
      <button class="oq" data-tier="ultra" style="padding:8px 14px;font-size:12px;min-height:40px;cursor:pointer;">Ultra</button>
      <button class="oq" data-tier="super" style="padding:8px 14px;font-size:12px;min-height:40px;cursor:pointer;">Super</button>
    </div>
  </details>

  <div style="margin-top:10px;">
    <button id="screenshot-btn" style="padding:10px 16px;font-size:13px;min-height:40px;cursor:pointer;
            background:#1a6a8e;color:#fff;border:0;border-radius:4px;">📸 Screenshot</button>
    <span style="font-size:10px;color:#888;margin-left:6px;">P = klávesa</span>
  </div>
  <div class="info-controls-hint">Drag = orbit · Scroll = zoom · Right-drag = pan · H = skrýt UI</div>
</div>
<div id="stats"></div>

<!-- Parcel capture modal — hidden until 📸 Náhledy spustí orbit capture.
     Grid 4×5 thumbnails with checkboxes; user picks which go to AI. -->
<div id="capture-modal" style="display:none;position:fixed;inset:0;
     background:rgba(8,10,14,0.92);z-index:200;overflow:auto;padding:24px;">
  <div style="max-width:1280px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px;">
      <h2 style="margin:0;font-size:16px;font-weight:600;color:#e7e9ee;flex:1;">
        📸 Náhledy parcely <span id="capture-status" style="color:#9aa0a8;font-weight:400;font-size:13px;margin-left:8px;"></span>
      </h2>
      <button id="capture-select-all" class="cap-btn">Vybrat vše</button>
      <button id="capture-select-none" class="cap-btn">Žádné</button>
      <button id="capture-ai" class="cap-btn cap-btn-primary" disabled>✨ Vylepšit vybrané přes AI (0)</button>
      <button id="capture-zip" class="cap-btn" disabled>📦 Stáhnout vybrané</button>
      <button id="capture-close" class="cap-btn">✕</button>
    </div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;
                color:#9aa0a8;font-size:12px;">
      <label style="display:flex;align-items:center;gap:8px;">
        Vzdálenost:
        <input id="capture-dist-mul" type="range" min="2" max="20" step="1" value="5"
               style="width:200px;">
        <span id="capture-dist-mul-val" style="color:#e7e9ee;font-family:ui-monospace,monospace;
              min-width:28px;text-align:right;">5×</span>
        <span id="capture-dist-meta" style="color:#6b7280;font-size:11px;"></span>
      </label>
      <button id="capture-recapture" class="cap-btn" disabled>↻ Re-capture</button>
    </div>
    <div id="capture-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;"></div>
    <div id="capture-results" style="margin-top:24px;"></div>
  </div>
</div>

<style>
  .cap-btn { background:#1e2530;color:#e7e9ee;border:1px solid #2a2e36;
             border-radius:5px;padding:7px 12px;font-size:12px;cursor:pointer;
             font-family:inherit; }
  .cap-btn:hover { background:#2a3340;border-color:#6cf; }
  .cap-btn-primary { background:#1a6a8e;border-color:#1a6a8e;font-weight:600; }
  .cap-btn-primary:hover { background:#2588b3; }
  .cap-btn:disabled { opacity:0.4;cursor:not-allowed; }
  .cap-thumb { position:relative;border-radius:6px;overflow:hidden;cursor:pointer;
               border:2px solid transparent;background:#000;transition:border-color 0.15s; }
  @media (prefers-reduced-motion: reduce) {
    .cap-thumb { transition: none; }
  }
  .cap-thumb img { width:100%;display:block;aspect-ratio:3/2;object-fit:cover; }
  .cap-thumb.sel { border-color:#6cf; }
  .cap-thumb .badge { position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.7);
                      color:#fff;font-size:10px;padding:2px 6px;border-radius:3px; }
  .cap-thumb .check { position:absolute;top:6px;right:6px;width:22px;height:22px;
                      border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;
                      display:flex;align-items:center;justify-content:center;font-size:14px; }
  .cap-thumb.sel .check { background:#6cf; }
  .cap-thumb .expand { position:absolute;bottom:6px;right:6px;width:24px;height:24px;
                       border-radius:4px;background:rgba(0,0,0,0.7);color:#fff;
                       display:flex;align-items:center;justify-content:center;
                       font-size:14px;cursor:pointer;line-height:1; }
  .cap-thumb .expand:hover { background:#6cf; }
  .cap-result-row { display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;
                    border:1px solid #2a2e36;border-radius:6px;padding:8px;background:#14171f; }
  .cap-result-row img { width:100%;display:block;border-radius:4px; }
  .cap-result-row .lbl { color:#9aa0a8;font-size:11px;margin-bottom:4px; }
  .cap-progress { color:#6cf;font-size:13px;margin-top:8px; }
  .cap-error { color:#e07866;font-size:12px;margin-top:4px; }
</style>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
// LERC: Esri's elevation codec, decoded in browser via ~200 KB WASM. Used
// when ring.heightmap_format === 'lerc' in manifest (gen with --format lerc).
// Namespace import (the package has no default export — load/decode are
// named exports). `await Lerc.load()` initialises the WASM blob once.
import * as Lerc from 'https://cdn.jsdelivr.net/npm/lerc@4/+esm';

// Surface uncaught module-level errors in the loading overlay so the page
// never looks "stuck at spinner". Top-level await rejects bubble here.
window.addEventListener('error', (e) => {
  const el = document.getElementById('loading');
  if (!el || el.classList.contains('hidden')) return;
  el.innerHTML = `<div style="color:#f88;max-width:520px;text-align:center;
    padding:20px;line-height:1.5;font-family:system-ui;">
    <div style="font-size:24px;margin-bottom:12px;">⚠</div>
    <div><b>JS chyba při načítání</b></div>
    <div style="margin-top:8px;font-size:12px;color:#ccc;
                font-family:monospace;word-break:break-word;">${e.message}</div>
    <div style="margin-top:6px;font-size:11px;color:#888;">${e.filename}:${e.lineno}</div>
    </div>`;
});
window.addEventListener('unhandledrejection', (e) => {
  const msg = e.reason?.message || String(e.reason);
  const el = document.getElementById('loading');
  if (!el || el.classList.contains('hidden')) return;
  el.innerHTML = `<div style="color:#f88;max-width:520px;text-align:center;
    padding:20px;line-height:1.5;font-family:system-ui;">
    <div style="font-size:24px;margin-bottom:12px;">⚠</div>
    <div><b>Async chyba</b></div>
    <div style="margin-top:8px;font-size:12px;color:#ccc;
                font-family:monospace;word-break:break-word;">${msg}</div></div>`;
});

// ── Resolve location via ?slug= parameter ──
// Viewer lives at /heightfield/?slug=hrensko and fetches per-location data
// from /tiles_v2_<slug>/heightfield/. Relative asset paths in the manifest
// (heightmap_file, ortho_file, …) resolve against the slug's heightfield/
// directory, so we rebuild URLs by prefixing assetBase.
const urlParams = new URLSearchParams(location.search);
const slug = urlParams.get('slug');
if (!slug) {
  document.body.innerHTML =
    '<div style="color:#fff;padding:24px;font-family:sans-serif">' +
    '<h2>Missing <code>?slug=</code> parameter</h2>' +
    '<p>Example: <a href="?slug=hrensko">?slug=hrensko</a></p></div>';
  throw new Error('no slug');
}
const assetBase = `/tiles_v2_${slug}/heightfield/`;
const asset = (p) => assetBase + p;
document.getElementById('loc-title').textContent = `Heightfield · ${slug}`;
document.title = `Heightfield · ${slug}`;
const loadStage = document.getElementById('load-stage');
const loadTitle = document.getElementById('load-title');
loadTitle.textContent = `Načítám ${slug}…`;
const setStage = (msg) => { if (loadStage) loadStage.textContent = msg; };
const hideLoader = () => {
  const el = document.getElementById('loading');
  if (el) el.classList.add('hidden');
  setTimeout(() => { if (el) el.remove(); }, 500);
};
// Cache-bust manifest so re-encode (new tiers, formats) is picked up on
// refresh without Cmd+Shift+R / DevTools hard reload.
const manifest = await fetch(asset('manifest.json') + '?t=' + Date.now())
  .then(r => { if (!r.ok) throw new Error(`manifest ${r.status} at ${r.url}`); return r.json(); });
console.info('[manifest]', manifest.rings.map(r => ({
  slug: r.slug, format: r.heightmap_format, tiers: Object.keys(r.ortho_tiers || {}),
})));
const { cx, cy, rings, y_min: globalYmin, y_max: globalYmax } = manifest;
const yMid = (globalYmin + globalYmax) / 2;

// Debug bypass: ?nobare=1 skips loading the bare-earth heightmap (and the
// toggle), useful when DMR5G fetch failed or the second texture is
// suspected of breaking the load.
const URL_PARAMS = new URLSearchParams(location.search);
const SKIP_BARE = URL_PARAMS.get('nobare') === '1';
// Override KTX2 ortho UV flip from URL while we diagnose orientation.
// ?ktx2flip=0  → no extra flip
// ?ktx2flip=1  → flip Y (vertical mirror)
// ?ktx2flip=2  → flip X (horizontal mirror)
// ?ktx2flip=3  → flip both (180° rotation)
const _KTX2_FLIP = parseInt(URL_PARAMS.get('ktx2flip') ?? '0', 10);
// Cadastre KTX2 orientation: empirically identical to source PNG and to
// ortho KTX2 (verified by `basisu -unpack` + spatial-density check —
// top/bot and left/right alpha ratios match within 0.05). Default 0 =
// no flip, same as ortho. Override with ?cadflip=1/2/3 only for debug.
const _CAD_FLIP = parseInt(URL_PARAMS.get('cadflip') ?? '0', 10);
// Bypass postprocess (no parcel glow). For comparing ortho colours
// against the pre-bloom direct-render baseline.
const _NO_BLOOM = URL_PARAMS.get('nobloom') === '1';

console.log('manifest:', manifest);

// ── Loading progress tracker ──
// Per-asset byte counters (downloaded + total expected). LERC files don't
// carry size in the manifest, so we discover bytes via Content-Length on
// first response and accumulate as fetches complete. Ortho sizes are known
// up-front from manifest.ortho_tiers[mid].webp_kb.
const loadStats = {
  bytesDone: 0,
  bytesTotal: 0,   // grows as assets register; initial estimate from manifest ortho sizes
  filesDone: 0,
  filesTotal: 0,
};
function bumpProgress(bytes) {
  loadStats.bytesDone += bytes;
  loadStats.filesDone += 1;
  renderProgress();
}
function renderProgress() {
  const mb = (b) => (b / 1048576).toFixed(1);
  const pct = loadStats.bytesTotal
    ? Math.min(100, Math.round(100 * loadStats.bytesDone / loadStats.bytesTotal))
    : 0;
  setStage(
    `${loadStats.filesDone}/${loadStats.filesTotal} souborů · ` +
    `${mb(loadStats.bytesDone)} / ${mb(loadStats.bytesTotal)} MB · ${pct}%`
  );
}
// Pre-register expected assets so the totals aren't a moving target.
// Per ring: heightmap LERC + bare LERC + 1 ortho (mid tier default).
// LERC sizes aren't in the manifest, so we use a per-cell heuristic
// (~0.8 bytes/cell empirically for 10cm tolerance) — fetch then corrects
// the total to the real byte count as each LERC arrives.
for (const r of manifest.rings) {
  loadStats.filesTotal += 3;
  const lercEstimate = r.heightmap_size * r.heightmap_size * 0.8;
  loadStats.bytesTotal += 2 * lercEstimate;          // heightmap + bare
  const t = r.ortho_tiers?.[r.ortho_default || 'mid'];
  if (t) {
    // Prefer WebP size when the browser will pick WebP (detected later);
    // for the initial estimate we assume yes (modern browser).
    loadStats.bytesTotal += (t.webp_kb || t.kb || 0) * 1024;
  }
}
renderProgress();

// ── Scene setup ──
// preserveDrawingBuffer: true is required for `renderer.domElement.toBlob()`
// to capture the last frame. But it bumps memory per WebGL context and
// browsers limit total contexts per origin (~16 on Chrome). If we hit
// that ceiling (many viewer tabs open at once) WebGLRenderer throws
// "Error creating WebGL context". Fall back to a context WITHOUT
// preserveDrawingBuffer — screenshots lose precision (last-frame
// re-render) but the page boots and the 3D view works.
let renderer;
let _screenshotCapable = true;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
} catch (e) {
  console.warn('[renderer] preserveDrawingBuffer create failed; retrying without:', e);
  try {
    renderer = new THREE.WebGLRenderer({ antialias: true });
    _screenshotCapable = false;
  } catch (e2) {
    // Both attempts failed — likely the WebGL context budget is fully
    // spent. Tell the user explicitly instead of silently rendering
    // a black canvas.
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;inset:0;background:#1a0a0a;color:#ffaa88;' +
      'display:flex;align-items:center;justify-content:center;text-align:center;' +
      'font-family:system-ui;padding:24px;z-index:9999;font-size:16px;';
    banner.innerHTML = '<div>⚠ WebGL context se nepodařilo vytvořit.<br><br>' +
      'Pravděpodobně máš příliš mnoho otevřených záložek s 3D viewerem ' +
      '(prohlížeč povoluje ~16 najednou).<br><br>' +
      'Zavři ostatní heightfield taby a obnov stránku.</div>';
    document.body.appendChild(banner);
    throw e2;
  }
}
// On Retina (devicePixelRatio=2) the fragment shader runs 4× more pixels
// per frame than native res. Cap at 1.5 to claw back ~30 % per-frame
// cost; text/labels on ortho stay readable and the parcel tubes only
// look marginally softer. `?hires=1` URL param restores full DPR for
// crisp screenshots.
const _HIRES = new URLSearchParams(location.search).get('hires') === '1';
renderer.setPixelRatio(_HIRES ? devicePixelRatio : Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 1×1 white texture used as default uShadowMap so the shadow toggle stays
// visually inert until the precomputed shadow map is baked. Without this,
// the sampler defaults to null and we'd briefly read garbage.
{
  const px = new Uint8Array([255]);
  const tex = new THREE.DataTexture(px, 1, 1, THREE.RedFormat, THREE.UnsignedByteType);
  tex.needsUpdate = true;
  window._heightfieldDefaultShadowTex = tex;
}

const scene = new THREE.Scene();
// HDR sky with real clouds (kloofendal_48d_partly_cloudy_puresky from
// Polyhaven, ~5.5 MB, CC0). Loaded async — placeholder solid sky shows
// while it streams. Equirectangular mapping = full 360° dome wrapped on
// the inside of an infinite sphere when used as scene.background.
const SKY_HAZE = 0xb8c8d8;       // horizon haze colour, matches HDR's lower band
scene.background = new THREE.Color(SKY_HAZE);
new RGBELoader().load('/sky_cloudy.hdr', (tex) => {
  tex.mapping = THREE.EquirectangularReflectionMapping;
  scene.background = tex;
}, undefined, (err) => {
  console.warn('sky HDR load failed, keeping solid background:', err);
});

// Exp2 fog masks the abrupt boundary between outermost ring edge and
// open sky. Density tuned so the 3 km closeup ring at its corner
// (distance ~2.1 km) stays at ~70% opacity, while anything at >10 km
// fades fully to the haze colour. 0xb8c8d8 matches the HDR's horizon hue.
scene.fog = new THREE.FogExp2(SKY_HAZE, 0.00012);

// Sun direction in scene coords. Y = up, +Z = south, +X = east in our
// SJTSK-aligned PlaneGeometry layout. South-elevated midday sun gives the
// most legible relief on Czech terrain (north-facing slopes shaded, south
// slopes lit — matches photo intuition).
const SUN_EL = 45, SUN_AZ = 215;   // 45° elevation, SSW (geographic bearing)
const sunPolar = THREE.MathUtils.degToRad(90 - SUN_EL);
// Compass azimuth (0°=N, clockwise) → Three.js spherical theta. In our
// PlaneGeometry layout +Z = south, +X = east, so theta=0 points to +Z
// (=south, compass 180°). To rotate from compass to theta we map
// theta = 180° - bearing. Without this conversion, az=215° landed the sun
// in the NNW quadrant and flipped the hillshade — north slopes lit, south
// shaded — opposite of photo intuition.
const sunAz = THREE.MathUtils.degToRad(180 - SUN_AZ);
// Standard spherical → cartesian, then normalised. The uniform must point
// FROM surface TOWARD sun for the Lambert dot product to give correct sign.
window._heightfieldSunDir = new THREE.Vector3(
  Math.sin(sunPolar) * Math.sin(sunAz),
  Math.cos(sunPolar),
  Math.sin(sunPolar) * Math.cos(sunAz),
).normalize();

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 20000);
// Frame on the largest ring (first in array — outer→inner convention),
// height-mid camera target. Default rings can change (e.g. dropping outer
// for a 2-ring 3km/1km setup), so don't hardcode the slug.
const widestSide = rings[0].side_m;
camera.position.set(widestSide * 0.3, widestSide * 0.5, widestSide * 0.5);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();
controls.enableDamping = true;
// Damping = inertia after the user lets go of the mouse. 0.1 ≈ glides for
// ~½ sec on a typical pan/orbit gesture — long enough to feel smooth,
// short enough that double-clicks don't get swallowed by an ongoing glide.
controls.dampingFactor = 0.1;

// Zoom + tilt limits. Without these the user can wheel-out to infinity
// (where the heightfield is a postage stamp), zoom into the terrain mesh,
// or orbit below the ground plane and see the back of the geometry.
// Bounds are derived from the outermost ring half so the limits scale
// with whatever rings the manifest carries.
const _outerHalf = Math.max(...rings.map(r => r.half));   // m, biggest ring
controls.minDistance = 30;                   // 30 m — close enough for roof detail
controls.maxDistance = _outerHalf * 4;       // 4× outer half ≈ ring fills ~25% of screen at fully zoomed-out
// Stop just shy of horizontal so the user can't dip below the terrain
// (where backface culling would show black or the orthophoto from below).
// 88° leaves a tiny margin so the camera doesn't get stuck flat at the
// equator (where azimuth orbit becomes ambiguous).
controls.maxPolarAngle = Math.PI / 2 - 0.04;  // ~88°

// Adaptive DPR: drop to 1.0 during user interaction, restore the configured
// pixel ratio when idle. Heavy fragment shader (hillshade + cast shadow +
// composer) means a 1.5×1.5 = 2.25× per-pixel cost — halving area during
// drag gives a 50-60 % FPS boost on Retina without affecting the still
// frames the user actually reads. Damping inertia frames count as idle
// (controls 'end' fires when damping settles, not on mouseup).
const _DPR_IDLE = _HIRES ? devicePixelRatio : Math.min(devicePixelRatio, 1.5);
const _DPR_DRAG = 1.0;
let _idleDprT = null;
function setDpr(dpr) {
  if (Math.abs(renderer.getPixelRatio() - dpr) < 0.01) return;
  renderer.setPixelRatio(dpr);
  // Composers cache pixel ratio at create time but `setSize` re-applies it
  // via the renderer.
  bloomComposer?.setPixelRatio(dpr);
  finalComposer?.setPixelRatio(dpr);
  bloomComposer?.setSize(innerWidth, innerHeight);
  finalComposer?.setSize(innerWidth, innerHeight);
}
controls.addEventListener('start', () => {
  if (_idleDprT) { clearTimeout(_idleDprT); _idleDprT = null; }
  setDpr(_DPR_DRAG);
});
controls.addEventListener('end', () => {
  // Tiny grace period so quick orbit jiggles don't trigger a re-render at
  // full DPR right before another drag starts.
  _idleDprT = setTimeout(() => { setDpr(_DPR_IDLE); _idleDprT = null; }, 150);
});

// ── Load all ring textures in parallel ──
const texLoader = new THREE.TextureLoader();
texLoader.setCrossOrigin('anonymous');   // explicit; needed for cross-port fetch
// KTX2 (ETC1S → BC1/ETC2/ASTC at runtime). detectSupport is async-required
// before first load; we kick it off here and gate first ortho fetch on it.
// Transcoder WASM (~250 KB) loads on first .ktx2 file, not at page load.
const ktx2Loader = new KTX2Loader()
  .setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/basis/')
  .detectSupport(renderer);
// loadTex wraps THREE.TextureLoader's onLoad into a Promise. We also fetch
// the URL with a HEAD-equivalent pre-check via the resource timing API so
// loadStats can count actual transferred bytes after the texture finishes.
const loadTex = (path) => new Promise((res, rej) => {
  // Route .ktx2 through KTX2Loader (transcodes to BC1/ETC2/ASTC for the
  // active GPU). Everything else (jpg, webp, png) goes through the
  // standard image loader so its own decode pipeline runs.
  const loader = path.endsWith('.ktx2') ? ktx2Loader : texLoader;
  loader.load(
    path,
    (tex) => {
      const entry = performance.getEntriesByName(path).pop();
      const bytes = entry?.encodedBodySize || entry?.transferSize || 0;
      bumpProgress(bytes);
      res(tex);
    },
    undefined, rej,
  );
});

// WebP support detection (one-shot). Resolves before any ortho fetch is
// scheduled, so picker calls never race the check.
const webpSupport = new Promise(resolve => {
  const probe = new Image();
  probe.onload = () => resolve(probe.width > 0 && probe.height > 0);
  probe.onerror = () => resolve(false);
  // 1×1 lossy WebP probe — works on all modern engines, fails on legacy.
  probe.src = 'data:image/webp;base64,UklGRiIAAABXRUJQVlA4IBYAAAAwAQCdASoBAAEADsD+JaQAA3AAAAAA';
});
let _canWebP = false;
webpSupport.then(v => { _canWebP = v; console.log('WebP support:', v); });
// Picker: prefer KTX2 (4–6× less VRAM via GPU-side compression), then
// WebP, then JPEG. `tierEntry` is r.ortho_tiers[name], with .file (jpg),
// optional .webp_file, optional .ktx2_file. Returns an absolute URL.
const pickTierUrl = (tierEntry) => {
  if (tierEntry.ktx2_file) return asset(tierEntry.ktx2_file);
  if (_canWebP && tierEntry.webp_file) return asset(tierEntry.webp_file);
  return asset(tierEntry.file);
};
// Legacy entry point: `r.ortho_file` is a flat JPEG copy of the default tier.
// If tiers are present, route to the picker on the default tier instead.
const pickOrthoUrl = (r) => {
  if (r.ortho_tiers && r.ortho_default) {
    const d = r.ortho_tiers[r.ortho_default];
    if (d) return pickTierUrl(d);
  }
  return asset(r.ortho_file);
};

const ringMeshes = [];
const ringData = {};   // slug → { heightData, n, y_min, y_max, side_m }

// Initialize LERC WASM (once, ~200 KB cached). If no ring uses LERC the
// shim still loads but stays idle. Calling load() multiple times is a no-op.
let lercReady = false;
async function ensureLerc() {
  if (lercReady) return;
  await Lerc.load();
  lercReady = true;
}

// Unified heightmap loader → Float32 DataTexture + CPU Float32Array.
//   PNG (16-bit RG-encoded): decode in JS → Float32
//   LERC: WASM decode → Float32 directly
// Both paths produce identical GPU + CPU representations so the shader is
// single-path (`texture2D(uHeight, uv).r` = absolute Y metres).
async function loadHeightmapData(url, fmt, n, y_min, y_max) {
  if (fmt === 'lerc') {
    await ensureLerc();
    const buf = await fetch(url).then(r => r.arrayBuffer());
    // LERC actual size — correct the running total so estimate-vs-real
    // drift doesn't show as >100 %. We pre-estimated 0.8 B/cell; the diff
    // gets folded into bytesTotal before counting the file as done.
    const fname = url.split('/').pop();
    const ring = manifest.rings.find(r => fname.startsWith(r.slug));
    const estimate = ring ? ring.heightmap_size * ring.heightmap_size * 0.8 : 0;
    loadStats.bytesTotal += buf.byteLength - estimate;
    bumpProgress(buf.byteLength);
    const result = Lerc.decode(new Uint8Array(buf));
    return { data: new Float32Array(result.pixels[0]), n: result.width };
  }
  // PNG path: existing 16-bit RG decode.
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = n;
  const ctx = canvas.getContext('2d');
  await new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { ctx.drawImage(img, 0, 0); res(); };
    img.onerror = rej;
    img.src = url;
  });
  const rgba = ctx.getImageData(0, 0, n, n).data;
  const data = new Float32Array(n * n);
  for (let j = 0, k = 0; j < rgba.length; j += 4, k++) {
    const h16 = (rgba[j] * 256 + rgba[j + 1]) / 65535;
    data[k] = y_min + h16 * (y_max - y_min);
  }
  return { data, n };
}

function makeHeightTexture(data, n) {
  const tex = new THREE.DataTexture(data, n, n, THREE.RedFormat, THREE.FloatType);
  tex.minFilter = tex.magFilter = THREE.LinearFilter;
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.flipY = false;
  tex.needsUpdate = true;
  return tex;
}

// Shared 1×1 unit PlaneGeometry — every ring uses the SAME vertex/index
// buffer and gets its world size via `mesh.scale`. Saves ~⅔ of GPU upload
// vs. per-ring PlaneGeometry.
//
// Subdivision below the heightmap resolution (2001²) is fine: the vertex
// shader does bilinear sampling of the heightmap, so sub-vertex detail
// comes from the texture, not from extra geometry. 1024² already gives
// ~3 m per vertex on the closeup ring and ~1 m on the inner ring — well
// below visible precision at typical view distance. At 2048 a single
// shared PlaneGeometry pinned ~235 MB of JS heap (position/uv/normal/
// index buffers); 1024 drops that to ~60 MB.
// Raise to 2048 only when geometric LOD (not heightmap detail) starts
// limiting the silhouette of sharp ridges; on flat-to-rolling terrain
// it's pure overhead.
const GEO_SUBDIVS = 1024;
const sharedGeo = new THREE.PlaneGeometry(1, 1, GEO_SUBDIVS, GEO_SUBDIVS);
sharedGeo.rotateX(-Math.PI / 2);
// Drop the auto-generated normal attribute (-12 MB JS heap, -12 MB GPU
// upload). Our fragment shader reconstructs the normal per-pixel from
// heightmap gradients (`sampleNormal()` — 4 texture taps), so the
// per-vertex normal Three.js generates is never read. If you ever swap
// in a material that DOES read `attribute vec3 normal` (e.g. MeshStandard
// for PBR), regenerate it via sharedGeo.computeVertexNormals() first.
sharedGeo.deleteAttribute('normal');

// Surface the load failure in the UI rather than hanging at "načítám…".
function fatalLoadError(msg) {
  document.getElementById('data').innerHTML =
    `<span style="color:#f88;">⚠ ${msg}</span><br>` +
    `Zkontroluj <code>manifest.json</code> a per-ring PNG/JPG soubory.`;
  // Replace loading overlay with the error so the user sees something
  // actionable instead of an indefinite spinner.
  const el = document.getElementById('loading');
  if (el) {
    el.innerHTML = `<div style="color:#f88;max-width:480px;text-align:center;
      padding:20px;line-height:1.5;">
      <div style="font-size:24px;margin-bottom:12px;">⚠</div>
      <div><b>Načítání selhalo</b></div>
      <div style="margin-top:8px;font-size:13px;color:#ccc;">${msg}</div></div>`;
  }
  throw new Error(msg);
}

// Build outer→inner so smaller rings render LAST (higher renderOrder).
// Each smaller ring "carves a hole" in the larger one via a clipBox
// shader uniform, identical to inzerator's approach. Without that, the
// outer ring's coarser heightmap shows through under the inner ring at
// LOD seams (z-fight + sub-pixel cracks).
setStage(`načítám textury (${rings.length} ringů)…`);
// Lazy bare-earth (DMR5G) state. Populated during ring setup so we can
// fetch the bare LERC files later without re-deriving paths from manifest.
const bareLoadInfo = new Array(rings.length).fill(null);
const bareLoadedTex = {};   // slug → THREE.DataTexture
let bareLoadInFlight = null;
for (let i = 0; i < rings.length; i++) {
  const r = rings[i];
  const hmFmt = r.heightmap_format || 'png';
  console.info(`[ring ${r.slug}] loading (heightmap=${hmFmt})…`);
  let heightTex, orthoTex, bareTex, heightData;
  try {
    // Heightmap + ortho. Bare-earth (DMR5G) heightmap is deferred —
    // most users never enable the 🌳 toggle, so paying ~16 MB/ring (Float32
    // at 2000² = 16 MB) up front is waste. We record the info needed to
    // fetch it later (see bareLoadInfo + ensureBareLoaded below).
    const heightP = loadHeightmapData(asset(r.heightmap_file), hmFmt,
      r.heightmap_size, r.y_min, r.y_max);
    await webpSupport;
    const orthoP = loadTex(pickOrthoUrl(r));
    const [heightRes, ortho] = await Promise.all([heightP, orthoP]);
    heightTex = makeHeightTexture(heightRes.data, heightRes.n);
    heightData = heightRes.data;     // shared with CPU sampleHeight below
    orthoTex = ortho;
    bareTex = null;   // populated on first bare-toggle click
    if (r.bare_file && !SKIP_BARE) {
      bareLoadInfo[i] = {
        url: asset(r.bare_file),
        fmt: hmFmt,
        size: r.heightmap_size,
        y_min: r.y_min,
        y_max: r.y_max,
      };
    }
  } catch (e) {
    fatalLoadError(`Ring '${r.slug}' textures failed: ${e?.message || e}`);
  }

  // Ortho colorSpace: SRGBColorSpace so three.js decodes the sRGB-encoded
  // JPEG/KTX2 to linear when sampled — required for the composer pipeline
  // (RenderPass → linear target → OutputPass converts back to sRGB on
  // canvas write). With NoColorSpace the sRGB-encoded photo data went
  // through OutputPass as if it were linear, producing visibly over-bright
  // orthos.
  orthoTex.colorSpace = THREE.SRGBColorSpace;
  orthoTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  orthoTex.flipY = false;

  // Smaller (next) ring's footprint for clipBox carve-out.
  const smaller = rings[i + 1];
  const clipBox = smaller ? new THREE.Vector4(
    -smaller.half, -smaller.half, smaller.half, smaller.half,
  ) : null;

  // Clone fog uniforms per material (fogColor/Density/Near/Far). Required
  // by `fog: true` below — three.js' refreshFogUniforms reads .value off
  // each. Plain UniformsUtils.merge would also clone our textures, so we
  // clone fog separately and spread our texture uniforms as references.
  const fogUniforms = THREE.UniformsUtils.clone(THREE.UniformsLib.fog);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      ...fogUniforms,
      uHeight:    { value: heightTex },
      uHeightBare:{ value: bareTex || heightTex },   // fallback = SM5 so blend is no-op when bare missing
      uBareMode:  { value: 0.0 },      // 0 = DSM (with buildings/trees), 1 = bare earth (DMR5G)
      uOrtho:     { value: orthoTex },
      // Compressed textures (KTX2 → BC1/ETC2/ASTC) cannot be flipped at
      // upload time the way regular images can (WebGL ignores
      // UNPACK_FLIP_Y_WEBGL for compressed paths). So a KTX2 encoded in
      // image-native order (row 0 = top) ends up vertically mirrored
      // relative to a JPG loaded with flipY=false. Compensate by flipping
      // the ortho UV in the fragment shader when the active texture is
      // KTX2; flag is set per-texture on assignment.
      uOrthoFlipY:{ value: orthoTex.isCompressedTexture ? (_KTX2_FLIP & 1) : 0.0 },
      uOrthoFlipX:{ value: orthoTex.isCompressedTexture ? ((_KTX2_FLIP >> 1) & 1) : 0.0 },
      uCadastre:  { value: null },     // populated when cadastre toggle on
      uCadEnabled:{ value: 0.0 },
      uCadFlipY:  { value: 0.0 },      // 1.0 when uCadastre is KTX2 (compressed → flip V)
      uCadFlipX:  { value: 0.0 },      // optional horizontal mirror (debug ?cadflip=2/3)
      uShadeMode: { value: 0.0 },      // 0 = ortho, 1 = flat shade by elevation
      uShadeYMin: { value: globalYmin },   // ramp uses global Y range for cross-ring consistency
      uShadeYMax: { value: globalYmax },
      uHeightMin: { value: r.y_min },
      uHeightMax: { value: r.y_max },
      uYBase:     { value: yMid },     // shared baseline so rings line up
      uClipBox:   { value: clipBox || new THREE.Vector4(0,0,0,0) },
      uClipEnabled: { value: clipBox ? 1.0 : 0.0 },
      // Hillshade: runtime sun lighting derived from heightmap derivatives.
      // uHmTexel = 1/heightmap_size, uHmStep = step in meters per texel.
      // Together they let the shader convert sampled height deltas into
      // a 3D normal in scene coords, then Lambert against uSunDir.
      uHmTexel:   { value: 1.0 / r.heightmap_size },
      uHmStep:    { value: r.step },
      uRingHalf:  { value: r.half },       // ring extent in metres, for shadow ray clipping
      uSunDir:    { value: window._heightfieldSunDir },  // shared across all rings (set below)
      uHillshade: { value: 0.0 },        // 0 = off (plain ortho), 1 = on
      uShadows:   { value: 0.0 },        // 0 = lambert only, 1 = + cast shadows
      // Precomputed shadow texture (baked GPU pass — see bakeShadowMaps).
      // Default: 1×1 white = "fully lit" so toggling shadows before bake
      // completes doesn't blacken everything. Replaced by render-target
      // texture once bake finishes.
      uShadowMap: { value: window._heightfieldDefaultShadowTex },
      uAmbient:   { value: 0.55 },        // base lighting on shadow side
      uDiffuse:   { value: 0.45 },        // sun-facing slope brightness boost
    },
    vertexShader: `
      #include <fog_pars_vertex>
      uniform sampler2D uHeight;
      uniform sampler2D uHeightBare;
      uniform float uBareMode;
      uniform float uYBase;
      varying vec2 vUv;
      varying vec3 vWorldPos;
      varying float vAbsY;
      void main() {
        // PlaneGeometry uv: v=0 at scene_z=+half (south), v=1 at scene_z=-half
        // (north). Heightmap row 0 = north (rasterio bounds yield ymax-first
        // row). Flip v so sampler reads correct row.
        vec2 hmUv = vec2(uv.x, 1.0 - uv.y);
        // DSM (SM5) carries surface elevation (terrain + buildings + trees).
        // bare (DMR5G) carries ground-only. Both are Float32 DataTextures
        // (decoded in JS from PNG-RG or LERC) so .r = absolute Y in metres.
        float dsmY  = texture2D(uHeight,     hmUv).r;
        float bareY = texture2D(uHeightBare, hmUv).r;
        float absY  = mix(dsmY, bareY, uBareMode);
        vec3 pos = position;
        pos.y = absY - uYBase;
        vUv = vec2(uv.x, 1.0 - uv.y);
        vAbsY = absY;
        vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        #include <fog_vertex>
      }
    `,
    fragmentShader: `
      #include <fog_pars_fragment>
      uniform sampler2D uOrtho;
      uniform sampler2D uCadastre;
      uniform sampler2D uHeight;
      uniform sampler2D uHeightBare;
      uniform float uBareMode;
      uniform float uCadEnabled;
      uniform float uCadFlipY;
      uniform float uCadFlipX;
      uniform float uShadeMode;
      uniform float uShadeYMin;
      uniform float uShadeYMax;
      uniform vec4 uClipBox;
      uniform float uClipEnabled;
      uniform float uHmTexel;
      uniform float uHmStep;
      uniform float uRingHalf;
      uniform vec3 uSunDir;
      uniform float uHillshade;
      uniform float uShadows;
      uniform sampler2D uShadowMap;
      uniform float uOrthoFlipY;
      uniform float uOrthoFlipX;
      uniform float uAmbient;
      uniform float uDiffuse;
      uniform float uYBase;
      varying vec2 vUv;
      varying vec3 vWorldPos;
      varying float vAbsY;

      // Reconstruct surface normal from heightmap by sampling 4 neighbours.
      // vUv is already in heightmap UV space (Y-flipped in vertex shader).
      // dxMeters = world-space distance between neighbour taps (2 × step).
      // Normal points up, with X/Z components proportional to local slope.
      vec3 sampleNormal() {
        float t = uHmTexel;
        vec2 uvL = vUv + vec2(-t, 0.0);
        vec2 uvR = vUv + vec2( t, 0.0);
        vec2 uvU = vUv + vec2(0.0, -t);
        vec2 uvD = vUv + vec2(0.0,  t);
        // Mix DSM ↔ bare to match the vertex shader's height pick.
        float hL = mix(texture2D(uHeight, uvL).r, texture2D(uHeightBare, uvL).r, uBareMode);
        float hR = mix(texture2D(uHeight, uvR).r, texture2D(uHeightBare, uvR).r, uBareMode);
        float hU = mix(texture2D(uHeight, uvU).r, texture2D(uHeightBare, uvU).r, uBareMode);
        float hD = mix(texture2D(uHeight, uvD).r, texture2D(uHeightBare, uvD).r, uBareMode);
        float dxMeters = 2.0 * uHmStep;
        // Note vUv.y is flipped relative to scene Z: increase in v = decrease
        // in z. The minus reflects that so the normal's Z component points
        // the right way for a sun coming from positive Z (south).
        return normalize(vec3(hL - hR, dxMeters, -(hU - hD)));
      }

      // Sample heightmap at world XZ — converts scene coords to ring UV,
      // returns absolute elevation (mixed DSM/bare per uBareMode). Returns
      // -1e9 when outside ring (caller treats as "no occluder data").
      float sampleHeightAtWorld(vec2 worldXZ) {
        // Ring is centred on (0,0,0), extends ±uRingHalf in X and Z.
        if (abs(worldXZ.x) > uRingHalf || abs(worldXZ.y) > uRingHalf) {
          return -1.0e9;
        }
        vec2 huv;
        huv.x = (worldXZ.x / (2.0 * uRingHalf)) + 0.5;
        // World Z maps to UV Y the same way the vertex shader flips it.
        huv.y = (worldXZ.y / (2.0 * uRingHalf)) + 0.5;
        float h;
        if (uBareMode > 0.5) {
          h = texture2D(uHeightBare, huv).r;
        } else {
          h = texture2D(uHeight, huv).r;
        }
        return h;
      }

      // Sample precomputed shadow map. uShadowMap is generated once via a
      // GPU render-to-texture pass (bakeShadowMaps in JS) that runs the
      // 20-tap raymarch per heightmap pixel. Runtime cost drops from
      // ~20 texture fetches/fragment to 1. Bilinear filter softens edges.
      float castShadow() {
        return texture2D(uShadowMap, vUv).r;
      }

      // Viridis colormap approximation (Matplotlib's perceptually-uniform
      // ramp). Input t in [0,1]; output RGB. 5-point piecewise polynomial
      // fit is good enough for terrain visualization.
      vec3 viridis(float t) {
        t = clamp(t, 0.0, 1.0);
        vec3 c0 = vec3(0.267, 0.005, 0.329);     // dark purple — low
        vec3 c1 = vec3(0.282, 0.140, 0.457);
        vec3 c2 = vec3(0.254, 0.265, 0.530);
        vec3 c3 = vec3(0.207, 0.372, 0.553);
        vec3 c4 = vec3(0.164, 0.471, 0.558);
        vec3 c5 = vec3(0.128, 0.567, 0.551);
        vec3 c6 = vec3(0.135, 0.659, 0.518);
        vec3 c7 = vec3(0.267, 0.749, 0.441);
        vec3 c8 = vec3(0.478, 0.821, 0.318);
        vec3 c9 = vec3(0.741, 0.873, 0.150);
        vec3 c10 = vec3(0.993, 0.906, 0.144);    // bright yellow — high
        float idx = t * 10.0;
        int i = int(floor(idx));
        float f = fract(idx);
        if (i == 0) return mix(c0, c1, f);
        if (i == 1) return mix(c1, c2, f);
        if (i == 2) return mix(c2, c3, f);
        if (i == 3) return mix(c3, c4, f);
        if (i == 4) return mix(c4, c5, f);
        if (i == 5) return mix(c5, c6, f);
        if (i == 6) return mix(c6, c7, f);
        if (i == 7) return mix(c7, c8, f);
        if (i == 8) return mix(c8, c9, f);
        return mix(c9, c10, f);
      }

      void main() {
        if (uClipEnabled > 0.5 &&
            vWorldPos.x > uClipBox.x && vWorldPos.x < uClipBox.z &&
            vWorldPos.z > uClipBox.y && vWorldPos.z < uClipBox.w) discard;
        vec3 col;
        if (uShadeMode > 0.5) {
          // Flat-shaded by elevation. Map absolute Y to [0,1] over the
          // global Y range so all rings share the same colour calibration.
          float t = (vAbsY - uShadeYMin) / max(uShadeYMax - uShadeYMin, 1.0);
          col = viridis(t);
        } else {
          vec2 orthoUv = vUv;
          if (uOrthoFlipY > 0.5) orthoUv.y = 1.0 - orthoUv.y;
          if (uOrthoFlipX > 0.5) orthoUv.x = 1.0 - orthoUv.x;
          col = texture2D(uOrtho, orthoUv).rgb;
          if (uCadEnabled > 0.5) {
            // White-line cadastre overlay: alpha from WMS is the parcel-line
            // mask (transparent everywhere else); we substitute pure white
            // for the RGB so lines/numbers stay readable on both dark forest
            // and bright field backgrounds. ČÚZK's default line colour is a
            // dark blue/red that vanishes against shaded slopes.
            // R-channel of an alpha-only R8 texture (see loadCadastreAlphaTex
            // — we extract PNG alpha into a single-channel DataTexture to
            // save 4× GPU memory). Semantics unchanged: full mask = white.
            vec2 cadUv = vec2(
              mix(vUv.x, 1.0 - vUv.x, uCadFlipX),
              mix(vUv.y, 1.0 - vUv.y, uCadFlipY)
            );

            col = mix(col, vec3(1.0), cadA);
          }
          // Hillshade — runtime sun lighting from heightmap derivatives.
          // Optionally combined with ray-marched cast shadows (heavier,
          // ~20 texture taps/pixel, but adds real occlusion from cliffs
          // and buildings). Both gated on uHillshade so flat-shaded mode
          // (viridis) stays untouched.
          if (uHillshade > 0.5) {
            vec3 n = sampleNormal();
            float lambert = max(dot(n, uSunDir), 0.0);
            // Skip the ray-march when lambert is already 0 (pixel faces
            // away from sun) — cast shadow can't darken what diffuse term
            // already kills.

            col *= uAmbient + uDiffuse * lambert * shadow;

    fog: true,
    side: THREE.DoubleSide,
    // Sub-pixel z-fight bias between LOD rings. factor=0 keeps the offset
    // constant per triangle (factor=1 would multiply by depth slope and
    // skew on near-vertical surfaces — see inzerator's v2.html comment on
    // the same pattern). 32 units per LOD level is enough to bury 24-bit
    // depth-buffer noise at typical viewing distances without distorting
    // depth on real cliff geometry. Inner gets the largest negative bias
    // → renders "on top" of closeup which is on top of outer.
    polygonOffset: true,
    polygonOffsetFactor: 0,
    polygonOffsetUnits: -(i + 1) * 32,

  const mesh = new THREE.Mesh(sharedGeo, mat);
  // Scale the unit plane to this ring's world size. Y stays 1 (vertex
  // shader sets the actual elevation via uHeight sample).
  mesh.scale.set(r.side_m, 1, r.side_m);
  mesh.renderOrder = 1 + i;
  mesh.frustumCulled = false;
  scene.add(mesh);
  ringMeshes.push(mesh);

  // CPU heightfield reuses the Float32 array decoded above for both
  // Drop the heap-side Float32Array: GPU has its copy via DataTexture, and
  // the CPU sampler (parcel-selection raycast + outline drape) is opt-in
  // via the 🏠 toggle. ringData[].heightData starts null and is rehydrated
  // by ensureHeightDataLoaded() the first time the user enables parcels.
  // ~16 MB per ring saved in JS heap when parcels are never enabled
  // (the typical "just browsing terrain" session).
  ringData[r.slug] = {
    heightData: null,
    heightLoadInfo: { url: asset(r.heightmap_file), fmt: hmFmt, size: r.heightmap_size,
                       y_min: r.y_min, y_max: r.y_max },
    heightLoadPromise: null,
    n: r.heightmap_size,
    y_min: r.y_min, y_max: r.y_max, side_m: r.side_m, half: r.half,
  };
  console.info(`[ring ${r.slug}] ready (${heightData.length} cells, CPU copy dropped — lazy via parcels toggle)`);
  setStage(`ring ${r.slug} hotov (${i + 1}/${rings.length})`);

setStage('hotovo');

// ── CPU heightmap sample ──
// Returns absolute elevation (m AMSL) at scene-local (lx, lz). Iterates
// inner→outer (rings is stored outer→inner) so the finest available LOD
// wins for any query point. Used by:
//   - parcel outline drape (re-add when parcels come back)
//   - building footprint corner sampling (next feature)
//   - tooltip / measurement (when re-enabled)
//   - DevTools probe via `window._sampleAt(x, z)`
// Returns null if point is outside even the outermost ring.
function sampleAt(lx, lz) {
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    const d = ringData[r.slug];
    if (Math.abs(lx) > d.half || Math.abs(lz) > d.half) continue;
    if (!d.heightData) return null;   // lazy-loading not yet complete
    const u = (lx + d.side_m / 2) / d.side_m;
    const v = (lz + d.side_m / 2) / d.side_m;
    const col = Math.max(0, Math.min(d.n - 1, (u * (d.n - 1)) | 0));
    const row = Math.max(0, Math.min(d.n - 1, (v * (d.n - 1)) | 0));
    const intVal = d.heightData[row * d.n + col];
    return d.y_min + intVal * d.y_scale;
  }
  return null;
}

// Same lookup against the bare-earth (DMR5G) heightmap. Used by the
// "bare" parcel style so the outline sits on actual ground instead of
// climbing tree canopies / building roofs (DSM has those baked in).
// Returns null until ensureBareDataLoaded() has populated the array
// for at least one matching ring.
function sampleBareAt(lx, lz) {
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    const d = ringData[r.slug];
    if (Math.abs(lx) > d.half || Math.abs(lz) > d.half) continue;
    if (!d.bareData) return null;
    const u = (lx + d.side_m / 2) / d.side_m;
    const v = (lz + d.side_m / 2) / d.side_m;
    const col = Math.max(0, Math.min(d.n - 1, (u * (d.n - 1)) | 0));
    const row = Math.max(0, Math.min(d.n - 1, (v * (d.n - 1)) | 0));
    const intVal = d.bareData[row * d.n + col];
    return d.y_min + intVal * d.y_scale;

function _bareDataReady() {
  return rings.every(r => ringData[r.slug].bareData);
}

let _bareDataPromise = null;

async function ensureBareDataLoaded() {
  // Lazy-fetch bare-earth LERC files + Uint16-quantize them next to
  // ringData[slug].bareData. Same shape as ensureHeightDataLoaded —
  // we just write to a different field so the DSM path stays intact.
  const startEpoch = _epoch;
  const promises = rings.map(async (r) => {
    const d = ringData[r.slug];
    if (d.bareData) return;
    const info = d.heightLoadInfo;
    if (!info) return;
    const bareUrl = asset(r.bare_file);
    if (!r.bare_file) return;
    const res = await loadHeightmapData(bareUrl, info.fmt, info.size, info.y_min, info.y_max);
    if (startEpoch !== _epoch) return;
    const f32 = res.data;
    const range = info.y_max - info.y_min;
    const y_scale = range > 1e-6 ? range / 65535 : 0;
    const inv = y_scale > 0 ? 1 / y_scale : 0;
    const u16 = new Uint16Array(f32.length);
    for (let i = 0; i < f32.length; i++) {
      const v = Math.round((f32[i] - info.y_min) * inv);
      u16[i] = v < 0 ? 0 : (v > 65535 ? 65535 : v);
    }
    d.bareData = u16;

    console.info(`[ring ${r.slug}] bareData loaded (Uint16, ${(u16.byteLength/1048576).toFixed(1)} MB)`);

// Rehydrate per-ring CPU heightmap arrays on demand. The startup pipeline
// drops these to save ~32 MB of JS heap when parcels aren't used; the
// parcels toggle awaits this before enabling clicks so raycast refinement
// gets correct displaced-terrain XZ.
//
// Storage is Uint16 quantized over the ring's y_min..y_max range
// (65536 levels). For typical Czech terrain (range 200-600 m) the per-
// level resolution is 0.003-0.009 m — orders of magnitude finer than the
// ±0.5 m needed for parcel raycast. Halves heap vs Float32 (16 MB → 8 MB
// per ring) at the cost of one multiply-add per sampleAt() call.
async function ensureHeightDataLoaded() {
  const promises = [];
  for (const r of rings) {
    const d = ringData[r.slug];
    if (d.heightData) continue;
    if (!d.heightLoadPromise) {
      d.heightLoadPromise = (async () => {
        const startEpoch = _epoch;
        const info = d.heightLoadInfo;
        const t0 = performance.now();
        const res = await loadHeightmapData(info.url, info.fmt, info.size, info.y_min, info.y_max);
        // Bailed: dispose ran while LERC was decoding. Don't write into
        // the cleared ringData — caller will retrigger if still needed.
        if (startEpoch !== _epoch) return;
        const f32 = res.data;
        // Quantize to Uint16 spanning [y_min, y_max]. We keep y_min/y_scale
        // on the ringData entry so sampleAt can decode without per-ring
        // lookup overhead.
        const y_min = info.y_min;
        const range = info.y_max - info.y_min;
        // Degenerate flat ring (range==0) — e.g. corrupt manifest, ocean
        // test fixture, or accidentally-uniform terrain — would divide by
        // zero and NaN the parcel raycast. Pin to "every sample = y_min".
        const y_scale = range > 1e-6 ? range / 65535 : 0;
        const inv = y_scale > 0 ? 1 / y_scale : 0;
        const u16 = new Uint16Array(f32.length);
        for (let i = 0; i < f32.length; i++) {
          const v = Math.round((f32[i] - y_min) * inv);
          u16[i] = v < 0 ? 0 : (v > 65535 ? 65535 : v);
        }
        d.heightData = u16;
        d.y_scale = y_scale;
        // f32 is now eligible for GC.
        const precisionLabel = y_scale > 0
          ? `±${(y_scale/2*1000).toFixed(1)} mm precision`
          : `flat (range=0)`;
        console.info(`[ring ${r.slug}] heightData re-loaded in ${(performance.now()-t0).toFixed(0)} ms ` +
          `(Uint16, ${(u16.byteLength/1048576).toFixed(1)} MB, ${precisionLabel})`);
      })();
    }
    promises.push(d.heightLoadPromise);
  }
  await Promise.all(promises);
}

// ── Precomputed cast-shadow texture ──
// One GPU render pass per ring at heightmap resolution writes the
// raymarched shadow factor into a R8 texture. Main shader then samples
// it (1 tap with bilinear filter). Drops per-frame cost from ~20
// shadow-march taps × full-screen pixels → 1 tap. Sun direction is
// constant so bake is one-shot; bare-mode change triggers re-bake.
const shadowMaps = {};   // slug → THREE.WebGLRenderTarget
let shadowMapsBakedForBare = null;
let shadowBakeInFlight = null;

let _bakePipeline = null;
function getBakePipeline() {
  if (_bakePipeline) return _bakePipeline;
  const scene = new THREE.Scene();
  const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const geo = new THREE.PlaneGeometry(2, 2);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uHeight:     { value: null },
      uHeightBare: { value: null },
      uBareMode:   { value: 0.0 },
      uSunDir:     { value: window._heightfieldSunDir },
      uRingHalf:   { value: 1.0 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform sampler2D uHeight;
      uniform sampler2D uHeightBare;
      uniform float uBareMode;
      uniform vec3 uSunDir;
      uniform float uRingHalf;
      varying vec2 vUv;
      float sampleH(vec2 uv) {
        return mix(texture2D(uHeight, uv).r,
                   texture2D(uHeightBare, uv).r, uBareMode);
      }
      float sampleHeightAtWorld(vec2 worldXZ) {
        if (abs(worldXZ.x) > uRingHalf || abs(worldXZ.y) > uRingHalf) {
          return -1.0e9;
        }
        vec2 huv;
        huv.x = (worldXZ.x / (2.0 * uRingHalf)) + 0.5;
        huv.y = (worldXZ.y / (2.0 * uRingHalf)) + 0.5;
        return sampleH(huv);
      }
      void main() {
        float surfY = sampleH(vUv);
        vec2 originXZ;
        originXZ.x = (vUv.x - 0.5) * 2.0 * uRingHalf;
        originXZ.y = (vUv.y - 0.5) * 2.0 * uRingHalf;
        float t = 1.0;
        for (int i = 0; i < 20; i++) {
          vec3 step3 = uSunDir * t;
          vec2 sampleXZ = originXZ + step3.xz;
          float sampleSurfY = sampleHeightAtWorld(sampleXZ);
          if (sampleSurfY < -1.0e8) break;
          float rayY = surfY + step3.y + 0.3;
          if (sampleSurfY > rayY) { gl_FragColor = vec4(0.0); return; }
          t *= 1.5;
        }
        gl_FragColor = vec4(1.0);
      }
    `,
  });
  scene.add(new THREE.Mesh(geo, mat));
  _bakePipeline = { scene, cam, mat };
  return _bakePipeline;
}

function bakeShadowMaps() {
  const { scene: bakeScene, cam: bakeCam, mat: bakeMat } = getBakePipeline();
  const bareMode = ringMeshes[0]?.material.uniforms.uBareMode.value ?? 0.0;

  for (let i = 0; i < rings.length; i++) {
    const r = rings[i];
    const ringMat = ringMeshes[i].material;
    // Render at ¼ heightmap resolution. 20-tap raymarch × full heightmap
    // is overkill for an overlay where bilinear sampling already softens
    // edges — we deliberately trade per-pixel precision for cheap re-bakes,
    // which is what makes the sun-azimuth slider interactive (16× fewer
    // GPU ops vs. full-res keeps re-bake well under one frame budget).
    const W = Math.max(256, r.heightmap_size >> 2);
    let target = shadowMaps[r.slug];
    if (!target) {
      target = new THREE.WebGLRenderTarget(W, W, {
        format: THREE.RedFormat,
        type: THREE.UnsignedByteType,
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        wrapS: THREE.ClampToEdgeWrapping,
        wrapT: THREE.ClampToEdgeWrapping,
        depthBuffer: false,
        stencilBuffer: false,
      });
      shadowMaps[r.slug] = target;
    }
    bakeMat.uniforms.uHeight.value     = ringMat.uniforms.uHeight.value;
    bakeMat.uniforms.uHeightBare.value = ringMat.uniforms.uHeightBare.value;
    bakeMat.uniforms.uBareMode.value   = bareMode;
    bakeMat.uniforms.uRingHalf.value   = r.half;
    renderer.setRenderTarget(target);
    renderer.clear();
    renderer.render(bakeScene, bakeCam);
    ringMat.uniforms.uShadowMap.value = target.texture;
  }
  renderer.setRenderTarget(null);
  shadowMapsBakedForBare = bareMode;
}

async function ensureShadowMaps() {
  const currentBare = ringMeshes[0]?.material.uniforms.uBareMode.value ?? 0.0;

      && shadowMapsBakedForBare === currentBare) return;
  if (shadowBakeInFlight) { await shadowBakeInFlight; return; }
  shadowBakeInFlight = new Promise(resolve => {
    // Defer one frame so the UI paints the checkbox state and the
    // "computing…" status before the GPU blocks on the bake pass.
    requestAnimationFrame(() => {
      bakeShadowMaps();
      resolve();
    });
  });

  shadowBakeInFlight = null;
