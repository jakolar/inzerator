<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ČR 3D mapa</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #10151c; }
  #app { position: fixed; inset: 0; }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 5;
    font: 12px/1.5 system-ui, sans-serif; color: #dfe7f0;
    background: rgba(12, 18, 26, .72); border-radius: 8px; padding: 8px 12px;
    pointer-events: none; white-space: pre;
  }
  #ctl {
    position: fixed; top: 10px; right: 10px; z-index: 5;
    font: 13px system-ui, sans-serif; color: #dfe7f0;
    background: rgba(12, 18, 26, .72); border-radius: 8px; padding: 8px 12px;
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    user-select: none;
  }
  #ctl input { accent-color: #7fae6b; }
  #attrib {
    position: fixed; bottom: 8px; right: 10px; z-index: 5;
    font: 11px system-ui, sans-serif; color: rgba(223, 231, 240, .75);
    background: rgba(12, 18, 26, .55); border-radius: 6px; padding: 3px 8px;
  }
  #loading {
    position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center;
    background: #10151c; color: #dfe7f0; font: 14px system-ui, sans-serif;
    transition: opacity .4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">načítám…</div>
<label id="ctl"><input type="checkbox" id="bareToggle"> jen výšky</label>
<div id="attrib">Mapová data © ČÚZK (DMPOK, Ortofoto)</div>
<div id="loading"><div id="loadmsg">ČR 3D mapa — načítám dlaždice…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { MapControls } from 'three/addons/controls/MapControls.js';
import * as Lerc from 'https://cdn.jsdelivr.net/npm/lerc@4/+esm';

// Surface module-level failures in the overlay instead of a stuck spinner.
window.addEventListener('error', (e) => {
  const el = document.getElementById('loadmsg');
  if (el) el.innerHTML = `⚠ JS chyba: <code>${e.message}</code>`;
});

// ── Tile math (EPSG:3857 XYZ slippy) ──────────────────────────────────
const WMERC = 20037508.342789244;
// ČR data coverage; tiles fully outside are never requested.
const CR = { west: 11.8, south: 48.5, east: 19.0, north: 51.2 };
const lonToMercX = lon => lon / 180 * WMERC;
const latToMercY = lat => Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)) / Math.PI * WMERC;
const mercYToLat = y => (Math.atan(Math.exp(y / WMERC * Math.PI)) - Math.PI / 4) * 360 / Math.PI;
const tileSideMerc = z => 2 * WMERC / 2 ** z;
function lonLatToTile(lon, lat, z) {
  const n = 2 ** z;
  return {
    x: Math.floor((lon + 180) / 360 * n),
    y: Math.floor((1 - Math.asinh(Math.tan(lat * Math.PI / 180)) / Math.PI) / 2 * n),
  };
}
function tileToBBoxMerc(z, x, y) {
  const s = tileSideMerc(z);
  return { w: -WMERC + x * s, e: -WMERC + (x + 1) * s,
           n:  WMERC - y * s, s:  WMERC - (y + 1) * s };
}
function tileToBBoxWgs(z, x, y) {
  const b = tileToBBoxMerc(z, x, y);
  return { w: b.w / WMERC * 180, e: b.e / WMERC * 180,
           n: mercYToLat(b.n),   s: mercYToLat(b.s) };
}

// ── View state / URL params ───────────────────────────────────────────
const P = new URLSearchParams(location.search);
const BARE = document.getElementById('bareToggle');
BARE.checked = P.get('bare') === '1';
const startLat = parseFloat(P.get('lat') ?? '49.82');   // ČR centroid-ish
const startLon = parseFloat(P.get('lon') ?? '15.47');
const startZ   = parseFloat(P.get('z') ?? '8');
const EXAG     = parseFloat(P.get('ex') ?? '1');
// True-metre heights vs mercator-stretched horizontal: scale Y up by the
// mercator factor at ČR latitude so proportions are correct (spec kap. 2).
const Y_SCALE = (1 / Math.cos(startLat * Math.PI / 180)) * EXAG;

const ZMIN = 8, ZMAX = 18;
// Scene origin (mercator metres) — subtracted from all world coords for
// fp32 precision. Terrain Y = height * Y_SCALE above y=0 globally.
const ORIGIN = { x: lonToMercX(startLon), y: latToMercY(startLat) };
const toScene = (mx, my) => ({ x: mx - ORIGIN.x, z: -(my - ORIGIN.y) });

// ── three.js scaffolding ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
// iOS GPUs can't linear-filter float32 textures (no OES_texture_float_linear)
// — the sampler returns 0 and terrain renders flat (2026-07-06 iPhone
// report). Half-float linear IS core WebGL2, so on such devices heights are
// uploaded as half floats relative to the tile minimum (uHBase adds the
// offset back in-shader; relative range keeps half precision ≤ ~0.25 m).
const FLOAT_LINEAR = !!renderer.extensions.get('OES_texture_float_linear')
  && P.get('half') !== '1';
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x10151c);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 5, 4.0e6);
// Distance heuristic: z=8 frames all of ČR, each zoom halves it.
const startDist = 450000 * 2 ** (8 - startZ);
camera.position.set(0, startDist * 0.85, startDist * 0.55);

const controls = new MapControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.maxPolarAngle = 1.45;                 // keep camera above horizon
controls.minDistance = 150;
controls.maxDistance = 900000;
controls.zoomToCursor = true;   // zoom onto what the cursor/finger points at
controls.update();

// ── Standard mobile-map touch gestures ────────────────────────────────
// MapControls' built-in TWO = dolly+pan: no rotate/tilt on touch at all,
// and twist does nothing ("ovládání přes touch není standardní",
// 2026-07-08). Replace with the map convention: pinch = zoom, two-finger
// twist = rotate, two-finger vertical drag = tilt, double-tap = zoom in.
controls.touches.TWO = -1;      // unknown value → controls ignore 2-finger
{
  const el = renderer.domElement;
  const tp = new Map();         // pointerId → [x, y]
  let gPrev = null;             // {d, a, cy} of the previous 2-finger frame
  let lastTap = null;           // {t, x, y} for double-tap detection
  el.addEventListener('pointerdown', e => {
    if (e.pointerType !== 'touch') return;
    tp.set(e.pointerId, [e.clientX, e.clientY]);
    gPrev = null;
  });
  el.addEventListener('pointermove', e => {
    if (!tp.has(e.pointerId)) return;
    tp.set(e.pointerId, [e.clientX, e.clientY]);
    if (tp.size !== 2) return;
    const [p1, p2] = [...tp.values()];
    const d = Math.max(Math.hypot(p1[0] - p2[0], p1[1] - p2[1]), 1);
    const a = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
    const cy = (p1[1] + p2[1]) / 2;
    if (gPrev) {
      const off = camera.position.clone().sub(controls.target);
      const sph = new THREE.Spherical().setFromVector3(off);
      sph.radius = Math.min(Math.max(sph.radius * gPrev.d / d,
                                     controls.minDistance),
                            controls.maxDistance);
      let da = a - gPrev.a;      // twist, wrapped to ±π
      if (da > Math.PI) da -= 2 * Math.PI;
      if (da < -Math.PI) da += 2 * Math.PI;
      sph.theta += da;
      // two fingers up = tilt towards the horizon (Google convention)
      sph.phi = Math.min(Math.max(sph.phi - (cy - gPrev.cy) * 0.005, 0.05),
                         controls.maxPolarAngle);
      camera.position.copy(controls.target)
                     .add(new THREE.Vector3().setFromSpherical(sph));
      camera.lookAt(controls.target);
    }
    gPrev = { d, a, cy };
  });
  const endTp = e => {
    if (!tp.has(e.pointerId)) return;
    const wasSingle = tp.size === 1;
    const [x, y] = tp.get(e.pointerId);
    tp.delete(e.pointerId);
    gPrev = null;
    if (!wasSingle) { lastTap = null; return; }
    const now = performance.now();
    if (lastTap && now - lastTap.t < 300 &&
        Math.hypot(x - lastTap.x, y - lastTap.y) < 30) {
      zoomAnim = { from: camera.position.distanceTo(controls.target),
                   start: now };
      lastTap = null;
    } else lastTap = { t: now, x, y };
  };
  el.addEventListener('pointerup', endTp);
  el.addEventListener('pointercancel', e => { tp.delete(e.pointerId); gPrev = null; });
}
// Double-tap zoom: halve the orbit distance over 250 ms (applied in tick).
let zoomAnim = null;

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Shared skirted grid geometry ──────────────────────────────────────
// Unit tile in XZ: x=[-0.5,0.5] west→east, z=[-0.5,0.5] north→south.
// uv.v = 0 at the north edge = LERC/JPEG raster row 0 (flipY=false).
// Perimeter ring duplicated with aSkirt=1; the vertex shader drops those
// below the terrain to curtain cracks between neighbouring zoom levels.
const SEG = 128;   // ponytail: 128 segs for a 256px heightmap; bump to 256 if visuals demand
function buildTileGeometry() {
  const n = SEG + 1;
  const gridCount = n * n;
  const perim = [];
  for (let i = 0; i < SEG; i++) perim.push(i);                        // N edge W→E
  for (let j = 0; j < SEG; j++) perim.push(j * n + (n - 1));          // E edge N→S
  for (let i = SEG; i > 0; i--) perim.push((n - 1) * n + i);          // S edge E→W
  for (let j = SEG; j > 0; j--) perim.push(j * n);                    // W edge S→N
  const total = gridCount + perim.length;

  const pos = new Float32Array(total * 3);
  const uv = new Float32Array(total * 2);
  const skirt = new Float32Array(total);
  for (let j = 0; j < n; j++) {
    for (let i = 0; i < n; i++) {
      const vi = j * n + i, u = i / SEG, v = j / SEG;
      pos[vi * 3] = u - 0.5; pos[vi * 3 + 2] = v - 0.5;
      uv[vi * 2] = u; uv[vi * 2 + 1] = v;
    }
  }
  perim.forEach((src, k) => {
    const vi = gridCount + k;
    pos[vi * 3] = pos[src * 3]; pos[vi * 3 + 2] = pos[src * 3 + 2];
    uv[vi * 2] = uv[src * 2]; uv[vi * 2 + 1] = uv[src * 2 + 1];
    skirt[vi] = 1;
  });

  const idx = new Uint32Array(SEG * SEG * 6 + perim.length * 6);
  let o = 0;
  for (let j = 0; j < SEG; j++) {
    for (let i = 0; i < SEG; i++) {
      const a = j * n + i, b = a + 1, c = a + n, d = c + 1;
      idx[o++] = a; idx[o++] = c; idx[o++] = b;
      idx[o++] = b; idx[o++] = c; idx[o++] = d;
    }
  }
  for (let k = 0; k < perim.length; k++) {
    const a = perim[k], b = perim[(k + 1) % perim.length];
    const as = gridCount + k, bs = gridCount + (k + 1) % perim.length;
    idx[o++] = a; idx[o++] = as; idx[o++] = b;
    idx[o++] = as; idx[o++] = bs; idx[o++] = b;
  }

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  g.setAttribute('aSkirt', new THREE.BufferAttribute(skirt, 1));
  g.setIndex(new THREE.BufferAttribute(idx, 1));
  return g;
}
const sharedGeo = buildTileGeometry();

const VERT = /* glsl */`
  uniform sampler2D uHeight;
  uniform float uYScale, uSkirtFloor, uHBase;
  attribute float aSkirt;
  varying vec2 vUv;
  void main() {
    vUv = uv;
    float h = uHBase + texture2D(uHeight, uv).r;
    vec3 p = position;
    p.y = h * uYScale;
    // Skirt drops to an absolute floor below the tile's own minimum — a
    // relative drop (1% of tile side) left see-through gaps at steep LOD
    // boundaries (dam canyons, state-border cliffs).
    if (aSkirt > 0.5) p.y = uSkirtFloor;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
  }
`;
const FRAG = /* glsl */`
  uniform sampler2D uHeight, uOrtho;
  uniform float uTexel;     // 1/256
  uniform float uNormMul;   // Y_SCALE / (2 * texel size in mercator m)
  uniform float uHasOrtho;
  uniform float uHBase;
  uniform float uBare;      // 1 = heights-only view (ignore ortho)
  uniform vec3 uSunDir;
  varying vec2 vUv;
  void main() {
    float t = uTexel;
    float hL = texture2D(uHeight, vUv - vec2(t, 0.)).r;
    float hR = texture2D(uHeight, vUv + vec2(t, 0.)).r;
    float hU = texture2D(uHeight, vUv - vec2(0., t)).r;
    float hD = texture2D(uHeight, vUv + vec2(0., t)).r;
    vec3 nrm = normalize(vec3((hL - hR) * uNormMul, 1.0, (hU - hD) * uNormMul));
    float shade = 0.4 + 0.6 * max(dot(nrm, uSunDir), 0.0);
    vec3 base = (uHasOrtho > 0.5 && uBare < 0.5)
      ? texture2D(uOrtho, vUv).rgb
      : mix(vec3(.24, .30, .24), vec3(.55, .52, .46),
            clamp((uHBase + texture2D(uHeight, vUv).r) / 900.0, 0.0, 1.0));
    gl_FragColor = vec4(base * shade, 1.0);
  }
`;
const SUN_DIR = new THREE.Vector3(-0.45, 1.0, 0.55).normalize();

// ── Tile object ───────────────────────────────────────────────────────
// Tile source base. Same-origin '/cuzk-pyramid' in dev (the local server
// builds missing high zooms on demand); a CDN deploy passes
// ?tiles=https://<host>/v1 — 404s there just mean "parent tile covers it".
const TILE_BASE = P.get('tiles') ?? '/cuzk-pyramid';
const HEIGHT_URL = (z, x, y) => `${TILE_BASE}/dmpok/${z}/${x}/${y}.lerc`;
// Ortho: pre-baked pyramid JPEG first (F1, dispatch_ortho_pyramid.py),
// then per-tile WMS cut from local bulk sheets for z>=14 not yet baked,
// then the shader's hypsometric fallback. Below z=14 the WMS composite
// would mosaic hundreds of sheets per request → pyramid or nothing.
// ?v= busts the browser's day-long tile cache after an in-place rebake of
// a level (v=2: z=18 @2x pass started 2026-07-07; bump after it ENDs so
// areas rebaked later than the first fetch refresh too).
const ORTHO_TILE_URL = (z, x, y) =>
  `${TILE_BASE}/ortho/${z}/${x}/${y}.jpg${z === 18 ? '?v=2' : ''}`;
const ORTHO_WMS_URL = (z, x, y) => {
  if (z < 14) return null;
  const b = tileToBBoxWgs(z, x, y);
  return `/proxy/ortofoto?hires=1&WBBOX=${b.w},${b.s},${b.e},${b.n}` +
         `&size=512&format=jpeg`;
};
const texLoader = new THREE.TextureLoader();

// Ortho loads go through a small gate: TextureLoader alone fires every
// request immediately, and a horizon view can want hundreds of WMS
// composites at once — that starved the whole server (2026-07-06 phone
// report: "925 načítá", flat parent tiles everywhere).
let orthoInflight = 0;
const orthoBacklog = [];
function loadOrtho(url, onOk, onErr, stale) {
  // stale() → the tile was disposed while queued; drop silently instead
  // of firing a WMS composite the server (mid-bake) pays for anyway.
  if (stale && stale()) return;
  if (orthoInflight >= 6) { orthoBacklog.push([url, onOk, onErr, stale]); return; }
  orthoInflight++;
  const next = () => {
    orthoInflight--;
    // Drain past stale entries until one actually starts — handing the
    // freed slot to a single stale entry (which no-ops) stalled the rest
    // of the backlog until some future request kicked it again.
    while (orthoBacklog.length) {
      const q = orthoBacklog.shift();
      if (q[3] && q[3]()) continue;
      loadOrtho(q[0], q[1], q[2], q[3]);
      break;
    }
  };
  texLoader.load(url,
    (t) => { next(); onOk(t); },
    undefined,
    (e) => { next(); onErr(e); });
}

const tiles = new Map();   // key "z/x/y" → Tile
const stats = { fetches: 0, ready: 0, empty: 0, failed: 0 };

// ── CZ border (simplified ~100 m, mercator) ───────────────────────────
// Distinguishes two kinds of 404: beyond the data coverage (abroad —
// nothing will ever be there, the quad counts as covered) vs inside it
// (populated-mask depth limit — the parent must keep covering). Without
// this, one abroad child blocked its quad's completion forever and the
// whole border strip stayed stuck at z=8. Fully-out tiles are also
// never fetched. Until the polygon loads, everything is 'cross' (fetch
// and block — the safe default).
let BORDER = null;
fetch('cz-border.json').then(r => r.json()).then(p => { BORDER = p; })
  .catch(e => console.warn('cz-border.json missing', e));
function pointInBorder(x, y) {
  let inside = false;
  for (let i = 0, j = BORDER.length - 1; i < BORDER.length; j = i++) {
    const [xi, yi] = BORDER[i], [xj, yj] = BORDER[j];
    if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi)
      inside = !inside;
  }
  return inside;
}
function coverage(tile) {
  if (tile._cov) return tile._cov;
  if (!BORDER) return 'cross';
  const b = tileToBBoxMerc(tile.z, tile.x, tile.y);
  const M = 200;   // safety margin: borderline → 'cross', never 'out'
  let ins = 0;
  for (const [px, py] of [[b.w, b.s], [b.w, b.n], [b.e, b.s], [b.e, b.n],
                          [(b.w + b.e) / 2, (b.s + b.n) / 2]])
    if (pointInBorder(px, py)) ins++;
  if (ins > 0 && ins < 5) return (tile._cov = 'cross');
  for (const [px, py] of BORDER)
    if (px > b.w - M && px < b.e + M && py > b.s - M && py < b.n + M)
      return (tile._cov = 'cross');
  return (tile._cov = ins === 5 ? 'in' : 'out');
}

// Fill LIDAR voids from the nearest valid neighbour (row sweep, then
// column). DMPOK has genuine nodata over water (no returns — e.g. 41% of
// a z=16 tile on the Dalešice reservoir) plus sub-zero noise (HROT24:
// −95 m); filling voids with the tile-global minimum carved canyon-like
// strips into reservoirs. ČR's lowest real point is 115 m, so < 50 m is
// treated as void too. Returns false when the tile has no valid pixel.
function fillVoids(a, w, h) {
  const ok = v => v > 50;
  const n = a.length;
  const voidIdx = [];
  let any = false;
  for (let i = 0; i < n; i++) {
    if (ok(a[i])) any = true;
    else voidIdx.push(i);
  }
  if (!any) return false;
  if (!voidIdx.length) return true;

  const sweep = (b, outer, inner, oStep, iStep) => {
    for (let r = 0; r < outer; r++) {
      let last = NaN;
      for (let i = 0; i < inner; i++) {
        const k = r * oStep + i * iStep;
        if (ok(b[k])) last = b[k];
        else if (!Number.isNaN(last)) b[k] = last;
      }
      last = NaN;
      for (let i = inner - 1; i >= 0; i--) {
        const k = r * oStep + i * iStep;
        if (ok(b[k])) last = b[k];
        else if (!Number.isNaN(last)) b[k] = last;
      }
    }
  };
  // Average of horizontal and vertical stretch — a single row sweep
  // painted barcode-like stripes across large voids (DMPOK correlation
  // gaps can span half a tile).
  const H = a.slice(), V = a.slice();
  sweep(H, h, w, w, 1);
  sweep(V, w, h, 1, w);
  for (const k of voidIdx) {
    const hv = H[k], vv = V[k];
    a[k] = ok(hv) ? (ok(vv) ? (hv + vv) / 2 : hv) : vv;
  }
  // Corner blobs whose whole row AND column were void: cascade in place
  // (after the row sweep every row with any valid pixel is fully valid,
  // so the column sweep is guaranteed to reach the rest).
  sweep(a, h, w, w, 1);
  sweep(a, w, h, 1, w);
  // A few Gauss-Seidel relaxation passes anchored by the real-data rim
  // soften the remaining directional banding into a smooth membrane.
  for (let it = 0; it < 8; it++) {
    for (const k of voidIdx) {
      const x = k % w;
      let s = 0, c = 0;
      if (x > 0) { s += a[k - 1]; c++; }
      if (x < w - 1) { s += a[k + 1]; c++; }
      if (k >= w) { s += a[k - w]; c++; }
      if (k < n - w) { s += a[k + w]; c++; }
      a[k] = s / c;
    }
  }
  return true;
}

class Tile {
  constructor(z, x, y) {
    this.z = z; this.x = x; this.y = y;
    this.key = `${z}/${x}/${y}`;
    this.state = 'idle';               // idle | loading | ready | empty
    this.mesh = null;
    const b = tileToBBoxMerc(z, x, y);
    const sw = toScene(b.w, b.s), ne = toScene(b.e, b.n);
    this.sideM = tileSideMerc(z);
    this.center = new THREE.Vector3((sw.x + ne.x) / 2, 0, (sw.z + ne.z) / 2);
    this.box = new THREE.Box3(
      new THREE.Vector3(sw.x, 0, ne.z),
      new THREE.Vector3(ne.x, 1700 * Y_SCALE, sw.z));
    // Culling box with a quarter-tile margin: tiles just outside the view
    // still count towards (and block) quad completion, so a small camera
    // rotation reveals an already-loaded tile instead of downgrading the
    // whole quad to the coarse parent while the newcomer streams in —
    // that read as "the valley fills with another layer, then flicks back".
    this.cullBox = this.box.clone().expandByVector(
      new THREE.Vector3(this.sideM * 0.25, 0, this.sideM * 0.25));
    const wgs = tileToBBoxWgs(z, x, y);
    this.inCR = !(wgs.e < CR.west || wgs.w > CR.east ||
                  wgs.n < CR.south || wgs.s > CR.north);
    if (!this.inCR) this.state = 'empty';
  }
  children() {
    if (this._kids) return this._kids;
    this._kids = [];
    for (const [dx, dy] of [[0, 0], [1, 0], [0, 1], [1, 1]]) {
      const t = getTile(this.z + 1, this.x * 2 + dx, this.y * 2 + dy);
      this._kids.push(t);
    }
    return this._kids;
  }
  async load() {
    this.state = 'loading';
    stats.fetches++;
    try {
      const res = await fetch(HEIGHT_URL(this.z, this.x, this.y));
      if (res.status === 404) { this.state = 'empty'; stats.empty++; return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const decoded = Lerc.decode(new Uint8Array(await res.arrayBuffer()));
      const w = decoded.width, h = decoded.height;
      const heights = new Float32Array(decoded.pixels[0]);
      if (!fillVoids(heights, w, h)) { this.state = 'empty'; stats.empty++; return; }
      let min = Infinity;
      for (let i = 0; i < heights.length; i++)
        if (heights[i] < min) min = heights[i];

      // Coarse CPU copy for the camera ground clamp (4 kB per tile).
      const G = 32, step = Math.max(1, Math.floor(w / G));
      this.hGrid = new Float32Array(G * G);
      for (let gy = 0; gy < G; gy++)
        for (let gx = 0; gx < G; gx++)
          this.hGrid[gy * G + gx] =
            heights[Math.min(h - 1, gy * step + (step >> 1)) * w +
                    Math.min(w - 1, gx * step + (step >> 1))];

      let hBase = 0, texData = heights, texType = THREE.FloatType;
      if (!FLOAT_LINEAR) {
        hBase = min;
        const half = new Uint16Array(heights.length);
        for (let i = 0; i < heights.length; i++)
          half[i] = THREE.DataUtils.toHalfFloat(heights[i] - min);
        texData = half; texType = THREE.HalfFloatType;
      }
      this.heightTex = new THREE.DataTexture(texData, w, h,
        THREE.RedFormat, texType);
      this.heightTex.magFilter = this.heightTex.minFilter = THREE.LinearFilter;
      this.heightTex.needsUpdate = true;

      const mat = new THREE.ShaderMaterial({
        uniforms: {
          uHeight: { value: this.heightTex },
          uOrtho: { value: null },
          uHasOrtho: { value: 0 },
          uYScale: { value: Y_SCALE },
          uHBase: { value: hBase },
          uBare: { value: BARE.checked ? 1 : 0 },
          uSkirtFloor: { value: (min - 30) * Y_SCALE },
          uTexel: { value: 1 / w },
          uNormMul: { value: Y_SCALE / (2 * this.sideM / w) },
          uSunDir: { value: SUN_DIR },
        },
        vertexShader: VERT, fragmentShader: FRAG,
        // DoubleSide: the perimeter skirt quads must render from every
        // viewing direction — FrontSide culled them from half the angles,
        // which read as black cracks along LOD boundaries.
        side: THREE.DoubleSide,
      });
      this.mesh = new THREE.Mesh(sharedGeo, mat);
      this.mesh.position.copy(this.center);
      this.mesh.scale.set(this.sideM, 1, this.sideM);
      this.mesh.visible = false;
      this.mesh.frustumCulled = false;   // we cull tiles ourselves
      scene.add(this.mesh);
      this.state = 'ready';
      this.retries = 0;   // transient-failure budget is per load attempt
      stats.ready++;

      // Bare (heights-only) mode skips the ortho fetch entirely — it used
      // to fire a 404 + an expensive WMS composite per tile against the
      // same server running the z=17/18 bake, for a texture the shader
      // never samples. Toggling bare off calls requestOrtho() later.
      if (BARE.checked) this.orthoDone = true;
      else this.requestOrtho();
    } catch (err) {
      // Only a 404 is a durable "no data here". Network hiccups and 5xx
      // (on-demand build congestion, Tailscale dropouts) back off and
      // retry — marking those 'empty' froze the area coarse until reload.
      this.retries = (this.retries ?? 0) + 1;
      if (this.retries > 3) {
        console.warn('tile load failed', this.key, err);
        this.state = 'empty'; stats.failed++;
        return;
      }
      setTimeout(() => { if (this.state === 'loading') this.state = 'idle'; },
                 1500 * this.retries);
    }
  }
  // orthoDone gates LOD refinement: a parent showing ortho must not be
  // swapped for children still waiting on their texture — that reads as
  // the whole area flashing to hillshade and back. Set on success AND on
  // final failure (hillshade fallback is then the tile's look).
  requestOrtho() {
    if (this.orthoRequested || !this.mesh) return;
    this.orthoRequested = true;
    const stale = () => !this.mesh;   // disposed while queued → drop
    const applyOrtho = (tex) => {
      if (!this.mesh) { tex.dispose(); return; }
      tex.flipY = false;               // raster row 0 = north = uv.v 0
      tex.colorSpace = THREE.NoColorSpace;  // passthrough shader, no composer
      tex.anisotropy = 4;
      this.orthoTex = tex;
      const u = this.mesh.material.uniforms;
      u.uOrtho.value = tex;
      u.uHasOrtho.value = 1;
      this.orthoDone = true;
    };
    loadOrtho(ORTHO_TILE_URL(this.z, this.x, this.y), applyOrtho,
      () => {
        const wms = ORTHO_WMS_URL(this.z, this.x, this.y);
        if (!wms) { this.orthoDone = true; return; }
        loadOrtho(wms, applyOrtho, () => {
          console.warn('ortho load failed', this.key);
          this.orthoDone = true;
        }, stale);
      }, stale);
  }
  dispose() {
    if (this.mesh) {
      scene.remove(this.mesh);
      this.mesh.material.dispose();
      this.mesh = null;
      stats.ready = Math.max(0, stats.ready - 1);
    }
    this.heightTex?.dispose(); this.orthoTex?.dispose();
    this.heightTex = this.orthoTex = this.hGrid = null;
    this.orthoDone = this.orthoRequested = false;   // reload re-fetches ortho
    if (this.state !== 'empty') this.state = 'idle';
  }
}
function getTile(z, x, y) {
  const key = `${z}/${x}/${y}`;
  let t = tiles.get(key);
  if (!t) { t = new Tile(z, x, y); tiles.set(key, t); }
  return t;
}

// ── Fetch queue (bounded; server has _CUZK_SEM=6 and shares the box
//    with the running dispatch) ─────────────────────────────────────────
const MAX_INFLIGHT = 6;   // matches Chrome's per-host connection cap
let inflight = 0;
const pending = [];
function enqueue(tile, bias = 0) {
  if (tile.state !== 'idle') return;
  if (coverage(tile) === 'out') { tile.state = 'empty'; return; }  // abroad: no fetch
  tile.state = 'queued'; tile.prioBias = bias;
  pending.push(tile);
}
function pump() {
  if (!pending.length || inflight >= MAX_INFLIGHT) return;
  // Drop queued tiles the quadtree stopped asking for (camera moved on) —
  // without this a horizon sweep piles up hundreds of stale requests.
  for (let i = pending.length - 1; i >= 0; i--) {
    if (frame - (pending[i].lastUsed ?? frame) > 60) {
      pending[i].state = 'idle';
      pending.splice(i, 1);
    }
  }
  // Live priorities: recompute from the current camera on every dispatch —
  // an enqueue-time prio from two seconds ago orders loads around where
  // the camera used to be. Bias: -100 fallback parents, +1e6 prefetch.
  for (const t of pending) t.prio = prio(t) + (t.prioBias ?? 0);
  pending.sort((a, b) => a.prio - b.prio);
  while (inflight < MAX_INFLIGHT && pending.length) {
    const t = pending.shift();
    inflight++;
    t.load().finally(() => { inflight--; pump(); });
  }
}

// ── Quadtree selection + replacement refinement ───────────────────────
const roots = [];
{
  const a = lonLatToTile(CR.west, CR.north, ZMIN);
  const b = lonLatToTile(CR.east, CR.south, ZMIN);
  for (let x = a.x; x <= b.x; x++)
    for (let y = a.y; y <= b.y; y++) roots.push(getTile(ZMIN, x, y));
}

const frustum = new THREE.Frustum();
const projView = new THREE.Matrix4();
const SPLIT_PX = 384;
const MERGE_PX = 269;   // SPLIT_PX * 0.7 — split/merge hysteresis

function screenPx(tile) {
  const dist = Math.max(tile.box.distanceToPoint(camera.position), 1);
  return tile.sideM * innerHeight /
         (2 * dist * Math.tan(camera.fov * Math.PI / 360));
}
function prio(tile) {
  // Level-major (breadth-first): all of level z loads before any z+1, so
  // the view refines evenly one LOD step at a time — pure dist/sideM let
  // the quad under the camera stream to z=16 while a neighbour sat at
  // z=11 ("jeden tile detail, vedle hrubý", 2026-07-07). Within a level,
  // order by screen impact: distance from the CAMERA over tile size
  // (~1/screenPx). Distance to controls.target misordered tilted views —
  // the orbit target sits far ahead, so the large tiles right in front
  // of the camera loaded last. The 1e4 level stride keeps biases
  // level-local (±100) except prefetch (1e6), which stays last overall.
  return tile.z * 1e4 +
         Math.max(tile.box.distanceToPoint(camera.position), 1) / tile.sideM;
}

// Walk the desired tree, pushing tiles to display into `show`. Nothing is
// made visible during the walk — visibility is applied afterwards as a
// set-diff (applyVisibility), so a frame either keeps the parent or swaps
// in the complete set of children, never both. The old walk marked ready
// children visible while siblings still streamed AND kept the parent as
// cover — two near-coincident surfaces z-fighting ("mapa problikává",
// 2026-07-06). Returns true when the node's area is fully covered by
// pushed tiles (or is genuinely outside coverage).
function selectNode(tile, show) {
  if (!tile.inCR) return true;
  if (!frustum.intersectsBox(tile.cullBox)) {
    // Off-view nodes still gate their parent quad's completion: ready →
    // covered, otherwise load and report not-covered — they just aren't
    // rendered. Completion is therefore frustum-independent and MONOTONIC:
    // camera rotation can never flip a refined quad back to its coarse
    // parent, which used to read as edge-of-screen layer flicker while a
    // newly entering child streamed in.
    tile.lastUsed = frame;
    if (tile.state === 'ready' && (tile.orthoDone || BARE.checked)) return true;
    if (tile.state === 'empty' && coverage(tile) === 'out') return true;
    if (tile.state === 'idle') enqueue(tile, 50);   // after in-view work of the same level
    return false;
  }
  tile.lastUsed = frame;

  // Hysteresis: once split, merge back only well below the split
  // threshold — a camera hovering at the boundary otherwise flips
  // parent/children every few frames.
  const wantSplit = tile.z < ZMAX &&
    screenPx(tile) > (tile._split ? MERGE_PX : SPLIT_PX);
  tile._split = wantSplit;

  if (!wantSplit) {
    // Ortho gate only matters when ortho is actually drawn — in bare
    // (heights-only) mode refinement must not wait on WMS composites.
    if (tile.state === 'ready' && (tile.orthoDone || BARE.checked)) {
      show.push(tile);
      return true;
    }
    // Abroad: genuinely nothing to render — covered. An empty tile
    // INSIDE the coverage keeps returning false (ancestor covers).
    if (tile.state === 'empty' && coverage(tile) === 'out') return true;
    if (tile.state === 'idle') enqueue(tile);
    // Not coverable (loading, or 404-empty inside ČR — e.g. beyond the
    // populated-mask data depth): ancestor keeps covering. Empty tiles
    // used to return "covered", which punched holes in the terrain.
    // Stale finer children from before a zoom-out may still cover:
    if (tile._kids) {
      const kids = [];
      let covered = true;
      for (const c of tile._kids) if (!selectNode(c, kids)) covered = false;
      if (covered) { show.push(...kids); return true; }
    }
    return false;
  }

  const kids = [];
  let covered = true;
  for (const c of tile.children()) if (!selectNode(c, kids)) covered = false;
  if (covered) { show.push(...kids); return true; }
  // children incomplete → discard the partial set, cover with self
  if (tile.state === 'ready') { show.push(tile); return true; }
  if (tile.state === 'idle') enqueue(tile, -100);  // fallback loads first
  return false;
}

let visZMin = 99, visZMax = 0, visCount = 0;
let shown = new Set();
function applyVisibility(show) {
  const next = new Set(show);
  for (const t of shown) if (!next.has(t) && t.mesh) t.mesh.visible = false;
  visZMin = 99; visZMax = 0; visCount = 0;
  for (const t of next) {
    if (!t.mesh) continue;
    t.mesh.visible = true;
    t.everShown = true;   // fetch-efficiency metric (HUD console)
    visCount++;
    if (t.z < visZMin) visZMin = t.z;
    if (t.z > visZMax) visZMax = t.z;
  }
  shown = next;
}

// Predictive prefetch: when the fetch queue is idle, warm tiles the camera
// is heading towards at low priority, so movement reveals ready tiles
// instead of loading ones. Two predictors: pan (target velocity, ~1.5 s
// ahead) and zoom-in (camera distance shrinking → next-finer level under
// the view centre; the pan predictor never fires for zoom because the
// target barely moves during the most common gesture).
const prevTarget = new THREE.Vector3();
let prevDist = 0;
function warm3x3(z, mx, my) {
  const n = 2 ** z;
  const tx = Math.floor((mx + WMERC) / (2 * WMERC) * n);
  const ty = Math.floor((WMERC - my) / (2 * WMERC) * n);
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const t = getTile(z, tx + dx, ty + dy);
      if (t.state === 'idle' && t.inCR) enqueue(t, 1e6);  // behind real work
    }
  }
}
function prefetch() {
  const v = controls.target.clone().sub(prevTarget);
  prevTarget.copy(controls.target);
  const dist = camera.position.distanceTo(controls.target);
  const zoomIn = prevDist > 0 && dist < prevDist * 0.997;
  prevDist = dist;
  if (pending.length || inflight > 1) return;   // only when idle
  if (zoomIn && visZMax && visZMax < ZMAX)
    warm3x3(visZMax + 1,
            controls.target.x + ORIGIN.x, ORIGIN.y - controls.target.z);
  if (v.length() < 2) return;                   // camera not really panning
  const ahead = controls.target.clone().addScaledVector(v, 90); // ~1.5 s @60fps
  warm3x3(Math.min(visZMax || ZMIN, ZMAX),
          ahead.x + ORIGIN.x, ORIGIN.y - ahead.z);
}

// Terrain height (m) under a scene-space point, from the finest cached
// tile — nearest sample of the 32² CPU grids kept for this purpose.
function terrainH(sx, sz) {
  const mx = sx + ORIGIN.x, my = ORIGIN.y - sz;
  for (let z = Math.min(visZMax || ZMIN, ZMAX); z >= ZMIN; z--) {
    const n = 2 ** z;
    const tx = Math.floor((mx + WMERC) / (2 * WMERC) * n);
    const ty = Math.floor((WMERC - my) / (2 * WMERC) * n);
    const t = tiles.get(`${z}/${tx}/${ty}`);
    if (!t?.hGrid) continue;
    const b = tileToBBoxMerc(z, tx, ty);
    const G = 32;
    const gx = Math.min(G - 1, Math.floor((mx - b.w) / (b.e - b.w) * G));
    const gy = Math.min(G - 1, Math.floor((b.n - my) / (b.n - b.s) * G));
    return t.hGrid[gy * G + gx];
  }
  return null;
}

// Evict ready tiles untouched for ~5 s once over the mesh budget (roots
// stay). Budget counts READY tiles — the tiles map also holds thousands
// of idle/empty metadata stubs, and budgeting on tiles.size meant every
// ready tile idle >2 s was disposed each sweep: constant refetch churn
// (HUD "fetche 2612" for ~200 visible tiles, 2026-07-06).
// Scaled by device RAM where the browser reports it (Chrome; Safari gets
// the 4 GB default): 150 tiles on a 2 GB phone, 600 on an 8 GB desktop.
const CACHE_MAX = Math.round(
  300 * Math.min(2, Math.max(0.5, (navigator.deviceMemory ?? 4) / 4)));
function evict() {
  if (stats.ready <= CACHE_MAX) return;
  const candidates = [...tiles.values()]
    .filter(t => t.z > ZMIN && t.state === 'ready' && frame - (t.lastUsed ?? 0) > 300)
    .sort((a, b) => (a.lastUsed ?? 0) - (b.lastUsed ?? 0));
  for (const t of candidates.slice(0, stats.ready - CACHE_MAX)) t.dispose();
}

// ── Main loop ─────────────────────────────────────────────────────────
const hud = document.getElementById('hud');
const loading = document.getElementById('loading');
let frame = 0, firstRendered = false;

await Lerc.load();
window.__map3d = { tiles, stats, camera, controls };   // debug console handle

BARE.addEventListener('change', () => {
  const v = BARE.checked ? 1 : 0;
  for (const t of tiles.values())
    if (t.mesh) {
      t.mesh.material.uniforms.uBare.value = v;
      if (!BARE.checked) t.requestOrtho();  // bare mode skipped the fetch
    }
});

function tick() {
  requestAnimationFrame(tick);
  frame++;
  controls.update();
  if (zoomAnim) {
    const k = Math.min((performance.now() - zoomAnim.start) / 250, 1);
    const dist = zoomAnim.from * (1 - 0.5 * (1 - (1 - k) ** 2));  // ease-out to /2
    camera.position.sub(controls.target)
          .setLength(Math.max(dist, controls.minDistance))
          .add(controls.target);
    if (k >= 1) zoomAnim = null;
  }
  // Ground clamp: flying under the map showed mesh undersides/skirts and
  // flickered during movement (2026-07-07 report). DSM includes canopy
  // and buildings, so +20 m clears local obstacles too.
  const th = terrainH(camera.position.x, camera.position.z);
  const floorY = th === null ? 5 : (th + 20) * Y_SCALE;
  if (camera.position.y < floorY) camera.position.y = floorY;
  projView.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
  frustum.setFromProjectionMatrix(projView);
  const show = [];
  for (const r of roots) selectNode(r, show);
  applyVisibility(show);
  prefetch();
  pump();
  if (frame % 120 === 0) evict();
  renderer.render(scene, camera);

  if (!firstRendered && stats.ready > 0) {
    firstRendered = true;
    loading.classList.add('hidden');
  }
  // Pre-bake of z=8..13 may still be running server-side; explain instead
  // of spinning forever when every visible tile 404s.
  if (!firstRendered && frame === 400 && stats.ready === 0 && stats.empty > 0) {
    document.getElementById('loadmsg').innerHTML =
      'Nízké zoomy se na serveru ještě dopočítávají —<br>' +
      'zkuste detail, např. <code>?lat=49.62&lon=17.29&z=15</code>';
  }
  if (frame % 15 === 0) {
    const zInfo = visCount
      ? (visZMin === visZMax ? `z=${visZMin}` : `z=${visZMin}–${visZMax}`)
      : 'z=—';
    // GPU memory of the streamed model: height textures + ortho textures
    // (×1.33 for mipmaps). Shared geometry is a single ~1.3 MB buffer.
    let gpu = 0;
    const hBytes = FLOAT_LINEAR ? 4 : 2;
    for (const t of tiles.values()) {
      if (t.heightTex) gpu += 256 * 256 * hBytes;
      if (t.orthoTex) {
        const im = t.orthoTex.image;
        gpu += (im?.width ?? 512) * (im?.height ?? 512) * 4 * 1.33;
      }
    }
    const jsHeap = performance.memory
      ? ` · JS ${(performance.memory.usedJSHeapSize / 1048576).toFixed(0)} MB`
      : '';
    // HD = on-screen tiles with a 512^2 texture (0.20 m/px @2x pass or
    // hires WMS cut) — quick check that the rebaked tiles actually render.
    let hd = 0;
    for (const t of shown) if ((t.orthoTex?.image?.width ?? 0) >= 512) hd++;
    hud.textContent =
      `zoom ${zInfo} · ${visCount} dlaždic na obrazovce` +
      (hd ? ` · ${hd} HD` : '') + `\n` +
      `${stats.ready} ready · ${pending.length + inflight} načítá` +
      ` · ${stats.empty} prázdné\n` +
      `cache ${tiles.size} · fetche ${stats.fetches}` +
      (stats.failed ? ` · chyby ${stats.failed}` : '') +
      `\nGPU ${(gpu / 1048576).toFixed(0)} MB${jsHeap}`;
  }
}
tick();
</script>
