// ── HUD ──
const sizes = rings.map(r => `${r.slug}: ${(r.side_m/1000).toFixed(0)} km @ ${r.step} m`).join('<br>  ');
document.getElementById('data').innerHTML = `
  ${slug} · LOD pyramid<br>
  ${sizes}<br>
  Y range ${globalYmin.toFixed(1)} – ${globalYmax.toFixed(1)} m
`;

// FPS counter
const stats = document.getElementById('stats');
let lastT = performance.now(), frames = 0;
// ── Selective bloom for selected-parcel tubes ──
// Two-composer recipe from three.js' selective-bloom example: a first
// pass renders ONLY the bloom layer (parcel tubes) — sky + terrain are
// excluded via `camera.layers.set(BLOOM_LAYER)` and `scene.background =
// null`. The blurred result is fed into a final pass that composites it
// additively on top of a normal scene render. Without this, the HDR sky
// (env-map background pixels exceed 1.0) gets caught by the bloom pass
// and the whole frame washes white.
const BLOOM_LAYER = 1;
// Composers always created (finalComposer is required for sRGB output
// encoding on our custom ShaderMaterial — plain renderer.render skips
// OutputPass and ortho ends up too dark, see memory/feedback_composer_colorspace.md).
// What we DO skip when no parcels are selected is the bloom-only pass,
// which is the heavy one (full-frame multi-mip blur). finalComposer keeps
// running so colour stays correct; the combine shader reads the bloom
// target's last state (zeros on first frame) so the contribution is ~0.
const bloomComposer = new EffectComposer(renderer);
bloomComposer.renderToScreen = false;
bloomComposer.setPixelRatio(renderer.getPixelRatio());
bloomComposer.setSize(innerWidth, innerHeight);
bloomComposer.addPass(new RenderPass(scene, camera));
bloomComposer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  /* strength */  0.55,    // halved from 1.4 — was burning through the parcel area
  /* radius   */  0.35,    // tighter halo (was 0.55)
  /* threshold */ 0.0,
));

const combineShader = new THREE.ShaderMaterial({
  uniforms: {
    baseTexture:  { value: null },
    bloomTexture: { value: bloomComposer.renderTarget2.texture },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D baseTexture;
    uniform sampler2D bloomTexture;
    varying vec2 vUv;
    void main() {
      gl_FragColor = texture2D(baseTexture, vUv) + texture2D(bloomTexture, vUv);
    }
  `,
});
const finalComposer = new EffectComposer(renderer);
finalComposer.setPixelRatio(renderer.getPixelRatio());
finalComposer.setSize(innerWidth, innerHeight);
finalComposer.addPass(new RenderPass(scene, camera));
finalComposer.addPass(new ShaderPass(combineShader, 'baseTexture'));
finalComposer.addPass(new OutputPass());

renderer.info.autoReset = false;   // accumulate across multiple render() calls per frame

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.info.reset();   // manual reset at frame start
  if (_NO_BLOOM) {
    renderer.render(scene, camera);
  } else {
    // Skip the heavy bloom pass when no parcels are selected — the combine
    // shader still reads `bloomTexture` (which keeps its previous state /
    // zeros) so the additive contribution is ~0. finalComposer still runs
    // to keep the OutputPass sRGB encoding active.
    const hasGlow = selectedParcels.size > 0;
    if (hasGlow) {
      const oldBg = scene.background;
      scene.background = null;
      camera.layers.set(BLOOM_LAYER);
      bloomComposer.render();
      scene.background = oldBg;
      camera.layers.set(0);
    }
    finalComposer.render();
  }
  frames++;
  const now = performance.now();
  if (now - lastT > 500) {
    const fps = (frames * 1000 / (now - lastT)).toFixed(0);
    const info = renderer.info;
    const gpuMB = estimateGpuMB();
    const heapMB = performance.memory
      ? (performance.memory.usedJSHeapSize / 1048576).toFixed(0) + ' MB'
      : '—';
    stats.innerHTML =
      `<span class="lbl">fps</span> <span class="val">${fps}</span><br>` +
      `<span class="lbl">draw</span> <span class="val">${info.render.calls}</span> ` +
      `<span class="lbl">tris</span> <span class="val">${(info.render.triangles/1000).toFixed(0)}k</span><br>` +
      `<span class="lbl">tex</span> <span class="val">${info.memory.textures}</span> ` +
      `<span class="lbl">geo</span> <span class="val">${info.memory.geometries}</span><br>` +
      `<span class="lbl">gpu</span> <span class="val">${gpuMB} MB</span><br>` +
      `<span class="lbl">heap</span> <span class="val">${heapMB}</span>`;
    frames = 0;
    lastT = now;
  }
}

// Estimate GPU memory by scanning materials + composers for unique textures
// and summing image-byte-size by format/type. WebGL doesn't expose VRAM
// directly; this is an upper bound for the texture footprint (mipmaps add
// ~33 %, included). Render targets (bloom, shadow bake) are counted via
// `renderer.info.memory.textures` heuristic — each RT contributes ~ W*H*4
// bytes (RGBA half-float for HDR composer paths).
function _texBytes(tex) {
  if (!tex || !tex.image) return 0;
  // Compressed (KTX2 ETC1S/UASTC): mipmaps array carries actual byte arrays.
  if (tex.isCompressedTexture && Array.isArray(tex.mipmaps)) {
    let total = 0;
    for (const m of tex.mipmaps) if (m.data) total += m.data.length;
    return total;
  }
  // DataTexture (heightmap, cadastre R8): payload is the typed array.
  if (tex.image.data?.byteLength) {
    let bytes = tex.image.data.byteLength;
    if (tex.generateMipmaps) bytes = Math.round(bytes * 1.333);   // mip chain
    return bytes;
  }
  // Regular Texture (image-backed): infer from dimensions × channels × bpc.
  const W = tex.image.width || 0, H = tex.image.height || 0;
  if (!W || !H) return 0;
  let channels = 4;
  if (tex.format === THREE.RedFormat) channels = 1;
  else if (tex.format === THREE.RGFormat) channels = 2;
  else if (tex.format === THREE.RGBFormat) channels = 3;
  let bpc = 1;
  if (tex.type === THREE.HalfFloatType) bpc = 2;
  else if (tex.type === THREE.FloatType) bpc = 4;
  let bytes = W * H * channels * bpc;
  if (tex.generateMipmaps !== false) bytes = Math.round(bytes * 1.333);
  return bytes;
}

function estimateGpuMB() {
  const seen = new Set();
  let total = 0;
  // Walk scene materials for textures attached via uniforms or stock slots.
  scene.traverse((obj) => {
    const mats = obj.material
      ? (Array.isArray(obj.material) ? obj.material : [obj.material])
      : [];
    for (const m of mats) {
      if (m.uniforms) {
        for (const u of Object.values(m.uniforms)) {
          const t = u?.value;
          if (t?.isTexture && !seen.has(t)) { seen.add(t); total += _texBytes(t); }
        }
      }
      for (const k of ['map','normalMap','roughnessMap','metalnessMap','emissiveMap','envMap']) {
        const t = m[k];
        if (t?.isTexture && !seen.has(t)) { seen.add(t); total += _texBytes(t); }
      }
    }
  });
  // Shadow bake RTs (one per ring, not in scene graph).
  if (typeof shadowMaps === 'object') {
    for (const rt of Object.values(shadowMaps)) {
      const t = rt?.texture;
      if (t && !seen.has(t)) { seen.add(t); total += _texBytes(t); }
    }
  }
  // Composer render targets: each composer holds 2 RTs (ping/pong) at
  // viewport size × pixelRatio², typically RGBA HalfFloat = 8 bytes/px.
  const dpr = renderer.getPixelRatio();
  const composerRtBytes = innerWidth * innerHeight * dpr * dpr * 8;
  if (bloomComposer) total += composerRtBytes * 2;   // bloomComposer 2 RTs
  if (finalComposer) total += composerRtBytes * 2;   // finalComposer 2 RTs
  // UnrealBloomPass adds 5 mip-chain RTs at half/quarter sizes.
  if (bloomComposer) total += composerRtBytes * 0.4;   // ~5 mips of decreasing size
  return (total / 1048576).toFixed(0);
}

animate();

addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  bloomComposer.setSize(innerWidth, innerHeight);
  finalComposer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ── Page Visibility unload ──
// When the tab is hidden for >5 min, dispose every GPU asset (textures,
// render targets, CPU heightmap, parcel outlines). Recovers ~150-250 MB
// GPU + ~50-100 MB JS heap for forgotten tabs. On return, refetch from
// browser disk cache (typically ~1-2 s) and re-apply the toggle states
// the user had active. Composer targets are kept — re-creating them is
// expensive and ~30 MB is a worthwhile baseline to keep frames rendering.
const _UNLOAD_AFTER_MS = 5 * 60 * 1000;
let _hiddenAt = null;
let _unloadTimer = null;
let _unloaded = false;
let _savedToggleState = null;
// Bumped on every disposeAllAssets() — in-flight async loaders capture the
// current epoch at start and bail before writing if it changed mid-flight.
// Without this, a load triggered before unload would happily push into
// just-cleared caches (cadVectorRingNodes, ringData.heightData, cadTextures),
// causing zombie state that reloadAllAssets then double-builds.
let _epoch = 0;

async function disposeAllAssets() {
  // Snapshot toggle state so reloadAllAssets can restore the user's view.
  _savedToggleState = {
    cad: cadToggle.checked,
    bare: bareToggle.checked,
    parcels: parcelsToggle?.checked ?? false,
    tier: currentTier,
    selectedParcels: Array.from(selectedParcels),
  };
  // Per-ring uniforms — null + dispose. Material itself stays valid; we
  // only swap its sampler targets back in during reload.
  for (let i = 0; i < ringMeshes.length; i++) {
    const u = ringMeshes[i].material.uniforms;
    u.uHeight.value?.dispose();    u.uHeight.value = null;
    u.uHeightBare.value?.dispose(); u.uHeightBare.value = null;
    u.uBareMode.value = 0.0;
    u.uOrtho.value?.dispose();     u.uOrtho.value = null;
    u.uCadastre.value?.dispose();  u.uCadastre.value = null;
    u.uCadEnabled.value = 0.0;
    if (u.uShadowMap) { u.uShadowMap.value?.dispose?.(); u.uShadowMap.value = null; }
  }
  // Tier cache + cadastre/bare maps — fully drop.
  for (const tex of Object.values(orthoTierCache)) tex.dispose();
  for (const k of Object.keys(orthoTierCache)) delete orthoTierCache[k];
  currentTier = null;
  for (const tex of Object.values(cadTextures)) tex.dispose();
  for (const k of Object.keys(cadTextures)) delete cadTextures[k];
  for (const slug in bareLoadedTex) { bareLoadedTex[slug]?.dispose(); delete bareLoadedTex[slug]; }
  // OSM textures + the "what was the ortho before OSM" snapshot — both
  // hold references that point at GPU-side resources cleared in this fn.
  for (const slug in osmTextures) { osmTextures[slug]?.dispose(); delete osmTextures[slug]; }
  for (const slug in initialOrthoTex) delete initialOrthoTex[slug];
  // Shadow render targets.
  for (const rt of Object.values(shadowMaps)) rt.dispose?.();
  for (const k of Object.keys(shadowMaps)) delete shadowMaps[k];
  // CPU heightmap (lazy anyway, but clear in case it was loaded).
  for (const slug in ringData) {
    ringData[slug].heightData = null;
    ringData[slug].heightLoadPromise = null;
  }
  // Vector cadastre overlay (only when ?vector=1 was used).
  for (const node of Object.values(cadVectorRingNodes)) {
    for (const line of node.lines) {
      line.geometry.dispose();
      line.material.dispose();
      cadVectorGroup.remove(line);
    }
  }
  for (const k of Object.keys(cadVectorRingNodes)) delete cadVectorRingNodes[k];
  cadVectorPromise = null;
  cadVectorGroup.visible = false;
  // Parcel outline tubes/lines.
  while (outlineGroup.children.length) {
    const m = outlineGroup.children.pop();
    m.geometry.dispose();
  }
  // Don't dispose _parcelLineMat / _emissiveMat — singleton materials,
  // cheap to keep. Composer RTs likewise stay (they re-clear naturally).
  // Bump epoch LAST so any in-flight loader notices on its next await
  // boundary and bails before writing into the just-cleared caches.
  _epoch++;
  console.info(`[unload] disposed (hidden ${((Date.now() - _hiddenAt)/1000).toFixed(0)}s, epoch=${_epoch})`);
}

async function reloadAllAssets() {
  const t0 = performance.now();
  // Re-fetch heightmap + ortho per ring in parallel. Browser disk cache
  // makes this typically < 200 ms per ring on a warm cache.
  await Promise.all(rings.map(async (r, i) => {
    const hmFmt = r.heightmap_format || 'png';
    const heightP = loadHeightmapData(asset(r.heightmap_file), hmFmt,
                                       r.heightmap_size, r.y_min, r.y_max);
    await webpSupport;
    const orthoP = loadTex(pickOrthoUrl(r));
    const [heightRes, ortho] = await Promise.all([heightP, orthoP]);
    const heightTex = makeHeightTexture(heightRes.data, heightRes.n);
    ortho.colorSpace = THREE.SRGBColorSpace;
    ortho.flipY = false;
    ortho.anisotropy = renderer.capabilities.getMaxAnisotropy();
    const u = ringMeshes[i].material.uniforms;
    u.uHeight.value = heightTex;
    u.uOrtho.value = ortho;
    u.uOrthoFlipY.value = ortho.isCompressedTexture ? (_KTX2_FLIP & 1) : 0.0;
    // Re-seed tier cache with the default tier so switchOrthoTier short-
    // circuits the first time the user picks the same tier they had.
    const defaultTier = r.ortho_default || 'mid';
    orthoTierCache[`${r.slug}|${defaultTier}`] = ortho;
  }));
  currentTier = rings[0].ortho_default || 'mid';
  syncTierButtons?.();
  // Re-apply toggle states the user had on. Each `change` handler does
  // the heavy lifting (load + apply uniforms). We dispatch a synthetic
  // 'change' event so any side effects (status text, button hide) match
  // a fresh user click.
  const s = _savedToggleState;
  if (s) {
    if (s.cad && !cadToggle.checked) cadToggle.checked = true;
    if (s.bare && !bareToggle.checked) bareToggle.checked = true;
    if (s.parcels && parcelsToggle && !parcelsToggle.checked) parcelsToggle.checked = true;
    // Fire handlers sequentially — they internally await heavy work.
    if (s.cad)     cadToggle.dispatchEvent(new Event('change'));
    if (s.bare)    bareToggle.dispatchEvent(new Event('change'));
    if (s.parcels && parcelsToggle) parcelsToggle.dispatchEvent(new Event('change'));
    // Restore parcel selection IDs (outline redraws after parcels load).
    selectedParcels.clear();
    for (const id of s.selectedParcels) selectedParcels.add(id);
    // redrawOutlines runs after parcels finish loading (handler awaits it).
  }
  _savedToggleState = null;
  console.info(`[unload] reloaded in ${((performance.now() - t0)/1000).toFixed(2)} s`);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    _hiddenAt = Date.now();
    if (_unloadTimer) clearTimeout(_unloadTimer);
    _unloadTimer = setTimeout(() => {
      if (document.hidden && !_unloaded) {
        disposeAllAssets();
        _unloaded = true;
      }
    }, _UNLOAD_AFTER_MS);
  } else {
    if (_unloadTimer) { clearTimeout(_unloadTimer); _unloadTimer = null; }
    if (_unloaded) {
      reloadAllAssets();
      _unloaded = false;
    }
  }
});
// Manual triggers for debug: window._unload(), window._reload()
window._unload = () => { disposeAllAssets(); _unloaded = true; };
window._reload = () => { reloadAllAssets(); _unloaded = false; };

// Heap breakdown — walk known global references and report sizes. Prints
// to console (use _heapBreakdown() in DevTools). Identifies the heaviest
// JS-heap allocations the app holds explicitly — anything beyond this is
// engine internals / V8 pool overhead.
window._heapBreakdown = () => {
  const rows = [];
  const push = (label, bytes) => bytes > 0 && rows.push([label, bytes]);
  const seen = new Set();
  const addTexture = (tex, label) => {
    if (!tex || seen.has(tex)) return;
    seen.add(tex);
    // Compressed mipmap arrays — held in JS heap as Uint8Array refs.
    if (tex.isCompressedTexture && Array.isArray(tex.mipmaps)) {
      let total = 0;
      for (const m of tex.mipmaps) if (m.data?.length) total += m.data.length;
      push(`${label} (KTX2 mipmap arrays)`, total);
    }
    // DataTexture payloads — direct typed array reference.
    if (tex.image?.data?.byteLength) {
      push(`${label} (DataTexture.image.data)`, tex.image.data.byteLength);
    }
    // ImageBitmap / HTMLImageElement carry pixel data outside JS heap
    // (browser-managed), so not counted here.
  };
  // Ring meshes
  for (let i = 0; i < ringMeshes.length; i++) {
    const u = ringMeshes[i].material.uniforms;
    addTexture(u.uHeight.value,     `ring${i}.uHeight`);
    addTexture(u.uHeightBare.value, `ring${i}.uHeightBare`);
    addTexture(u.uOrtho.value,      `ring${i}.uOrtho`);
    addTexture(u.uCadastre.value,   `ring${i}.uCadastre`);
  }
  // Caches
  for (const [k, t] of Object.entries(orthoTierCache)) addTexture(t, `orthoTierCache[${k}]`);
  for (const [k, t] of Object.entries(cadTextures)) addTexture(t, `cadTextures[${k}]`);
  for (const [k, t] of Object.entries(bareLoadedTex)) addTexture(t, `bareLoadedTex[${k}]`);
  // Shadow render targets (texture inside RT, but their data lives on GPU only)
  // Skipped — no JS heap contribution.
  // CPU heightmap (Uint16 quantized after lazy load)
  for (const slug in ringData) {
    const hd = ringData[slug].heightData;
    if (hd?.byteLength) push(`ringData[${slug}].heightData (Uint16)`, hd.byteLength);
  }
  // Parcel data — RUIAN polygons
  for (const slug in parcelsBySlug) {
    const p = parcelsBySlug[slug];
    // Estimate: each parcel ~200 bytes parsed (id, label, ring_local arrays)
    push(`parcelsBySlug[${slug}] (~${p.length} parcels)`, p.length * 200);
  }
  // Vector cadastre geometry positions
  for (const [slug, node] of Object.entries(cadVectorRingNodes)) {
    for (const line of node.lines) {
      const pos = line.geometry?.attributes?.instanceStart?.data?.array;
      if (pos?.byteLength) push(`cadVectorRingNodes[${slug}].positions`, pos.byteLength);
    }
  }
  // Outline group line geometry
  for (const child of outlineGroup.children) {
    const pos = child.geometry?.attributes?.instanceStart?.data?.array;
    if (pos?.byteLength) push(`outlineGroup line positions`, pos.byteLength);
  }
  // Shared / per-mesh BufferGeometry attribute arrays — the silent
  // killer at high GEO_SUBDIVS. position/uv/normal/index together can
  // dwarf textures.
  const geoSeen = new Set();
  scene.traverse((obj) => {
    const g = obj.geometry;
    if (!g || geoSeen.has(g)) return;
    geoSeen.add(g);
    const label = obj.name || obj.type;
    for (const [name, attr] of Object.entries(g.attributes || {})) {
      if (attr.array?.byteLength) push(`geometry[${label}].${name}`, attr.array.byteLength);
    }
    if (g.index?.array?.byteLength) push(`geometry[${label}].index`, g.index.array.byteLength);
  });

  rows.sort((a, b) => b[1] - a[1]);
  let total = 0;
  console.log('%c[heap breakdown] (explicit refs we hold)', 'font-weight:bold');
  for (const [label, bytes] of rows) {
    total += bytes;
    console.log(`  ${(bytes/1048576).toFixed(2).padStart(7)} MB  ${label}`);
  }
  const heapMB = performance.memory
    ? (performance.memory.usedJSHeapSize / 1048576).toFixed(0) + ' MB'
    : '—';
  console.log(`%c  ────`, 'color:#888');
  console.log(`  ${(total/1048576).toFixed(2).padStart(7)} MB  TRACKED total`);
  console.log(`  ${heapMB.padStart(10)}  performance.memory.usedJSHeapSize`);
  console.log(`  ${((performance.memory?.usedJSHeapSize/1048576 || 0) - total/1048576).toFixed(0).padStart(7)} MB  UNTRACKED (engine + V8 pool + decoded images)`);
  return rows;
};
</script>
</body>
</html>
