<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inženýrátor — Lokace</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    body { font-family: -apple-system, "Helvetica Neue", sans-serif;
           background: #f5f5f7; color: #1d1d1f; max-width: 800px;
           margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 22px; margin: 0 0 16px 0; }
    .location-row { display: flex; align-items: center; gap: 12px;
                    padding: 12px 14px; background: white;
                    border-radius: 8px; margin-bottom: 8px;
                    box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .location-row .label { flex: 1; font-weight: 500; }
    .location-row .status { font-size: 13px; color: #666; }
    .status-ready { color: #2a8a2a; }
    .status-partial { color: #c08000; }
    .status-generating { color: #1a73e8; }
    .btn { padding: 6px 12px; border: 0; border-radius: 6px;
           background: #1a73e8; color: white; cursor: pointer;
           font-size: 13px; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .empty { padding: 24px; text-align: center; color: #999; }
    .error { color: #c30; padding: 12px; background: #fff0f0;
             border-radius: 6px; margin: 8px 0; }
  </style>
</head>
<body>
  <h1>Lokace</h1>
  <div id="locations"><div class="empty">Načítám…</div></div>
  <div style="margin-top: 24px;">
    <button class="btn" id="new-location-btn">+ Nová lokace</button>
  </div>
  <div id="form-container"></div>

  <script>
  // === Renders ===
  async function renderLocations() {
    const r = await fetch('/api/locations').then(r => r.json()).catch(e => null);
    const el = document.getElementById('locations');
    if (!r) {
      el.innerHTML = '<div class="error">Backend nedostupný</div>';
      return;
    }
    if (r.length === 0) {
      el.innerHTML = '<div class="empty">Žádné lokace. Klikni „+ Nová lokace".</div>';
      return;
    }
    el.innerHTML = r.map(loc => `
      <div class="location-row" data-slug="${loc.slug}">
        <span class="label">${escapeHtml(loc.label)}</span>
        <span class="status status-${loc.status}">${statusLabel(loc)}</span>
        ${loc.status === 'partial'
          ? `<button class="btn" data-action="retry-from-disk" data-slug="${loc.slug}">Retry</button>`
          : ''}
        ${loc.status === 'ready'
          ? `<a class="btn" href="/v2.html?region=${loc.slug}">Otevřít</a>`
          : ''}
      </div>
    `).join('');
    el.querySelectorAll('[data-action="retry-from-disk"]').forEach(btn => {
      btn.onclick = async () => {
        const slug = btn.dataset.slug;
        const r = await fetch('/api/jobs', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({slug, resume_from_disk: true}),
        });
        const data = await r.json();
        if (r.status !== 200) {
          alert(`Retry selhal (${r.status}): ${data.error || 'unknown'}`);
          return;
        }
        startPolling();
      };
    });
  }

  function statusLabel(loc) {
    if (loc.status === 'ready') return '✓ ready';
    if (loc.status === 'partial') return '⚠ partial';
    return loc.status;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  let SELECTED_HIT = null;

  function renderForm(show) {
    const el = document.getElementById('form-container');
    if (!show) { el.innerHTML = ''; return; }
    el.innerHTML = `
      <div style="background:white; padding:16px; border-radius:8px; margin-top:16px;
                  box-shadow:0 1px 2px rgba(0,0,0,0.06);">
        <h3 style="margin-top:0;">Nová lokace</h3>
        <div>
          <input id="addr-input" type="text" placeholder="Hnojice 47 (s diakritikou!)"
                 style="width:60%; padding:6px;">
          <button class="btn" id="search-btn">Hledat</button>
        </div>
        <div style="font-size:11px; color:#888; margin-top:4px;">
          Tip: piš s diakritikou (Hnojice, Strážek). RUIAN bez diakritiky nehledá.
        </div>
        <div id="search-results" style="margin-top:12px;"></div>
        <div id="selected-fields" style="margin-top:12px; display:none;">
          <p><b>Vybráno:</b> <span id="selected-label"></span></p>
          <label>Slug: <input id="slug-input" type="text"></label><br><br>
          <label>Label: <input id="label-input" type="text" style="width:60%"></label><br><br>
          <p style="font-size:12px; color:#666;">S-JTSK: <span id="sjtsk-display"></span></p>
          <button class="btn" id="generate-btn">Generovat</button>
          <button class="btn btn-secondary" id="cancel-form-btn">Zrušit</button>
        </div>
      </div>
    `;
    document.getElementById('search-btn').onclick = doSearch;
    document.getElementById('cancel-form-btn').onclick = () => renderForm(false);
    const addrInput = document.getElementById('addr-input');
    addrInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    // Typeahead: 300 ms po zastavení psaní fetch; nebloku­je tlačítko Hledat.
    // Krátké dotazy (<2 znaky) tichý no-op, aby user neviděl spam-error.
    addrInput.addEventListener('input', () => {
      clearTimeout(SEARCH_DEBOUNCE);
      const q = addrInput.value.trim();
      if (q.length < 2) return;
      SEARCH_DEBOUNCE = setTimeout(doSearch, 300);
    });
  }

  let SEARCH_DEBOUNCE = null;

  async function doSearch() {
    const q = document.getElementById('addr-input').value.trim();
    const resultsEl = document.getElementById('search-results');
    if (!q) {
      resultsEl.innerHTML = '<div class="error">Zadej alespoň 2 znaky</div>';
      return;
    }
    resultsEl.innerHTML = '<i>Hledám…</i>';
    try {
      const r = await fetch(`/api/ruian/search?q=${encodeURIComponent(q)}`);
      if (r.status === 503) {
        resultsEl.innerHTML = '<div class="error">ČÚZK nedostupné. Zkus později nebo zadej S-JTSK ručně.</div>';
        return;
      }
      const data = await r.json();
      if (data.length === 0) {
        resultsEl.innerHTML = `
          <div class="error">Nic nenalezeno. Zkus i s diakritikou.</div>
          <details style="margin-top:8px;">
            <summary style="cursor:pointer; color:#1a73e8;">Zadat S-JTSK ručně</summary>
            <div style="margin-top:8px;">
              cx: <input id="manual-cx" type="number" step="0.01" style="width:120px">
              cy: <input id="manual-cy" type="number" step="0.01" style="width:120px">
              <button class="btn" id="manual-ok-btn">Použít</button>
            </div>
          </details>
        `;
        setTimeout(() => {
          document.getElementById('manual-ok-btn')?.addEventListener('click', async () => {
            const cx = parseFloat(document.getElementById('manual-cx').value);
            const cy = parseFloat(document.getElementById('manual-cy').value);
            if (isNaN(cx) || isNaN(cy)) { alert('Zadej platná čísla'); return; }
            // Server-side SJTSK→WGS so the verify map has marker coords
            // without bundling proj4 in the page.
            const ll = await fetch(`/api/sjtsk2wgs?cx=${cx}&cy=${cy}`).then(r => r.json());
            if (typeof ll.lat !== 'number') { alert('Konverze selhala'); return; }
            selectHit({label: `Manual ${cx}, ${cy}`, sjtsk_cx: cx, sjtsk_cy: cy,
                       wgs_lat: ll.lat, wgs_lon: ll.lon, obec: 'lokace'});
          });
        }, 0);
        return;
      }
      LAST_HITS = data;
      renderHitList(data);
    } catch (e) {
      resultsEl.innerHTML = `<div class="error">Chyba: ${escapeHtml(e.message)}</div>`;
    }
  }

  let LAST_HITS = [];
  let VERIFY_MAP = null;   // active Leaflet instance (destroyed on Zpět)

  function renderHitList(data) {
    const resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = data.map((hit, i) => `
      <div style="padding:8px; cursor:pointer; border-bottom:1px solid #eee;"
           data-i="${i}" class="hit-row">
        ${escapeHtml(hit.label)}
      </div>
    `).join('');
    resultsEl.querySelectorAll('.hit-row').forEach((el, i) => {
      el.onclick = () => selectHit(data[i]);
    });
  }

  // Verify mezikrok: než user potvrdí, ukáže se mini OSM mapa s markerem
  // na zvolené lokaci. Adresy jako "Hnojice 47" se v ČR vyskytují na víc
  // místech — vizuální ověření přes mapu uchrání před vygenerováním
  // špatné vesnice (a 30 min ztraceného času na ČÚZK pipeline).
  function selectHit(hit) {
    SELECTED_HIT = hit;
    const resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = `
      <div style="font-size:12px; color:#666; margin-bottom:8px;">
        Ověř, že je to opravdu ta lokace, kterou chceš generovat:
      </div>
      <div style="margin-bottom:6px;"><b>${escapeHtml(hit.label)}</b></div>
      <div id="verify-map" style="width:100%; height:280px; border-radius:6px;
           border:1px solid #ddd; margin-bottom:8px;"></div>
      <button class="btn" id="confirm-hit-btn">Potvrdit ✓</button>
      <button class="btn btn-secondary" id="back-to-results-btn">Zpět</button>
    `;
    // Tear down previous map (Leaflet hates re-init on the same div)
    if (VERIFY_MAP) { try { VERIFY_MAP.remove(); } catch (_) {} VERIFY_MAP = null; }
    // Address hits zoom to street level; parcel hits a bit wider so the
    // user sees neighboring parcels for context.
    const z = hit.kind === 'parcel' ? 17 : 18;
    VERIFY_MAP = L.map('verify-map').setView([hit.wgs_lat, hit.wgs_lon], z);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19,
    }).addTo(VERIFY_MAP);
    L.marker([hit.wgs_lat, hit.wgs_lon]).addTo(VERIFY_MAP)
      .bindPopup(escapeHtml(hit.label)).openPopup();
    document.getElementById('confirm-hit-btn').onclick = () => confirmHit(hit);
    document.getElementById('back-to-results-btn').onclick = () => {
      if (VERIFY_MAP) { try { VERIFY_MAP.remove(); } catch (_) {} VERIFY_MAP = null; }
      renderHitList(LAST_HITS);
    };
  }

  async function confirmHit(hit) {
    if (VERIFY_MAP) { try { VERIFY_MAP.remove(); } catch (_) {} VERIFY_MAP = null; }
    document.getElementById('search-results').innerHTML = '';
    // Auto-slug: slugify(obec), kolize-check přes /api/locations
    const locs = await fetch('/api/locations').then(r => r.json());
    const existing = new Set(locs.map(l => l.slug));
    const base = slugifyJS(hit.obec);
    let slug = base;
    let n = 2;
    while (existing.has(slug)) { slug = `${base}-${n}`; n++; }

    document.getElementById('selected-label').textContent = hit.label;
    document.getElementById('slug-input').value = slug;
    document.getElementById('label-input').value = hit.label;
    document.getElementById('sjtsk-display').textContent =
      `${hit.sjtsk_cx.toFixed(2)}, ${hit.sjtsk_cy.toFixed(2)}`;
    document.getElementById('selected-fields').style.display = 'block';
    document.getElementById('generate-btn').onclick = doGenerate;
  }

  function slugifyJS(text) {
    return text
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  async function doGenerate() {
    if (!SELECTED_HIT) return;
    const body = {
      slug: document.getElementById('slug-input').value.trim(),
      label: document.getElementById('label-input').value.trim(),
      cx: SELECTED_HIT.sjtsk_cx,
      cy: SELECTED_HIT.sjtsk_cy,
    };
    const r = await fetch('/api/jobs', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (r.status !== 200) {
      alert(`Chyba ${r.status}: ${data.error || 'unknown'}` +
            (data.suggestion ? `\nZkus slug: ${data.suggestion}` : ''));
      return;
    }
    renderForm(false);
    SELECTED_HIT = null;
    await renderLocations();
    startPolling();
  }

  // === Polling + Step Status ===
  let POLL_TIMER = null;
  let ACTIVE_JOBS = [];

  async function pollOnce() {
    try {
      const r = await fetch('/api/jobs?active=1');
      ACTIVE_JOBS = await r.json();
    } catch (e) {
      ACTIVE_JOBS = [];
    }
    renderActiveJobs();
    if (ACTIVE_JOBS.length > 0) {
      POLL_TIMER = setTimeout(pollOnce, 2000);
    } else {
      POLL_TIMER = null;
      await renderLocations();
    }
  }

  function startPolling() {
    if (POLL_TIMER === null) pollOnce();
  }

  function renderActiveJobs() {
    const container = document.getElementById('locations');
    const existing = Array.from(container.querySelectorAll('.location-row'));
    const existingBySlug = new Map(existing.map(el => [el.dataset.slug, el]));

    for (const job of ACTIVE_JOBS) {
      const row = renderJobRow(job);
      const old = existingBySlug.get(job.slug);
      if (old) old.replaceWith(row);
      else container.appendChild(row);
    }
  }

  function renderJobRow(job) {
    const div = document.createElement('div');
    div.className = 'location-row';
    div.dataset.slug = job.slug;
    div.dataset.jobId = job.job_id;
    const stepIcons = job.steps.map(s => {
      const icon = {
        pending: '⏳', running: '⏳', ok: '✓', fail: '✗',
        skipped: '↷', cancelled: '⊘',
      }[s.state] || '?';
      const color = (s.state === 'fail' || s.state === 'cancelled') ? '#c30'
                  : (s.state === 'running') ? '#1a73e8' : '#666';
      return `<span style="color:${color}">${icon} ${s.name}</span>`;
    }).join(' · ');
    const failedStep = job.steps.find(s => s.state === 'fail');
    const isDone = job.steps.every(s =>
      ['ok','fail','cancelled','skipped'].includes(s.state));
    const hasFail = !!failedStep;

    div.innerHTML = `
      <span class="label">${escapeHtml(job.label || job.slug)}</span>
      <span class="status status-generating" style="font-size:12px">${stepIcons}</span>
      ${hasFail ? `<button class="btn" data-action="retry">Retry</button>` : ''}
      ${!isDone ? `<button class="btn btn-secondary" data-action="cancel">Cancel</button>` : ''}
    `;
    if (failedStep) {
      div.title = `${failedStep.name}: ${failedStep.error || 'unknown error'}`;
    }
    div.querySelector('[data-action="retry"]')?.addEventListener('click',
      () => doRetry(job.job_id));
    div.querySelector('[data-action="cancel"]')?.addEventListener('click',
      () => doCancel(job.job_id));
    return div;
  }

  async function doRetry(job_id) {
    await fetch(`/api/jobs/${job_id}/retry`, {method: 'POST'});
    startPolling();
  }

  async function doCancel(job_id) {
    if (!confirm('Zrušit generování?')) return;
    await fetch(`/api/jobs/${job_id}/cancel`, {method: 'POST'});
    startPolling();
  }

  // Initial load
  (async () => {
    await renderLocations();
    const active = await fetch('/api/jobs?active=1').then(r => r.json()).catch(() => []);
    if (active.length > 0) startPolling();
  })();

  // Wire up button at the end
  document.getElementById('new-location-btn').onclick = () => renderForm(true);
  </script>
</body>
</html>
