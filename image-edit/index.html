<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Image Edit — inzerator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #14161c;
    --fg: #e7e9ee;
    --muted: #9aa0a8;
    --accent: #4aa3d9;
    --accent-hi: #6cf;
    --border: #2a2e36;
    --panel: #1a1d24;
    --error: #e07866;
    --ok: #6cd087;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font-family: -apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif; }
  h1 { font-size: 18px; margin: 0; padding: 14px 18px; border-bottom: 1px solid var(--border);
       background: var(--panel); }
  h1 small { color: var(--muted); font-weight: normal; margin-left: 12px; font-size: 12px; }
  main { max-width: 1400px; margin: 0 auto; padding: 18px; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; }
  .col { flex: 1 1 480px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
           padding: 14px; margin-bottom: 14px; }
  .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
              color: var(--muted); margin: 0 0 10px 0; font-weight: 600; }

  /* Drop zones */
  .drop { border: 2px dashed var(--border); border-radius: 8px; padding: 24px;
          text-align: center; cursor: pointer; transition: all 0.15s;
          color: var(--muted); font-size: 13px; background: rgba(0,0,0,0.15); }
  .drop:hover, .drop.over { border-color: var(--accent); color: var(--fg);
                            background: rgba(74,163,217,0.08); }
  .drop.has-file { border-style: solid; border-color: var(--ok); color: var(--fg); }
  .drop input { display: none; }

  .ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
              gap: 8px; margin-top: 10px; }
  .ref-item { position: relative; aspect-ratio: 1; border-radius: 4px; overflow: hidden;
              border: 1px solid var(--border); }
  .ref-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ref-item button { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
                     border-radius: 50%; border: 0; background: rgba(0,0,0,0.7); color: #fff;
                     font-size: 14px; cursor: pointer; line-height: 1; padding: 0; }

  /* Image previews */
  .preview { width: 100%; max-height: 420px; object-fit: contain; border-radius: 4px;
             background: #000; display: block; }
  .preview-side { display: flex; flex-direction: column; gap: 14px; }

  /* Controls */
  .ctl { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
         font-size: 13px; margin-top: 8px; }
  .ctl label { color: var(--muted); }
  .ctl select, .ctl input[type="text"] {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 4px; padding: 5px 8px; font-size: 13px; font-family: inherit;
  }
  button.primary { background: var(--accent); color: #fff; border: 0;
                   padding: 10px 18px; border-radius: 6px; font-size: 14px;
                   font-weight: 600; cursor: pointer; }
  button.primary:hover { background: var(--accent-hi); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border);
                 padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  button.ghost:hover { color: var(--fg); border-color: var(--accent); }

  /* Status + log */
  .status { font-size: 13px; color: var(--muted); padding: 8px 0; min-height: 20px; }
  .status.busy { color: var(--accent-hi); }
  .status.error { color: var(--error); }
  .status.ok { color: var(--ok); }

  /* Prompt preview */
  pre.prompt { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
               padding: 10px; font-size: 11px; line-height: 1.45; max-height: 200px;
               overflow: auto; color: var(--muted); margin: 0; white-space: pre-wrap; }
  details summary { cursor: pointer; color: var(--muted); font-size: 12px;
                    margin-bottom: 6px; user-select: none; }
  details summary:hover { color: var(--fg); }

  .token-bar { display: flex; gap: 8px; align-items: center; }
  .token-bar input { flex: 1; }
</style>
</head>
<body>
<h1>Image Edit <small>OpenAI gpt-image-1 high quality</small></h1>

<main>
  <div class="row">
    <div class="col">
      <div class="panel">
        <h2>Image A — target (povinné)</h2>
        <label class="drop" id="drop-a">
          <input type="file" accept="image/*" id="file-a">
          Přetáhni nebo klikni pro výběr obrázku
        </label>
        <img class="preview" id="prev-a" style="display:none;margin-top:10px;">
      </div>

      <div class="panel">
        <h2>Reference images (volitelné, max 5)</h2>
        <label class="drop" id="drop-ref">
          <input type="file" accept="image/*" id="file-ref" multiple>
          Reference fotky / orthofoto pro context
        </label>
        <div class="ref-grid" id="ref-grid"></div>
      </div>

      <div class="panel">
        <h2>Nastavení</h2>
        <div class="ctl">
          <label>Rozměr:</label>
          <select id="size" title="gpt-image-2: dimensions must be divisible by 16">
            <option value="auto" selected>Auto (dle vstupu)</option>
            <optgroup label="Square">
              <option value="1024x1024">1024×1024</option>
              <option value="2048x2048">2048×2048</option>
            </optgroup>
            <optgroup label="Landscape">
              <option value="1536x1024">1536×1024</option>
              <option value="2048x1376">2048×1376 (3:2)</option>
            </optgroup>
            <optgroup label="Portrait">
              <option value="1024x1536">1024×1536</option>
              <option value="1376x2048">1376×2048 (2:3)</option>
            </optgroup>
          </select>
          <label>Kvalita:</label>
          <select id="quality">
            <option value="high" selected>High</option>
            <option value="medium">Medium</option>
            <option value="auto">Auto</option>
          </select>
        </div>
      </div>

      <button class="primary" id="run" disabled>Vylepšit</button>
      <span class="status" id="status">Načítám stav serveru…</span>

      <div class="panel" style="margin-top:14px">
        <details>
          <summary>Server-side prompt (jen na náhled)</summary>
          <pre class="prompt" id="prompt-preview">…</pre>
        </details>
      </div>
    </div>

    <div class="col preview-side">
      <div class="panel">
        <h2>Výsledek</h2>
        <img class="preview" id="prev-out" style="display:none">
        <div class="status" id="out-status">Po kliknutí na „Vylepšit" se zde zobrazí výstup.</div>
        <div class="ctl" id="out-actions" style="display:none">
          <a href="#" download="image-edit-output.png" id="download" class="ghost">Stáhnout PNG</a>
          <span class="status" id="run-id" style="margin-left:auto"></span>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const statusEl = $('status');
const outStatusEl = $('out-status');
const runBtn = $('run');

// --- Status / prompt boot ---
let serverReady = false;
async function refreshStatus() {
  try {
    const r = await fetch('/api/image-edit/status');
    const s = await r.json();
    serverReady = !!s.ready;
    if (s.ready) {
      statusEl.className = 'status ok';
      statusEl.textContent = `Server připraven (OpenAI key nastaven, prompt ${s.prompt_loaded ? 'načten' : 'CHYBÍ'}).`;
    } else {
      statusEl.className = 'status error';
      statusEl.textContent = `Server nemá v env: OPENAI_API_KEY. Doplň do .env a restartuj.`;
    }
  } catch (e) {
    statusEl.className = 'status error';
    statusEl.textContent = `Status fetch failed: ${e.message}`;
  }
  updateRunButton();
}
async function loadPrompt() {
  try {
    const r = await fetch('/api/image-edit/prompt');
    $('prompt-preview').textContent = await r.text();
  } catch { $('prompt-preview').textContent = '(prompt fetch failed)'; }
}
refreshStatus();
loadPrompt();

// --- File handling ---
let imageA = null;          // File
const refs = [];            // File[]
const dropA = $('drop-a'), fileA = $('file-a'), prevA = $('prev-a');
const dropRef = $('drop-ref'), fileRef = $('file-ref'), refGrid = $('ref-grid');

function setImageA(f) {
  imageA = f;
  if (f) {
    prevA.src = URL.createObjectURL(f);
    prevA.style.display = 'block';
    dropA.classList.add('has-file');
    dropA.firstChild.textContent = `${f.name} (${(f.size/1024).toFixed(0)} KB) · klikni pro výměnu`;
  } else {
    prevA.style.display = 'none';
    dropA.classList.remove('has-file');
    dropA.firstChild.textContent = 'Přetáhni nebo klikni pro výběr obrázku';
  }
  updateRunButton();
}
function addRefs(files) {
  for (const f of files) {
    if (refs.length >= 5) break;
    refs.push(f);
  }
  renderRefs();
}
function renderRefs() {
  refGrid.innerHTML = '';
  refs.forEach((f, idx) => {
    const item = document.createElement('div');
    item.className = 'ref-item';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    item.appendChild(img);
    const btn = document.createElement('button');
    btn.textContent = '×';
    btn.title = 'Odebrat';
    btn.onclick = () => { refs.splice(idx, 1); renderRefs(); };
    item.appendChild(btn);
    refGrid.appendChild(item);
  });
}

fileA.addEventListener('change', e => { if (e.target.files[0]) setImageA(e.target.files[0]); });
fileRef.addEventListener('change', e => { addRefs(Array.from(e.target.files)); fileRef.value = ''; });

// Drag & drop on the whole label (which includes the file input)
function bindDrop(el, onDrop) {
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('over'); });
  el.addEventListener('dragleave', () => el.classList.remove('over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('over');
    if (e.dataTransfer.files.length) onDrop(e.dataTransfer.files);
  });
}
bindDrop(dropA, files => setImageA(files[0]));
bindDrop(dropRef, files => addRefs(Array.from(files)));

function updateRunButton() {
  runBtn.disabled = !(serverReady && imageA);
}

// --- Run ---
runBtn.addEventListener('click', async () => {
  if (!imageA) return;
  runBtn.disabled = true;
  outStatusEl.className = 'status busy';
  outStatusEl.textContent = 'Odesílám na OpenAI… (high quality typicky 20–60 s)';
  $('prev-out').style.display = 'none';
  $('out-actions').style.display = 'none';

  const fd = new FormData();
  fd.append('image_a', imageA);
  for (const f of refs) fd.append('refs', f);
  fd.append('size', $('size').value);
  fd.append('quality', $('quality').value);

  const t0 = performance.now();
  try {
    const r = await fetch('/api/image-edit', {
      method: 'POST',
      body: fd,
    });
    if (!r.ok) {
      let detail = '';
      try { const j = await r.json(); detail = j.error || ''; if (j.details) detail += ' — ' + j.details; }
      catch { detail = await r.text(); }
      throw new Error(`HTTP ${r.status}: ${detail}`);
    }
    const runId = r.headers.get('X-Run-Id') || '';
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    $('prev-out').src = url;
    $('prev-out').style.display = 'block';
    $('download').href = url;
    $('out-actions').style.display = 'flex';
    $('run-id').textContent = `run ${runId}`;
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
    outStatusEl.className = 'status ok';
    outStatusEl.textContent = `Hotovo za ${elapsed} s (${(blob.size/1024).toFixed(0)} KB).`;
  } catch (e) {
    outStatusEl.className = 'status error';
    outStatusEl.textContent = `Chyba: ${e.message}`;
  } finally {
    updateRunButton();
  }
});
</script>
</body>
</html>
