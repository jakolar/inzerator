// Sun position from time-of-day + day-of-year + location (lat/lon).
// Standard astronomical formulas (declination + hour angle → elevation +
// compass azimuth). Accuracy is plenty for visualization — solar noon
// is correct to ~minute, position to ~0.5°. Location lat/lon is fetched
// once from the server (pyproj-backed Křovák inverse); a default of
// 50°N, 15°E (rough Czech centre) seeds the UI while fetch is in flight.
let _sunLat = 50.0, _sunLon = 15.0;
fetch(`/api/sjtsk-to-wgs?cx=${cx}&cy=${cy}`)
  .then(r => r.json())
  .then(d => { _sunLat = d.lat; _sunLon = d.lon; recomputeSunDir(); })
  .catch(() => {});

const sunHourSlider = document.getElementById('sun-hour');
const sunHourVal = document.getElementById('sun-hour-val');
const sunDoySlider = document.getElementById('sun-doy');
const sunDoyVal = document.getElementById('sun-doy-val');
const sunReadout = document.getElementById('sun-readout');
let sunRebakeQueued = false;

function doyToDate(doy) {
  // Use a non-leap year for the conversion. doy=1 = Jan 1.
  const d = new Date(2025, 0, doy);
  return `${d.getDate()}.${d.getMonth() + 1}.`;
}

function solarPosition(hour, doy, lat, lon) {
  // Solar declination (Spencer 1971 simple form is good enough).
  const decl = THREE.MathUtils.degToRad(
    23.45 * Math.sin(THREE.MathUtils.degToRad(360 * (284 + doy) / 365))
  );
  // Treat slider hour as local solar time (longitude-corrected for any
  // CZ user is within ±15 min of CET — well below visualization
  // precision). Hour angle: 0 at solar noon, +15°/h after noon.
  const H = THREE.MathUtils.degToRad((hour - 12) * 15);
  const φ = THREE.MathUtils.degToRad(lat);
  const sinEl = Math.sin(φ) * Math.sin(decl)
              + Math.cos(φ) * Math.cos(decl) * Math.cos(H);
  const el = Math.asin(Math.max(-1, Math.min(1, sinEl)));
  // Azimuth from north, clockwise (compass convention).
  const y = -Math.sin(H) * Math.cos(decl);
  const x = Math.sin(decl) * Math.cos(φ) - Math.cos(decl) * Math.sin(φ) * Math.cos(H);
  const az = Math.atan2(y, x);
  return {
    el: THREE.MathUtils.radToDeg(el),
    az: (THREE.MathUtils.radToDeg(az) + 360) % 360,
  };
}

function recomputeSunDir() {
  const hour = parseFloat(sunHourSlider.value);
  const doy = parseInt(sunDoySlider.value, 10);
  const hh = Math.floor(hour);
  const mm = Math.round((hour - hh) * 60);
  sunHourVal.textContent = `${hh}:${mm.toString().padStart(2, '0')}`;
  sunDoyVal.textContent = `${doy} (${doyToDate(doy)})`;
  const { el, az } = solarPosition(hour, doy, _sunLat, _sunLon);
  const below = el < 0;
  sunReadout.textContent = below
    ? `az ${az.toFixed(0)}° / el ${el.toFixed(0)}° (pod obzorem)`
    : `az ${az.toFixed(0)}° / el ${el.toFixed(0)}°`;
  // Sub-horizon sun gets a negative y-component; lambert in the shader
  // is max(dot(n, uSunDir), 0) so the diffuse term naturally drops to
  // zero and only ambient remains → twilight / night look without
  // special-casing.
  const polar = THREE.MathUtils.degToRad(90 - el);
  const theta = THREE.MathUtils.degToRad(180 - az);
  window._heightfieldSunDir.set(
    Math.sin(polar) * Math.sin(theta),
    Math.cos(polar),
    Math.sin(polar) * Math.cos(theta),
  ).normalize();
}
recomputeSunDir();   // sync sliders → initial uniform on startup

function queueRebake() {
  if (sunRebakeQueued) return;
  sunRebakeQueued = true;
  requestAnimationFrame(() => {
    sunRebakeQueued = false;
    if (Object.keys(shadowMaps).length) {
      shadowMapsBakedForBare = null;
      bakeShadowMaps();
    }
  });
}
sunHourSlider.addEventListener('input', () => { recomputeSunDir(); queueRebake(); });
sunDoySlider.addEventListener('input',  () => { recomputeSunDir(); queueRebake(); });

// (Bare-earth → shadow re-bake handled directly in the main bareToggle
// listener above so it sequences with the bare-load await.)

// ── OSM raster overlay (replaces ortho with neutral basemap) ──
// Fetches OSM tiles reprojected to S-JTSK via /proxy/osm. Useful with
// shadows: neutral basemap shows the relief, ortho photo competes with
// hillshade visually. Initial ortho texture per ring is captured at
// startup so toggling back restores exactly what was on screen (incl.
// any tier that was active via the orthoTier system).
const osmTextures = {};         // slug → THREE.Texture
const initialOrthoTex = {};     // slug → THREE.Texture (snapshot at first toggle)
const osmToggle = document.getElementById('osm-toggle');
osmToggle.addEventListener('change', async () => {
  if (osmToggle.checked) {
    // try/finally ensures `disabled` flips back even if /proxy/osm fails
    // mid-fetch — without this the toggle gets stuck and user can't
    // re-click to turn it off.
    osmToggle.disabled = true;
    try {
      for (let i = 0; i < rings.length; i++) {
        const r = rings[i];
        if (!initialOrthoTex[r.slug]) {
          initialOrthoTex[r.slug] = ringMeshes[i].material.uniforms.uOrtho.value;
        }
        if (!osmTextures[r.slug]) {
          const bbox = [cx - r.half, cy - r.half, cx + r.half, cy + r.half].join(',');
          const url = `/proxy/osm?BBOX=${bbox}&size=4096`;
          const tex = await loadTex(url);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
          tex.flipY = false;
          osmTextures[r.slug] = tex;
        }
        const mat = ringMeshes[i].material;
        mat.uniforms.uOrtho.value = osmTextures[r.slug];
        mat.uniforms.uOrthoFlipY.value = osmTextures[r.slug].isCompressedTexture ? (_KTX2_FLIP & 1) : 0.0;
      }
    } catch (e) {
      console.error('[osm] load failed:', e);
      // Uncheck since we didn't fully swap; user sees the failure and can retry.
      osmToggle.checked = false;
    } finally {
      osmToggle.disabled = false;
    }
  } else {
    for (let i = 0; i < rings.length; i++) {
      const r = rings[i];
      const tex = initialOrthoTex[r.slug];
      // Skip stale references — after Page Visibility unload the original
      // texture was disposed; fall back to whatever the current orthoTier
      // points at.
      if (!tex || tex.image === undefined) continue;
      const mat = ringMeshes[i].material;
      mat.uniforms.uOrtho.value = tex;
      mat.uniforms.uOrthoFlipY.value = tex.isCompressedTexture ? (_KTX2_FLIP & 1) : 0.0;
    }
  }
  // Repaint any active parcel outline so colour + bloom match the new
  // basemap (black/no-glow on OSM, HDR white/glow on orthophoto).
  if (selectedParcels.size > 0) redrawOutlines();
});

// ── Parcel selection (for screenshots) ──
// Click on terrain in selection mode → toggle parcel highlight. Outlines
// are drawn as ground-draped tubes; bright white + no tone mapping so
// they pop against any ortho/OSM/shaded background. Uses /api/parcels
// (same backend as v2.html), cached after first toggle. Click hits the
// nearest *containing* parcel; ties broken by smallest area so nested
// parcels select the inner one.
const parcelsToggle = document.getElementById('parcels-toggle');
const parcelsCount = document.getElementById('parcels-count');
const parcelsClear = document.getElementById('parcels-clear');
const outlineGroup = new THREE.Group();
outlineGroup.renderOrder = 99;
scene.add(outlineGroup);
let parcels = null;     // [{ id, label, area_m2, ring_local: [[x,z,absY], ...] }, ...]
const parcelsById = new Map();
const selectedParcels = new Set();
const raycaster = new THREE.Raycaster();
const ndcMouse = new THREE.Vector2();

async function ensureParcels() {
  if (parcels) return parcels;
  parcelsCount.textContent = ' (načítám…)';
  // Use the largest ring's extent as fetch radius — covers everything
  // user can click on. half is already in metres.
  const radius = Math.max(...rings.map(r => r.half));
  const url = `/api/parcels?gcx=${cx}&gcy=${cy}&radius=${radius}`;
  const r = await fetch(url);
  if (!r.ok) {
    parcelsCount.textContent = ` (chyba ${r.status})`;
    return null;
  }
  parcels = await r.json();
  for (const p of parcels) if (p.id) parcelsById.set(p.id, p);
  parcelsCount.textContent = ` (${parcels.length} parcel)`;
  return parcels;
}

function pointInRing(px, pz, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], zi = ring[i][1];
    const xj = ring[j][0], zj = ring[j][1];
    const intersect = ((zi > pz) !== (zj > pz)) &&
      (px < (xj - xi) * (pz - zi) / (zj - zi + 1e-9) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function pickParcelAt(sx, sz) {
  if (!parcels) return null;
  let pick = null, pickArea = Infinity;
  for (const p of parcels) {
    if (!p.ring_local || p.ring_local.length < 3) continue;
    if (pointInRing(sx, sz, p.ring_local) && p.area_m2 < pickArea) {
      pick = p;
      pickArea = p.area_m2;
    }
  }
  return pick;
}

// Drape a parcel ring onto the heightfield. Subdivides each edge every
// SUB_M metres + samples sampleAt() so the tube hugs the terrain. LIFT
// pushes the tube slightly above the surface so polygon-offset isn't
// strictly needed — at typical view distance the bias is invisible but
// keeps z-fighting at bay.

// Two ring vertices are "the same edge endpoint" when their XZ match to
// the centimetre. RUIAN's parcel API returns shared boundary vertices
// with identical XZ but ring-internal Y can disagree by mm — we quantise
// XZ only (Y is taken from the heightfield drape anyway).
function _parcelEdgeKey(a, b) {
  const qx = (v) => `${Math.round(v[0] * 100)}:${Math.round(v[1] * 100)}`;
  const ka = qx(a), kb = qx(b);
  return ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
}

// Parcel style presets — each one is a complete look-and-feel for the
// selection outline. Set via the dropdown next to 🟦 Parcely. 'auto' is
// the default: classic on orthophoto, hero on OSM.
const PARCEL_STYLES = {
  // Subtle HDR white line + soft bloom halo, no fill. Default ortho look.
  classic: { line: { rgb: [1.05, 1.05, 1.05], width: 1.6, bloom: true },
             fill: null, halo: null },
  // Yellow translucent fill, white halo line behind, bold orange stroke.
  // Default OSM look — pops on busy light backgrounds.
  hero:    { line: { hex: 0xd97706, width: 4.0, bloom: false },
             fill: { hex: 0xf6c343, opacity: 0.30 },
             halo: { hex: 0xffffff, width: 6, opacity: 0.85 } },
  // Vibrant tyrkysová with HDR core — strong bloom for tech/startup vibes.
  neon:    { line: { rgb: [1.8, 4.0, 5.5], width: 2.0, bloom: true },
             fill: { hex: 0x14b8a6, opacity: 0.12 },
             halo: null },
  // Solid dark line, no glow — for print / PDF / documents.
  print:   { line: { hex: 0x1e293b, width: 2.6, bloom: false },
             fill: null, halo: null },
  // Yellow line with a black offset shadow — old cadastre map convention.
  cadastre:{ line: { hex: 0xfbbf24, width: 2.2, bloom: false },
             fill: null,
             halo: { hex: 0x000000, width: 4.0, opacity: 0.7 } },
  // Bare-earth drape: scene stays as DSM (vegetation/buildings visible),
  // but the outline samples DMR5G bare-earth Y per vertex — the line
  // hugs the actual ground under trees instead of climbing tree
  // canopies. depthTest off so the line is visible THROUGH foliage.
  bare:    { line: { rgb: [1.0, 1.0, 1.0], width: 2.0, bloom: false, throughTrees: true },
             fill: null, halo: null,
             useBareDrape: true },
  // Classic outline + a vertical pin marker (stick + sphere head) over
  // the parcel centroid — like a 3D map pin. Pin is bloom-tinted so it
  // pops over photo + OSM. Use case: hero shot of "this is the plot".
  pin:     { line: { rgb: [1.05, 1.05, 1.05], width: 1.6, bloom: true },
             fill: null, halo: null,
             decoration: 'pin' },
  // Classic outline + translucent vertical light cone over the parcel.
  // Bottom narrow, top wide, additive blend — reads as a beam of light
  // pointing at the property.
  beam:    { line: { rgb: [1.05, 1.05, 1.05], width: 1.6, bloom: true },
             fill: { hex: 0xfacc15, opacity: 0.12 },
             halo: null,
             decoration: 'beam' },
  // Classic outline + parcel number label sprite over the centroid.
  // Reads like a cadastral overlay: outline + visible identifier.
  label:   { line: { hex: 0xfbbf24, width: 2.0, bloom: false },
             fill: null,
             halo: { hex: 0x000000, width: 3.5, opacity: 0.6 },
             decoration: 'label' },
};

function _resolveStyle(name, onOsm) {
  if (name === 'auto') return PARCEL_STYLES[onOsm ? 'hero' : 'classic'];
  return PARCEL_STYLES[name] || PARCEL_STYLES.classic;
}

function redrawOutlines() {
  while (outlineGroup.children.length) {
    const m = outlineGroup.children.pop();
    // Group nodes (decoration containers like pin) hold their own
    // children and userData.disposables list; drill in.
    if (m.isGroup) {
      for (const child of m.children) {
        child.geometry?.dispose?.();
        if (child.material && !PERSISTENT_MATERIALS.has(child.material)) child.material.dispose?.();
      }
      for (const d of (m.userData.disposables || [])) d.dispose?.();
    } else {
      m.geometry?.dispose?.();
      if (m.material && !PERSISTENT_MATERIALS.has(m.material)) m.material.dispose?.();
      for (const d of (m.userData?.disposables || [])) d.dispose?.();
    }
  }
  const onOsm = osmToggle?.checked === true;
  const style = _resolveStyle(_parcelStyle, onOsm);
  // DSM drape stays the default — bare-earth drape "amputates" the
  // outline at houses (the line sits on the ground while the building
  // looms 5-10 m above it, looks unnatural). DSM follows roofs and
  // canopy, which reads as the parcel boundary "wrapping" features
  // on it. The 'bare' style is the explicit opt-in for the line
  // shining through canopy on actual ground.
  //
  // The zigzag we used to see on DSM-draped lines was per-sample
  // noise from canopy / mesh artefacts, not the wrap itself. That's
  // tackled below by a 3-sample median smoothing in drapeEdge.
  const useBareDrape = !!style.useBareDrape;
  if (useBareDrape && !_bareDataPromise && !_bareDataReady()) {
    _bareDataPromise = ensureBareDataLoaded().then(() => {
      if (selectedParcels.size > 0) redrawOutlines();
    }).finally(() => { _bareDataPromise = null; });
  }
  // Lazy-create the material trio. Settings are tuned per-style on each
  // redraw (cheap — just colour + linewidth swaps).
  if (!_parcelLineMat) {
    _parcelLineMat = new LineMaterial({
      color: 0xffffff, linewidth: 1.0, worldUnits: false, toneMapped: false,
      depthTest: true, depthWrite: false,
      polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -512,
    });
    _parcelLineMat.resolution.set(window.innerWidth, window.innerHeight);
    PERSISTENT_MATERIALS.add(_parcelLineMat);
  }
  if (!_parcelHaloMat) {
    _parcelHaloMat = new LineMaterial({
      color: 0xffffff, linewidth: 6, worldUnits: false, toneMapped: false,
      depthTest: true, depthWrite: false, transparent: true, opacity: 0.85,
      polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -480,
    });
    _parcelHaloMat.resolution.set(window.innerWidth, window.innerHeight);
    PERSISTENT_MATERIALS.add(_parcelHaloMat);
  }
  if (!_parcelFillMat) {
    _parcelFillMat = new THREE.MeshBasicMaterial({
      color: 0xf6c343, transparent: true, opacity: 0.30,
      side: THREE.DoubleSide, depthTest: true, depthWrite: false,
      toneMapped: false,
      polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -384,
    });
    PERSISTENT_MATERIALS.add(_parcelFillMat);
  }
  // Apply line style.
  const ls = style.line;
  if (ls.rgb) _parcelLineMat.color.setRGB(...ls.rgb);
  else if (ls.hex !== undefined) _parcelLineMat.color.setHex(ls.hex);
  _parcelLineMat.linewidth = ls.width;
  _parcelLineMat.transparent = false;
  _parcelLineMat.opacity = 1.0;
  // 'throughTrees' flag — bare-earth style needs the outline to render
  // visibly even when occluded by DSM vegetation / buildings in front.
  // We swap depthTest dynamically so non-bare styles keep proper 3D
  // occlusion (looks more grounded).
  _parcelLineMat.depthTest = !ls.throughTrees;
  _parcelLineMat.needsUpdate = true;
  // Apply halo style.
  if (style.halo) {
    _parcelHaloMat.color.setHex(style.halo.hex);
    _parcelHaloMat.linewidth = style.halo.width;
    _parcelHaloMat.opacity = style.halo.opacity;
    _parcelHaloMat.needsUpdate = true;
  }
  // Apply fill style.
  if (style.fill) {
    _parcelFillMat.color.setHex(style.fill.hex);
    _parcelFillMat.opacity = style.fill.opacity;
    _parcelFillMat.needsUpdate = true;
  }
  // Pass 1: count edge occurrences across all selected parcels. Adjacent
  // parcels share their common boundary; the inner edges occur twice and
  // we skip them so the silhouette draws as one continuous perimeter.
  const edgeCount = new Map();
  const selectedEntries = [];
  for (const id of selectedParcels) {
    const p = parcelsById.get(id);
    if (!p || !p.ring_local || p.ring_local.length < 3) continue;
    selectedEntries.push(p);
    const ring = p.ring_local;
    for (let i = 0; i < ring.length; i++) {
      const k = _parcelEdgeKey(ring[i], ring[(i + 1) % ring.length]);
      edgeCount.set(k, (edgeCount.get(k) || 0) + 1);
    }
  }
  // Pass 2: collect ALL perimeter sub-segments into one flat positions
  // array. Single LineSegments2 instance keeps draw-call count at O(1)
  // regardless of how many parcels are selected.
  const positions = [];
  for (const p of selectedEntries) {
    const ring = p.ring_local;
    for (let i = 0; i < ring.length; i++) {
      const a = ring[i];
      const b = ring[(i + 1) % ring.length];
      if (edgeCount.get(_parcelEdgeKey(a, b)) !== 1) continue;
      const pts = drapeEdge(a, b, useBareDrape);
      for (let j = 0; j < pts.length - 1; j++) {
        const A = pts[j], B = pts[j + 1];
        positions.push(A.x, A.y, A.z, B.x, B.y, B.z);
      }
    }
  }
  // Fill — drawn first (lowest renderOrder) so halo + main stroke
  // overlay it cleanly.
  if (style.fill) {
    for (const p of selectedEntries) {
      const fill = buildParcelFillMesh(p.ring_local);
      if (fill) { fill.renderOrder = 97; outlineGroup.add(fill); }
    }
  }
  if (positions.length > 0) {
    // Halo line — wider, semi-transparent, behind main stroke. Used by
    // hero/cadastre/bare styles for readability.
    if (style.halo) {
      const haloGeo = new LineSegmentsGeometry();
      haloGeo.setPositions(positions);
      const halo = new LineSegments2(haloGeo, _parcelHaloMat);
      halo.renderOrder = 98;
      outlineGroup.add(halo);
    }
    // Main outline.
    const geo = new LineSegmentsGeometry();
    geo.setPositions(positions);
    const line = new LineSegments2(geo, _parcelLineMat);
    line.renderOrder = 99;
    if (style.line.bloom) line.layers.enable(BLOOM_LAYER);
    outlineGroup.add(line);
  }
  // Per-parcel decoration (pin / beam / label). Anchored at the
  // ring centroid, sampled to terrain Y so it stands on real ground.
  if (style.decoration) {
    for (const p of selectedEntries) {
      const c = _parcelCentroid(p.ring_local);
      if (!c) continue;
      let deco = null;
      if (style.decoration === 'pin')   deco = _buildParcelPin(c);
      else if (style.decoration === 'beam')  deco = _buildParcelBeam(c, p.ring_local);
      else if (style.decoration === 'label') deco = _buildParcelLabel(c, p.label || p.name);
      if (deco) outlineGroup.add(deco);
    }
  }
  parcelsClear.style.display = selectedParcels.size ? '' : 'none';
  const captureBtn = document.getElementById('parcels-capture');
  if (captureBtn) captureBtn.style.display = selectedParcels.size ? '' : 'none';
}

// Centroid of a parcel ring in scene-local coords + Y from terrain.
// Average of XZ (good enough for convex parcels; for star-shaped or
// L-shaped lots the centroid can land outside — acceptable here since
// the decoration is purely indicative, not geometrically exact).
function _parcelCentroid(ring) {
  if (!ring || ring.length < 3) return null;
  let sx = 0, sz = 0;
  for (const v of ring) { sx += v[0]; sz += v[1]; }
  sx /= ring.length; sz /= ring.length;
  let y = sampleAt(sx, sz);
  if (y == null) y = ring[0][2] || 0;
  return { x: sx, y, z: sz };
}

// 📍 Pin: vertical white stick + glowing sphere head over centroid.
// Pin head sits on BLOOM_LAYER so the bloom pass paints a soft halo
// around it without over-clipping the core.
function _buildParcelPin(c) {
  const PIN_H = 120;
  const group = new THREE.Group();
  group.position.set(c.x, c.y - yMid, c.z);
  // Stick — slim, white, depthTest:false so it reads through buildings/trees
  if (!_pinStickMat) {
    _pinStickMat = new LineMaterial({
      color: 0xffffff, linewidth: 2.0, worldUnits: false, toneMapped: false,
      depthTest: false, transparent: true, opacity: 0.95,
    });
    _pinStickMat.resolution.set(window.innerWidth, window.innerHeight);
    PERSISTENT_MATERIALS.add(_pinStickMat);
  }
  const stickGeo = new LineSegmentsGeometry();
  stickGeo.setPositions([0, 0, 0, 0, PIN_H, 0]);
  const stick = new LineSegments2(stickGeo, _pinStickMat);
  stick.renderOrder = 100;
  group.add(stick);
  // Pin head — small sphere, HDR emissive so bloom adds halo
  if (!_pinHeadGeo) _pinHeadGeo = new THREE.SphereGeometry(3.5, 18, 12);
  if (!_pinHeadMat) {
    _pinHeadMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(2.0, 2.0, 2.0),
      toneMapped: false, depthTest: false, transparent: true,
    });
    PERSISTENT_MATERIALS.add(_pinHeadMat);
  }
  const head = new THREE.Mesh(_pinHeadGeo, _pinHeadMat);
  head.position.y = PIN_H + 2;
  head.renderOrder = 101;
  head.layers.enable(BLOOM_LAYER);
  group.add(head);
  group.userData.disposables = [stickGeo];
  return group;
}

// 💡 Beam: vertical cone of warm light over the parcel. Big at top,
// narrow at the ring centroid. Additive blending + HDR colour so it
// reads as a beam of light. Bloom layer adds outward glow.
function _buildParcelBeam(c, ring) {
  const BEAM_H = 250;
  // Beam radius is proportional to the parcel's footprint — never less
  // than 6 m so tiny lots still get a visible cone, never more than
  // 30 m so a large parcel doesn't get a stadium spotlight.
  let maxR = 0;
  for (const v of ring) {
    const dx = v[0] - c.x, dz = v[1] - c.z;
    maxR = Math.max(maxR, Math.hypot(dx, dz));
  }
  const topR = Math.max(6, Math.min(30, maxR * 0.5));
  if (!_beamMat) {
    _beamMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(1.8, 1.4, 0.6),     // warm amber HDR
      transparent: true, opacity: 0.18, side: THREE.DoubleSide,
      depthWrite: false, blending: THREE.AdditiveBlending,
      toneMapped: false,
    });
    PERSISTENT_MATERIALS.add(_beamMat);
  }
  // Open cylinder; bottom narrower than top so the cone widens upward.
  const geo = new THREE.CylinderGeometry(topR, 0.5, BEAM_H, 28, 1, true);
  const beam = new THREE.Mesh(geo, _beamMat);
  beam.position.set(c.x, c.y - yMid + BEAM_H / 2, c.z);
  beam.renderOrder = 96;
  beam.layers.enable(BLOOM_LAYER);
  beam.userData.disposables = [geo];
  return beam;
}

// 🔢 Label: sprite with the parcel number over the centroid. Same
// pill style as POI markers but smaller and uses the cadastre yellow
// accent so it visually fits the cadastre look.
function _buildParcelLabel(c, text) {
  const t = String(text || '?');
  const pad = 6;
  const font = '700 26px -apple-system, system-ui, sans-serif';
  const probe = document.createElement('canvas').getContext('2d');
  probe.font = font;
  const tw = probe.measureText(t).width;
  const innerW = Math.ceil(tw) + pad * 2 + 4;
  const innerH = 34;
  const margin = 6;
  const w = innerW + margin * 2, h = innerH + margin * 2;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = 'rgba(251, 191, 36, 0.95)';
  const r = 8;
  ctx.beginPath();
  ctx.moveTo(margin + r, margin);
  ctx.lineTo(margin + innerW - r, margin); ctx.arcTo(margin + innerW, margin, margin + innerW, margin + r, r);
  ctx.lineTo(margin + innerW, margin + innerH - r); ctx.arcTo(margin + innerW, margin + innerH, margin + innerW - r, margin + innerH, r);
  ctx.lineTo(margin + r, margin + innerH); ctx.arcTo(margin, margin + innerH, margin, margin + innerH - r, r);
  ctx.lineTo(margin, margin + r); ctx.arcTo(margin, margin, margin + r, margin, r);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.font = font;
  ctx.fillStyle = '#0c1015';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(t, margin + innerW / 2, margin + innerH / 2 + 1);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({
    map: tex, depthTest: false, transparent: true, toneMapped: false,
  });
  const sprite = new THREE.Sprite(mat);
  // World-units scale — match the pill canvas aspect, ~20 m tall.
  sprite.scale.set(20 * (w / h), 20, 1);
  sprite.position.set(c.x, c.y - yMid + 18, c.z);
  sprite.renderOrder = 102;
  sprite.userData.disposables = [tex, mat];
  return sprite;
}

// Build a translucent fill mesh for a single parcel ring (in OSM mode).
// Triangulates the 2D polygon via THREE.ShapeUtils.triangulateShape, then
// uplifts each vertex to terrain Y (sampleAt) + a small lift so the fill
// sits cleanly above the heightfield without z-fighting. Returns null on
// degenerate / failed triangulation (very small parcels, sampleAt miss).
function buildParcelFillMesh(ring) {
  if (!ring || ring.length < 3) return null;
  const FILL_LIFT = 0.5;
  // 2D contour for triangulation (we only need XZ; Y comes from terrain
  // sample per-vertex below).
  const contour = ring.map(p => new THREE.Vector2(p[0], p[1]));
  let tris;
  try {
    tris = THREE.ShapeUtils.triangulateShape(contour, []);
  } catch (e) {
    return null;
  }
  if (!tris || !tris.length) return null;
  // Build BufferGeometry: per-vertex (x, sampledY + lift, z). Falls back
  // to ring-vertex Y when sampleAt misses (returns null), and finally to
  // 0 with a -? log — extremely rare and only at ring edges.
  const positions = new Float32Array(ring.length * 3);
  for (let i = 0; i < ring.length; i++) {
    const x = ring[i][0];
    const z = ring[i][1];
    let y = sampleAt(x, z);
    if (y == null) y = (ring[i].length > 2 && ring[i][2] > 0) ? ring[i][2] : 0;
    positions[i*3]   = x;
    positions[i*3+1] = y - yMid + FILL_LIFT;
    positions[i*3+2] = z;
  }
  const indices = new Uint32Array(tris.length * 3);
  for (let i = 0; i < tris.length; i++) {
    indices[i*3]   = tris[i][0];
    indices[i*3+1] = tris[i][1];
    indices[i*3+2] = tris[i][2];
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setIndex(new THREE.BufferAttribute(indices, 1));
  return new THREE.Mesh(geo, _parcelFillMat);
}

// Drape one edge (between two consecutive ring vertices) onto the
// heightfield. Split off from drapeRing so the edge-dedup loop above
// can emit per-edge tubes without having to subdivide entire rings.
function drapeEdge(a, b, useBare) {
  // 3 m sub-step on DSM is enough to follow roofs / canopy without
  // sampling every individual tree-tip noise spike. Bare-earth is
  // smoother so we can go even coarser there.
  const SUB_M = useBare ? 4.0 : 3.0;
  const LIFT = useBare ? 0.6 : 0.8;
  const sampler = useBare ? sampleBareAt : sampleAt;
  const dx = b[0] - a[0];
  const dz = b[1] - a[1];
  const dist = Math.hypot(dx, dz);
  const steps = Math.max(1, Math.ceil(dist / SUB_M));

  // Pass 1: raw height samples along the edge. Fallback to the linear
  // server-provided ring-vertex Y for samples that miss (outside ring,
  // bare not yet loaded).
  const raw = new Array(steps + 1);
  for (let s = 0; s <= steps; s++) {
    const t = s / steps;
    const x = a[0] + dx * t;
    const z = a[1] + dz * t;
    const absY = sampler(x, z);
    raw[s] = absY !== null ? absY : (a[2] + (b[2] - a[2]) * t);
  }

  // Pass 2: 3-sample sliding median to kill isolated spikes (single
  // tree poking through the perimeter, mesh artefact, roof corner).
  // The median preserves real cliffs / building edges while removing
  // 1-cell outliers — exactly what produced the "zigzag teeth" we
  // were seeing along straight lot boundaries through vegetation.
  // Pinned endpoints so the outline still meets the ring vertices.
  const med = new Array(steps + 1);
  med[0] = raw[0];
  med[steps] = raw[steps];
  for (let s = 1; s < steps; s++) {
    const a_ = raw[s - 1], b_ = raw[s], c_ = raw[s + 1];
    // 3-element median via two comparisons
    med[s] = (a_ <= b_)
      ? (b_ <= c_ ? b_ : (a_ <= c_ ? c_ : a_))
      : (a_ <= c_ ? a_ : (b_ <= c_ ? c_ : b_));
  }

  const pts = new Array(steps + 1);
  for (let s = 0; s <= steps; s++) {
    const t = s / steps;
    pts[s] = new THREE.Vector3(
      a[0] + dx * t, med[s] - yMid + LIFT, a[1] + dz * t
    );
  }
  return pts;
}

// CPU ringMesh geometries are flat planes (vertex shader does the height
// displacement, raycaster doesn't know about that). A naive ray×mesh hit
// would give the XZ where the *flat* plane intersects the ray, which at
// steep view angles can be tens of metres off from where the user
// actually clicked on the terrain. We fix this with a few iterations:
// hit flat plane at y=0, sample terrain at that XZ, intersect the ray
// with the plane at the sampled Y, repeat until it converges.
function rayPickTerrainXZ(ray) {
  let yTarget = 0;
  let hitX = 0, hitZ = 0;
  for (let i = 0; i < 6; i++) {
    const denom = ray.direction.y;
    if (Math.abs(denom) < 1e-6) return null;
    const t = (yTarget - ray.origin.y) / denom;
    if (t < 0) return null;
    hitX = ray.origin.x + ray.direction.x * t;
    hitZ = ray.origin.z + ray.direction.z * t;
    const absY = sampleAt(hitX, hitZ);
    if (absY === null) return { x: hitX, z: hitZ };
    const newY = absY - yMid;
    if (Math.abs(newY - yTarget) < 0.1) return { x: hitX, z: hitZ };
    yTarget = newY;
  }
  return { x: hitX, z: hitZ };
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (!parcelsToggle.checked || !parcels) return;
  if (e.button !== 0) return;
  // Skip clicks that look like drag-start (OrbitControls): we only act
  // on pointerup if the cursor barely moved. 4 px threshold matches what
  // OrbitControls uses internally to distinguish click vs. drag.
  const downX = e.clientX, downY = e.clientY;
  const onUp = async (eUp) => {
    renderer.domElement.removeEventListener('pointerup', onUp);
    if (Math.hypot(eUp.clientX - downX, eUp.clientY - downY) > 4) return;
    // Pointer event coords need to be captured before any await — the
    // event object is recycled by the browser after handler returns.
    const upX = eUp.clientX, upY = eUp.clientY;
    // Safety net: parcels toggle should have already triggered heightData
    // load, but if it hasn't (e.g. concurrent click during enable), wait
    // before raycast so refinement uses real terrain Y.
    if (rings.some(r => !ringData[r.slug].heightData)) {
      await ensureHeightDataLoaded();
    }
    const rect = renderer.domElement.getBoundingClientRect();
    ndcMouse.x =  ((upX - rect.left) / rect.width)  * 2 - 1;
    ndcMouse.y = -((upY - rect.top)  / rect.height) * 2 + 1;
    raycaster.setFromCamera(ndcMouse, camera);
    const hit = rayPickTerrainXZ(raycaster.ray);
    if (!hit) return;
    const p = pickParcelAt(hit.x, hit.z);
    if (!p || !p.id) return;
    if (selectedParcels.has(p.id)) selectedParcels.delete(p.id);
    else selectedParcels.add(p.id);
    redrawOutlines();
  };
  renderer.domElement.addEventListener('pointerup', onUp);
});

async function switchOrthoTier(tier) {

  await Promise.all(rings.map(async (r, i) => {
    const tiers = r.ortho_tiers;
    if (!tiers || !tiers[tier]) return;     // ring lacks this tier; keep current
    const key = `${r.slug}|${tier}`;

      const tex = await loadTex(pickTierUrl(tiers[tier]));
      tex.colorSpace = THREE.SRGBColorSpace;

      tex.flipY = false;

  // per ring (ETC1S) or 50 MB raw RGB if KTX2 missing — keeping low/mid
  // around for "what-if-I-toggle-back" wastes ~15-30 MB total. Re-loading
  // is fast (disk cache + KTX2 transcode ~50 ms) so the trade-off favors

  let freed = 0;

// ── Cadastre overlay toggle ──
// Each ring fetches its own SJTSK-aligned cadastre PNG from inzerator's
// /proxy/cadastre. Same UV space as our SJTSK-aligned heightmap+ortho, so
// no reprojection. Cached after first load.
const cadTextures = {};   // slug → THREE.DataTexture (R8 alpha-only)
const cadToggle = document.getElementById('cad-toggle');
const cadStatus = document.getElementById('cad-status');

// Browsers cap createImageBitmap resize. 4096² is a safe target across
// Chrome/Safari/Firefox. Cadastre lines at 4k still render crisp at typical
// view distance: 1 px = 0.37 m, much finer than the actual ~10-50 cm parcel
// line width in real-world units.
const CAD_TARGET = 4096;

async function loadCadastreAlphaTex(url) {
  const t0 = performance.now();
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`cadastre fetch ${resp.status}`);
  const blob = await resp.blob();
  // Downsample at decode time: browser does the resize natively (avoids
  // shipping the full 8192² bitmap to JS heap). Same width across H/V keeps
  // the source square; cadastre PNGs are square SJTSK tiles by construction.
  let bitmap = await createImageBitmap(blob, {
    resizeWidth: CAD_TARGET, resizeHeight: CAD_TARGET, resizeQuality: 'medium'
  });
  const W = bitmap.width, H = bitmap.height;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d', { willReadFrequently: false });
  ctx.drawImage(bitmap, 0, 0);
  bitmap.close();
  const imgData = ctx.getImageData(0, 0, W, H).data;
  // Pack alpha-only into a tightly typed array. RGBA stride 4 → byte stride 1
  // is the per-pixel memory win; the createImageBitmap resize above is the
  // resolution win. Combined: 8192² RGBA (256 MB) → 4096² R8 (16 MB) per
  // ring = 16× reduction.
  const alpha = new Uint8Array(W * H);
  for (let i = 0, j = 3; i < alpha.length; i++, j += 4) alpha[i] = imgData[j];
  const tex = new THREE.DataTexture(alpha, W, H,
    THREE.RedFormat, THREE.UnsignedByteType);
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = true;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  tex.colorSpace = THREE.NoColorSpace;
  tex.flipY = false;
  tex.needsUpdate = true;
  console.info(`[cad] loaded ${W}×${H} R8 in ${(performance.now()-t0).toFixed(0)} ms ` +
    `(${(W*H/1048576).toFixed(1)} MB GPU)`);
  return tex;
}

// Load cadastre as KTX2 (ETC1S transcoded to BC1/EAC on the GPU). Reuses the
// global ktx2Loader (same one used for ortho). Output is a grayscale image
// where shader reads .r as opacity. Saves 8× GPU vs. PNG R8.
async function loadCadastreKtx2Tex(url) {
  const t0 = performance.now();
  const tex = await ktx2Loader.loadAsync(url);
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  tex.colorSpace = THREE.NoColorSpace;
  tex.needsUpdate = true;
  console.info(`[cad] loaded KTX2 ${tex.image.width}×${tex.image.height} in ` +
    `${(performance.now()-t0).toFixed(0)} ms ` +
    `(~${(tex.image.width * tex.image.height * 0.5 / 1048576).toFixed(1)} MB GPU, ETC1S)`);
  return tex;
}

async function ensureCadastre() {
  if (Object.keys(cadTextures).length === rings.length) return;
  const startEpoch = _epoch;
  cadStatus.textContent = 'načítám katastr…';
  for (const r of rings) {
    if (cadTextures[r.slug]) continue;
    try {
      // Preferred path: ETC1S-compressed KTX2 (8 MB GPU per ring).
      // Fallback: R8 alpha-only DataTexture from 4k-downsampled PNG (16 MB).
      // Live proxy fetch as last resort for slugs missing pre-fetched files.
      let tex;
      if (r.cadastre_ktx2_file) {
        tex = await loadCadastreKtx2Tex(asset(r.cadastre_ktx2_file));
      } else if (r.cadastre_file) {
        tex = await loadCadastreAlphaTex(asset(r.cadastre_file));
      } else {
        const bbox = [cx - r.half, cy - r.half, cx + r.half, cy + r.half].join(',');
        tex = await loadCadastreAlphaTex(`/proxy/cadastre?BBOX=${bbox}&layer=KN&size=4096`);
      }
      // Bailed mid-flight: dispose ran. Throw the just-decoded texture
      // away so it doesn't leak into cleared caches.
      if (startEpoch !== _epoch) { tex.dispose(); return; }
      cadTextures[r.slug] = tex;
    } catch (e) {
      cadStatus.textContent = `chyba: ${e.message}`;
      console.error(`[cad ${r.slug}]`, e);
      return;
    }
  }
  cadStatus.textContent = 'načteno';
}

// ── Vector cadastre (LineSegments2) ──
// New rings carry parcels_file + buildings_file in the manifest. The vector
// path replaces the 64 MB R8 raster cadastre with ~1-3 MB of GPU line geometry
// (LineSegments2 instanced quads). Crisp at any zoom, pickable, ~40× less GPU.
// We always prefer vector when available; rings without it fall back to raster.
// Vector cadastre is gated behind ?vector=1 — vector LineSegments2 turned
// out heavier per-frame than KTX2-compressed raster on dense villages
// (~70k segments per closeup ring). Kept for future experiments.
const _VECTOR_FLAG = new URLSearchParams(location.search).get('vector') === '1';
const VECTOR_AVAILABLE = _VECTOR_FLAG &&
  rings.every(r => r.parcels_file && r.buildings_file);
if (_VECTOR_FLAG) {
  console.info(`[cad] vector mode (?vector=1): ${VECTOR_AVAILABLE}`,
    rings.map(r => ({slug: r.slug, parcels: !!r.parcels_file, buildings: !!r.buildings_file})));
}
const cadVectorGroup = new THREE.Group();
cadVectorGroup.visible = false;
scene.add(cadVectorGroup);
const cadVectorRingNodes = {};   // slug → { lines: LineSegments2[], material: LineMaterial }
let cadVectorPromise = null;
let parcelsBySlug = {};          // slug → array of { id, label, ring_local, ... }

// LineMaterial uses pixel-space line widths (resolution uniform must be kept
// in sync with the renderer canvas size or lines get DPI-scaled wrong).
function makeCadLineMaterial(color, widthPx) {
  // No transparency: alpha-blend on ~140k fragments per ring is the heaviest
  // single cost. Solid lines look identical at our widthPx ≤ 2 and the
  // depth buffer guarantees correct overlap. Drop computeLineDistances too —
  // we don't dash, so the per-segment distance buffer is dead weight.
  const mat = new LineMaterial({
    color,
    linewidth: widthPx,
    worldUnits: false,
    depthTest: true,
    polygonOffset: true,
    polygonOffsetFactor: -2,
    polygonOffsetUnits: -2,
    toneMapped: false,
  });
  mat.resolution.set(window.innerWidth, window.innerHeight);
  return mat;
}

function _pushSegments(out, ring, lift, sampleY) {
  // For each consecutive pair in a closed ring, emit a segment.
  // ring elements: [x, z] (buildings) or [x, z, yAbs] (parcels).
  const n = ring.length;
  for (let i = 0; i < n; i++) {
    const a = ring[i];
    const b = ring[(i + 1) % n];
    const ya = (a.length > 2 && a[2] > 0) ? a[2] : sampleY(a[0], a[1]);
    const yb = (b.length > 2 && b[2] > 0) ? b[2] : sampleY(b[0], b[1]);
    if (ya == null || yb == null) continue;
    out.push(a[0], ya - yMid + lift, a[1],
             b[0], yb - yMid + lift, b[1]);
  }
}

function buildVectorCadastreForRing(r, parcels, buildings) {
  // Sample heightmap for buildings (2D coords only). For parcels, server
  // returns DSM-sampled Y per vertex but on cache misses the value is 0;
  // fall back to sampleAt() in that case too.
  const sampleY = (lx, lz) => {
    const y = sampleAt(lx, lz);
    return y == null ? 0 : y;
  };

  // Lift slightly above terrain. Polygon offset handles the rest of the
  // z-fight at steep view angles.
  const PARCEL_LIFT = 0.3;
  const BUILDING_LIFT = 0.4;

  const parcelPos = [];
  for (const p of parcels) {
    if (!p.ring_local || p.ring_local.length < 3) continue;
    _pushSegments(parcelPos, p.ring_local, PARCEL_LIFT, sampleY);
  }
  const buildingPos = [];
  for (const b of buildings) {
    if (!b.coords || b.coords.length < 3) continue;
    _pushSegments(buildingPos, b.coords, BUILDING_LIFT, sampleY);
  }

  const out = { lines: [], material: null, segCount: 0 };
  if (parcelPos.length) {
    const geo = new LineSegmentsGeometry();
    geo.setPositions(parcelPos);
    const mat = makeCadLineMaterial(0xffffff, 1.2);
    out.lines.push(new LineSegments2(geo, mat));
    out.material = mat;
    out.segCount += parcelPos.length / 6;
  }
  if (buildingPos.length) {
    const geo = new LineSegmentsGeometry();
    geo.setPositions(buildingPos);
    const mat = makeCadLineMaterial(0xffe680, 1.6);   // warm yellow buildings
    out.lines.push(new LineSegments2(geo, mat));
    out.segCount += buildingPos.length / 6;
  }
  return out;
}

async function ensureVectorCadastre() {
  if (cadVectorPromise) return cadVectorPromise;
  const startEpoch = _epoch;
  cadStatus.textContent = 'načítám vektorový katastr…';
  cadVectorPromise = (async () => {
    const t0 = performance.now();
    let totalSegs = 0;
    await Promise.all(rings.map(async (r) => {
      if (cadVectorRingNodes[r.slug]) return;
      const tFetch = performance.now();
      const [parcelsResp, buildingsResp] = await Promise.all([
        fetch(asset(r.parcels_file)),
        fetch(asset(r.buildings_file)),
      ]);
      if (!parcelsResp.ok) throw new Error(`parcels ${parcelsResp.status} for ${r.slug}`);
      if (!buildingsResp.ok) throw new Error(`buildings ${buildingsResp.status} for ${r.slug}`);
      const [parcels, buildings] = await Promise.all([
        parcelsResp.json(), buildingsResp.json()
      ]);
      // Bailed mid-flight: dispose ran while we were fetching. Don't
      // populate the cleared caches — drop the parsed data on the floor.
      if (startEpoch !== _epoch) return;
      const tParsed = performance.now();
      parcelsBySlug[r.slug] = parcels;
      const node = buildVectorCadastreForRing(r, parcels, buildings);
      const tBuilt = performance.now();
      for (const line of node.lines) cadVectorGroup.add(line);
      cadVectorRingNodes[r.slug] = node;
      for (const p of parcels) parcelsById.set(p.id, p);
      totalSegs += node.segCount;
      console.info(`[cad ${r.slug}] fetch+parse ${(tParsed-tFetch).toFixed(0)} ms, ` +
        `build ${(tBuilt-tParsed).toFixed(0)} ms, ` +
        `${parcels.length} parcels + ${buildings.length} buildings → ${node.segCount} segments`);
    }));
    const elapsed = (performance.now() - t0).toFixed(0);
    const total = Object.values(parcelsBySlug).reduce((n, ps) => n + ps.length, 0);
    cadStatus.textContent = `${total} parcel, ${totalSegs} seg (${elapsed} ms)`;
    console.info(`[cad] total ${elapsed} ms wall, ${totalSegs} segments`);
  })();
  return cadVectorPromise;
}

cadToggle.addEventListener('change', async () => {

        const r = rings[i];
        const tex = cadTextures[r.slug];
        mesh.material.uniforms.uCadastre.value = tex;
        mesh.material.uniforms.uCadEnabled.value = 1.0;
        // KTX2/compressed textures store rows in image-native order; WebGL
        // ignores UNPACK_FLIP_Y_WEBGL on compressed paths so we flip V in
        // the shader. R8 DataTexture (PNG fallback) already has flipY=false.
        // KTX2 path: flip from URL flag (default 1 = vertical, matches ortho
        // convention). PNG R8 path: no flip (flipY=false at upload).
        mesh.material.uniforms.uCadFlipY.value = tex.isCompressedTexture ? (_CAD_FLIP & 1) : 0.0;
        mesh.material.uniforms.uCadFlipX.value = tex.isCompressedTexture ? ((_CAD_FLIP >> 1) & 1) : 0.0;
      }
    }
  } else {
    if (VECTOR_AVAILABLE) {
      cadVectorGroup.visible = false;
    } else {
      for (const mesh of ringMeshes) {
        mesh.material.uniforms.uCadEnabled.value = 0.0;
      }
    }
    cadStatus.textContent = '';
  }
});

// ── Screenshot ──
// renderer.domElement.toBlob() captures only the 3D canvas — no HUD,
// no info panel, no buttons (HTML overlays don't end up in the WebGL
// framebuffer). Forces an immediate render so the captured pixels match
// what the user just saw (preserveDrawingBuffer would be alternative
// but it costs perf every frame). Filename includes slug + tier + ts.
function captureScreenshot() {
  // Render once with preserveDrawingBuffer-equivalent: re-run animate
  // pipeline now, then toBlob within the same microtask so the
  // framebuffer is still valid (WebGL otherwise clears it after compositing).
  const oldBg = scene.background;
  // Re-render through finalComposer for correct sRGB encoding (see
  // memory/feedback_composer_colorspace.md). Skip bloomComposer when
  // nothing emissive — same logic as animate().
  const hasGlow = !_NO_BLOOM && selectedParcels.size > 0;
  if (hasGlow) {
    scene.background = null;
    camera.layers.set(BLOOM_LAYER);
    bloomComposer.render();
    scene.background = oldBg;
    camera.layers.set(0);
  }
  finalComposer.render();
  renderer.domElement.toBlob((blob) => {
    if (!blob) {
      console.error('[screenshot] toBlob returned null');
      return;
    }
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${slug}_${currentTier || 'view'}_${ts}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    console.info(`[screenshot] saved ${a.download} (${(blob.size/1024).toFixed(0)} KB)`);
  }, 'image/png');
}
document.getElementById('screenshot-btn').addEventListener('click', captureScreenshot);
document.addEventListener('keydown', (e) => {
  // Skip when a form element has focus so we don't steal keystrokes
  // from the OSM/cad toggle label tabbing, range sliders, selects, etc.
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;
  // 'P' for photo.
  if (e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    captureScreenshot();
    return;
  }
  // 'H' toggles the overlays (info panel + stats) so the user can
  // see the full scene unobstructed — useful before taking a
  // composition screenshot or for presentation mode.
  if (e.key === 'h' || e.key === 'H') {
    e.preventDefault();
    const info = document.getElementById('info');
    const stats = document.getElementById('stats');
    const hidden = info.style.visibility === 'hidden';
    info.style.visibility = hidden ? '' : 'hidden';
    stats.style.visibility = hidden ? '' : 'hidden';
  }
});

const poiToggle = document.getElementById('poi-toggle');
const poiStatusEl = document.getElementById('poi-status');

let _poiLoaded = false;
let _poiLoadPromise = null;

function _poiSpriteCanvas(label, icon, accentCss) {
  // Compact single-line pill:
  //   - category accent stripe (4 px) on the left
  //   - drop shadow for readability on bright photos
  //   - emoji + name on one line, vertically centred against the cap
  //     height of the system font (not the em box, which makes the
  //     text float up on labels without descenders)
  const padX = 8;
  const padY = 5;
  const stripeW = 4;
  const shadowOffset = 2;
  const shadowBlur = 5;
  const fontSize = 18;
  const font = `600 ${fontSize}px -apple-system, "Segoe UI Emoji", "Apple Color Emoji", system-ui, sans-serif`;
  const text = `${icon} ${label}`;             // single space — emoji glyphs are wide
  const probe = document.createElement('canvas').getContext('2d');
  probe.font = font;
  const tw = probe.measureText(text).width;
  // Cap height for the SF/system font @ 18 px is about 13 px; ascent
  // ~14, descent ~4. We want the visual centre line to land at the
  // pill's vertical centre, so size the pill to (capHeight + 2*padY)
  // and place the text baseline at padY + capHeight.
  const capHeight = Math.round(fontSize * 0.72);
  const innerH = capHeight + padY * 2 + 4;     // +4 for emoji descent
  const innerW = Math.ceil(tw) + padX * 2 + stripeW;
  const margin = shadowBlur + shadowOffset;
  const w = innerW + margin * 2;
  const h = innerH + margin * 2;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  const x0 = margin, y0 = margin;
  // Drop shadow on the pill body only
  ctx.shadowColor = 'rgba(0, 0, 0, 0.55)';
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetY = shadowOffset;
  ctx.fillStyle = 'rgba(20, 24, 32, 0.92)';
  const r = Math.min(8, innerH / 2 - 1);
  ctx.beginPath();
  ctx.moveTo(x0 + r, y0);
  ctx.lineTo(x0 + innerW - r, y0); ctx.arcTo(x0 + innerW, y0, x0 + innerW, y0 + r, r);
  ctx.lineTo(x0 + innerW, y0 + innerH - r); ctx.arcTo(x0 + innerW, y0 + innerH, x0 + innerW - r, y0 + innerH, r);
  ctx.lineTo(x0 + r, y0 + innerH); ctx.arcTo(x0, y0 + innerH, x0, y0 + innerH - r, r);
  ctx.lineTo(x0, y0 + r); ctx.arcTo(x0, y0, x0 + r, y0, r);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  // Hairline border for definition on dark photos
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
  ctx.lineWidth = 1.25;
  ctx.stroke();
  // Left accent stripe — category colour, rounded to match border.
  if (accentCss) {
    ctx.fillStyle = accentCss;
    ctx.beginPath();
    ctx.moveTo(x0 + r, y0);
    ctx.lineTo(x0 + stripeW, y0);
    ctx.lineTo(x0 + stripeW, y0 + innerH);
    ctx.lineTo(x0 + r, y0 + innerH);
    ctx.arcTo(x0, y0 + innerH, x0, y0 + innerH - r, r);
    ctx.lineTo(x0, y0 + r);
    ctx.arcTo(x0, y0, x0 + r, y0, r);
    ctx.fill();
  }
  // Text — use alphabetic baseline + an explicit Y so emoji + latin
  // letters land on the same line consistently across Chrome/Safari.
  ctx.font = font;
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'alphabetic';
  const textBaseY = y0 + padY + capHeight;
  ctx.fillText(text, x0 + stripeW + padX, textBaseY);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return { tex, w, h };
}

function buildPoiMarker(p) {
  // Find terrain Y. Out-of-ring POIs skip rendering. heightData may be
  // null at startup (lazy load); fall back to 0 so the marker still
  // appears at the right XZ but at sea level. Once ensureHeightData
  // runs the marker is rebuilt on next toggle.
  const lx = p.coords[0], lz = p.coords[1];
  let yAbs = sampleAt(lx, lz);
  if (yAbs == null) yAbs = (globalYmin + globalYmax) / 2;
  const baseY = yAbs - yMid;
  // Stagger stick height per POI to avoid label overlap at oblique view
  // angles. Base 50 m clears typical Czech buildings/trees; per-POI jitter
  // of 0-35 m spreads labels vertically so a cluster doesn't read as a
  // wall of pills. Jitter is deterministic from id so the same POI keeps
  // its height across reloads (no flickering).
  const STICK_BASE_H = 50;
  const STICK_JITTER = 35;
  // FNV-1a-ish hash from numeric/string id → [0, 1).
  const idStr = String(p.id);
  let hash = 2166136261;
  for (let i = 0; i < idStr.length; i++) {
    hash ^= idStr.charCodeAt(i);
    hash = (hash * 16777619) >>> 0;
  }
  const jitter = (hash / 0xffffffff) * STICK_JITTER;
  const STICK_H = STICK_BASE_H + jitter;
  const SPRITE_SCALE = 22;       // compact pill — was 28

  const group = new THREE.Group();
  group.position.set(lx, baseY, lz);

  // Thin vertical stick: line from base to top
  const stickPos = new Float32Array([0, 0, 0, 0, STICK_H, 0]);
  const stickGeo = new LineSegmentsGeometry();
  stickGeo.setPositions(stickPos);
  if (!_poiStickMat) {
    _poiStickMat = new LineMaterial({
      color: 0xffffff, linewidth: 1.5, worldUnits: false, toneMapped: false,
      depthTest: false, transparent: true, opacity: 0.85,
    });
    _poiStickMat.resolution.set(window.innerWidth, window.innerHeight);
  }
  const stick = new LineSegments2(stickGeo, _poiStickMat);
  stick.renderOrder = 100;
  group.add(stick);

  // Per-marker accent colour drives stripe + dots.
  const accent = poiColour(p);

  // Ground dot — flat disc on the terrain at the POI's true XZ, in the
  // category colour. The visual "pin point" — at oblique view angles
  // the stick alone leaves ambiguity about which building/park is
  // tagged. The disc is small in world units (4 m radius) so it stays
  // proportional to the scene.
  const groundGeo = new THREE.CircleGeometry(4, 24);
  groundGeo.rotateX(-Math.PI / 2);
  const groundMat = new THREE.MeshBasicMaterial({
    color: accent.hex, transparent: true, opacity: 0.85,
    side: THREE.DoubleSide, depthTest: false, toneMapped: false,
    polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -256,
  });
  const groundDot = new THREE.Mesh(groundGeo, groundMat);
  groundDot.position.y = 0.5;        // tiny lift to avoid z-fight
  groundDot.renderOrder = 99;
  group.add(groundDot);

  // Connector dot — small sprite at the top of the stick, where the
  // pill anchors. Same category colour, billboards toward the camera
  // so it always reads as a clear "pin head".
  const connector = new THREE.Sprite(_poiConnectorMat(accent.css));
  connector.position.y = STICK_H;
  connector.scale.set(4, 4, 1);      // world-units, ~4 m disc
  connector.renderOrder = 102;
  group.add(connector);

  // Label sprite — compact single-line pill (icon + name + left-edge
  // category accent stripe + drop shadow). AI "why" caption stays in
  // p.why for a future tooltip; the label is intentionally tight.
  const { tex, w, h } = _poiSpriteCanvas(p.name, poiIcon(p), accent.css);
  const mat = new THREE.SpriteMaterial({
    map: tex, depthTest: false, transparent: true, toneMapped: false,
  });
  const sprite = new THREE.Sprite(mat);
  // Scale: keep aspect ratio, world-units height ≈ SPRITE_SCALE
  sprite.scale.set(SPRITE_SCALE * (w / h), SPRITE_SCALE, 1);
  sprite.position.y = STICK_H + SPRITE_SCALE / 2 + 1;
  sprite.renderOrder = 101;
  group.add(sprite);

  // Stash data for dispose later
  group.userData.poi = p;
  group.userData.disposables = [stickGeo, tex, mat, groundGeo, groundMat, connector.material];
  return group;
}
let _poiStickMat = null;

// Tiny round sprite for the connector dot at the top of each POI stick.
// Built from a 64×64 canvas with a solid filled circle + 1 px white outer
// ring (helps it pop on dark photo backgrounds). One material per
// colour, cached so we share it across markers in the same category.
const _poiConnectorMats = new Map();
function _poiConnectorMat(css) {
  let mat = _poiConnectorMats.get(css);
  if (mat) return mat;
  const size = 64;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  // Outer white halo
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2); ctx.fill();
  // Coloured core
  ctx.fillStyle = css;
  ctx.beginPath(); ctx.arc(size/2, size/2, size/2 - 7, 0, Math.PI * 2); ctx.fill();
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  mat = new THREE.SpriteMaterial({
    map: tex, depthTest: false, transparent: true, toneMapped: false,
  });
  _poiConnectorMats.set(css, mat);
  return mat;
}

async function ensurePoiLoaded() {
  if (_poiLoaded) return;
  if (_poiLoadPromise) return _poiLoadPromise;
  _poiLoadPromise = (async () => {
    poiStatusEl.textContent = 'načítám…';
    const outerHalf = Math.max(...rings.map(r => r.half));
    const radius = Math.min(2000, outerHalf);
    const url = `/api/poi?gcx=${cx}&gcy=${cy}&radius=${radius}`;
    const startEpoch = _epoch;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`/api/poi ${r.status}`);
      const pois = await r.json();
      if (startEpoch !== _epoch) return;  // unload mid-flight
      // Also need heightData for terrain-Y of each marker.
      if (rings.some(r => !ringData[r.slug].heightData)) {
        await ensureHeightDataLoaded();
        if (startEpoch !== _epoch) return;
      }
      // Rebuild meshes
      while (poiGroup.children.length) {
        const m = poiGroup.children.pop();
        for (const d of (m.userData?.disposables || [])) d.dispose?.();
      }
      for (const p of pois) poiGroup.add(buildPoiMarker(p));
      _poiLoaded = true;
      poiStatusEl.textContent = `${pois.length} POI`;
      console.info(`[poi] loaded ${pois.length} markers (radius ${radius} m)`);
    } catch (e) {
      console.error('[poi]', e);
      poiStatusEl.textContent = `chyba: ${e.message}`;
      throw e;
    }
  })().finally(() => { _poiLoadPromise = null; });
  return _poiLoadPromise;
}

poiToggle.addEventListener('change', async () => {
  if (poiToggle.checked) {
    poiToggle.disabled = true;
    try {
      await ensurePoiLoaded();
      poiGroup.visible = true;
    } catch {} finally { poiToggle.disabled = false; }
  } else {
    poiGroup.visible = false;
    poiStatusEl.textContent = '';
  }
});

// ── Parcel multi-angle capture ──
// Orbits the camera around a parcel's centroid, snaps 20 PNGs at
// preset azimuth/pitch combos, then opens a grid modal where the
// user picks which shots to (a) download or (b) send to the AI
// image-edit endpoint for cleanup.
const CAPTURE_ANGLES = [
  // 8× outer ring, oblique (25° from horizontal — landscape feel)
  ...[0, 45, 90, 135, 180, 225, 270, 315].map(az => ({ az, pitch: 25, tier: 'oblique' })),
  // 4× medium pitch (50° — drone-like)
  ...[0, 90, 180, 270].map(az => ({ az, pitch: 50, tier: 'medium' })),
  // 4× high pitch (70° — near-overhead)
  ...[0, 90, 180, 270].map(az => ({ az, pitch: 70, tier: 'high' })),
  // 4× near-top-down (88°)
  ...[0, 90, 180, 270].map(az => ({ az, pitch: 88, tier: 'top' })),
];

let _captureShots = [];   // array of { blob, dataUrl, az, pitch, tier, selected }
// Distance = parcelRadius × multiplier. User-tunable via the slider in
// the capture modal; persisted across sessions so the user's preferred
// "context tightness" sticks. Range 5-40 covers macro-zoom (5×, lot
// fills the frame) through wide context (40×, lot reads as a feature
// in a hundred-metre neighbourhood).
let _captureDistMul = parseInt(localStorage.getItem('capture_dist_mul') || '5', 10);
// Clamp into current slider range — old (15) saved during the wider
// default would otherwise sit outside the new 2-20 window.
if (_captureDistMul < 2 || _captureDistMul > 20) _captureDistMul = 5;
let _captureCurrentParcel = null;   // remembered for re-capture

async function captureParcelAngles() {
  if (selectedParcels.size === 0) return;
  // Pick the first selected parcel as the orbit target. Future: option
  // to capture a UNION of multiple selections.
  const id = selectedParcels.values().next().value;
  const p = parcelsById.get(id);
  if (!p || !p.ring_local) return;
  const centroid = _parcelCentroid(p.ring_local);
  if (!centroid) return;
  // Distance = max parcel radius × user-selected multiplier (slider in
  // the modal header). Floor at 200 m so tiny lots still get usable
  // context. Multiplier persists across sessions in localStorage.
  let maxR = 0;
  for (const v of p.ring_local) {
    const dx = v[0] - centroid.x, dz = v[1] - centroid.z;
    maxR = Math.max(maxR, Math.hypot(dx, dz));
  }
  const distance = Math.max(100, maxR * _captureDistMul);
  // Remember the parcel for the re-capture button — same lot, new
  // multiplier, no need to click on the canvas again.
  _captureCurrentParcel = p;
  // Update the meta label so the user sees what numbers their slider
  // value resolves to for this specific parcel.
  const metaEl = document.getElementById('capture-dist-meta');
  if (metaEl) metaEl.textContent = `(parcela R=${maxR.toFixed(0)} m → ${distance.toFixed(0)} m)`;

  // Snapshot UI state we have to restore.
  const oldPos = camera.position.clone();
  const oldTarget = controls.target.clone();
  const oldDamping = controls.enableDamping;
  const poiWasVisible = poiGroup.visible;
  // Hide POI markers — user requested clean shots for the AI pipeline.
  // Outline + ground markers stay so the AI knows which parcel is the
  // target.
  poiGroup.visible = false;
  controls.enableDamping = false;

  const modal = document.getElementById('capture-modal');
  const grid = document.getElementById('capture-grid');
  const statusEl = document.getElementById('capture-status');
  const resultsEl = document.getElementById('capture-results');
  modal.style.display = 'block';
  statusEl.textContent = `načítám 0/${CAPTURE_ANGLES.length}…`;
  // New capture session — keep previous batches above so the user has
  // a chronological history (newest at top) and can compare results
  // across different distance multipliers without losing the old ones.
  // Old batches stay clickable but the AI/ZIP buttons act on the
  // current session's selection only.
  const sessionStart = _captureShots.length;
  const sessionTs = new Date();
  const sessionHeader = document.createElement('div');
  sessionHeader.className = 'cap-session-header';
  sessionHeader.style.cssText =
    'grid-column:1/-1;padding:8px 0 4px 0;color:#9aa0a8;font-size:11px;' +
    'border-bottom:1px solid #2a2e36;display:flex;justify-content:space-between;align-items:center;';
  sessionHeader.innerHTML =
    `<span><b style="color:#e7e9ee;">Náhledy ${sessionTs.toLocaleTimeString('cs-CZ')}</b> ` +
    `· ${_captureDistMul}× · vzdálenost ${distance.toFixed(0)} m</span>`;
  // Prepend so newest session shows at the top.
  if (grid.firstChild) grid.insertBefore(sessionHeader, grid.firstChild);
  else grid.appendChild(sessionHeader);
  // Track the latest inserted node so each new thumb lands after it.
  let sessionLastNode = sessionHeader;

  // The centroid Y already has yMid subtracted? No — _parcelCentroid
  // returns absolute Y in scene space (sampleAt returns absolute Y,
  // not relative to yMid). For the camera target we need the scene-
  // space position which is (x, y - yMid, z) where y is absolute.
  const targetSceneY = centroid.y - yMid;

  try {
    for (let i = 0; i < CAPTURE_ANGLES.length; i++) {
      const { az, pitch, tier } = CAPTURE_ANGLES[i];
      // Convert spherical (az, pitch above horizontal) → cartesian.
      const phi = pitch * Math.PI / 180;          // angle ABOVE horizontal
      const theta = az * Math.PI / 180;            // azimuth (0 = +Z south, CW)
      const r = distance;
      const dy = r * Math.sin(phi);
      const hr = r * Math.cos(phi);                // horizontal radius component
      camera.position.set(
        centroid.x + hr * Math.sin(theta),
        targetSceneY + dy,
        centroid.z + hr * Math.cos(theta)
      );
      controls.target.set(centroid.x, targetSceneY, centroid.z);
      camera.lookAt(centroid.x, targetSceneY, centroid.z);
      camera.updateMatrixWorld();
      camera.updateProjectionMatrix();

      // Render same as animate(): bloom pass for selected parcels,
      // then finalComposer for sRGB-correct output.
      const hasGlow = !_NO_BLOOM && selectedParcels.size > 0;
      if (hasGlow) {
        const oldBg = scene.background;
        scene.background = null;
        camera.layers.set(BLOOM_LAYER);
        bloomComposer.render();
        scene.background = oldBg;
        camera.layers.set(0);
      }
      finalComposer.render();
      // Wait one frame so the framebuffer is committed before toBlob.
      await new Promise(r => requestAnimationFrame(r));
      const blob = await new Promise(res => renderer.domElement.toBlob(res, 'image/png'));
      if (!blob) continue;
      const dataUrl = URL.createObjectURL(blob);
      const shot = { blob, dataUrl, az, pitch, tier, idx: _captureShots.length,
                      distance, parcelRadius: maxR,
                      ts: Date.now(), sessionIdx: sessionStart,
                      selected: false };
      _captureShots.push(shot);
      statusEl.textContent = `${i + 1}/${CAPTURE_ANGLES.length}…`;
      // Insert each thumb directly after the previously-inserted node
      // so the session block stays in chronological order (first shot
      // = top-left of the session block).
      const thumb = _buildCaptureThumb(shot);
      sessionLastNode.parentNode.insertBefore(thumb, sessionLastNode.nextSibling);
      sessionLastNode = thumb;
    }
    statusEl.textContent = `${_captureShots.length} náhledů hotovo. Vyber které poslat AI.`;
  } finally {
    // Restore camera + controls regardless of capture success.
    camera.position.copy(oldPos);
    controls.target.copy(oldTarget);
    controls.enableDamping = oldDamping;
    controls.update();
    poiGroup.visible = poiWasVisible;
  }
}

function _buildCaptureThumb(shot) {
  const div = document.createElement('div');
  div.className = 'cap-thumb';
  div.dataset.idx = shot.idx;
  const img = document.createElement('img');
  img.src = shot.dataUrl;
  img.loading = 'lazy';
  div.appendChild(img);
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.innerHTML = `${shot.az}° · ${shot.pitch}°<br>${shot.distance.toFixed(0)} m`;
  div.appendChild(badge);
  const check = document.createElement('span');
  check.className = 'check';
  check.textContent = '';
  div.appendChild(check);
  const expand = document.createElement('span');
  expand.className = 'expand';
  expand.textContent = '⤢';
  expand.title = 'Zvětšit';
  expand.addEventListener('click', (e) => { e.stopPropagation(); _openLightbox(shot.idx); });
  div.appendChild(expand);
  div.addEventListener('click', () => _toggleCaptureSelection(shot.idx));
  return div;
}

document.getElementById('capture-ai').addEventListener('click', async () => {
  const selected = _captureShots.filter(s => s.selected);
  if (selected.length === 0) return;
  // Explicit cost-confirm gate — every click on this button calls the
  // OpenAI API at ~$0.40/shot for 2048×1376 high quality. Confirm
  // dialog lists exact shot count + estimated total so the user can't
  // accidentally burn through credit with a wrong-button click.
  const estUsd = (selected.length * 0.40).toFixed(2);
  const ok = window.confirm(
    `Poslat ${selected.length} náhledů na OpenAI gpt-image-2?\n\n` +
    `Odhadovaná cena: $${estUsd} (high quality 2048×1376, ~$0.40/shot).\n` +
    `Doba: ~1–3 min na shot, celkem ~${selected.length}–${selected.length * 3} min.\n\n` +
    `Pokračovat?`
  );
  if (!ok) return;
  const aiBtn = document.getElementById('capture-ai');
  aiBtn.disabled = true;
  const resultsEl = document.getElementById('capture-results');
  resultsEl.innerHTML = '<h3 style="color:#e7e9ee;font-size:14px;margin:0 0 10px 0;">AI vylepšení</h3>';
  const progress = document.createElement('div');
  progress.className = 'cap-progress';
  resultsEl.appendChild(progress);
  // Run sequentially — gpt-image-2 high quality is slow and we don't
  // want N parallel requests slamming the same key.
  for (let i = 0; i < selected.length; i++) {
    const shot = selected[i];
    progress.textContent = `Posílám ${i + 1}/${selected.length}…`;
    const fd = new FormData();
    fd.append('image_a', shot.blob, `parcel_${shot.az}_${shot.pitch}.png`);
    fd.append('size', '2048x1376');
    fd.append('quality', 'high');
    try {
      const t0 = performance.now();
      const r = await fetch('/api/image-edit', { method: 'POST', body: fd });
      if (!r.ok) {
        let detail = '';
        try { const j = await r.json(); detail = j.error || ''; if (j.details) detail += ' — ' + j.details; }
        catch { detail = await r.text(); }
        // Friendly translation for the common OpenAI billing/quota errors —
        // the raw JSON is intimidating and the action is always the same.
        if (detail.includes('billing_hard_limit_reached')) {
          throw new Error('OpenAI billing limit dosažen — zvyš hard limit v dashboardu nebo počkej na nový měsíc');
        }
        if (detail.includes('insufficient_quota') || detail.includes('quota')) {
          throw new Error('OpenAI quota vyčerpaná — zkontroluj billing na platform.openai.com');
        }
        if (detail.includes('rate_limit') || r.status === 429) {
          throw new Error('OpenAI rate limit — počkej chvíli a zkus znovu');
        }
        throw new Error(`${r.status}: ${detail}`);
      }
      const aiBlob = await r.blob();
      const aiUrl = URL.createObjectURL(aiBlob);
      shot.aiBlob = aiBlob;
      shot.aiUrl = aiUrl;
      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      _appendCaptureResult(resultsEl, shot, elapsed);
    } catch (e) {
      const err = document.createElement('div');
      err.className = 'cap-error';
      err.textContent = `Shot ${shot.az}°/${shot.pitch}°: ${e.message}`;
      resultsEl.appendChild(err);
    }
  }
  progress.textContent = `Hotovo (${selected.length} náhledů).`;
  aiBtn.disabled = false;
});

function _appendCaptureResult(parent, shot, elapsedSec) {
  const row = document.createElement('div');
  row.className = 'cap-result-row';
  const a = document.createElement('div');
  a.innerHTML = `<div class="lbl">Před — ${shot.az}° / ${shot.pitch}°</div>`;
  const aImg = document.createElement('img'); aImg.src = shot.dataUrl;
  a.appendChild(aImg);
  const b = document.createElement('div');
  b.innerHTML = `<div class="lbl">Po AI — ${elapsedSec} s
    <a href="${shot.aiUrl}" download="parcel_ai_${shot.az}_${shot.pitch}.png"
       style="color:#6cf;margin-left:8px;">stáhnout</a></div>`;

}

// ZIP without external libs: minimal ZIP encoder for the selected PNGs.
// Each file: local file header + DEFLATE-stored (no compression) bytes
// + central directory + EOCD. Plain enough that browsers happily open
// it; PNG bytes are already compressed so no double-deflate hit.
async function _buildCaptureZip(selectedShots, includeAi) {
  const enc = new TextEncoder();
  const files = [];
  for (const s of selectedShots) {
    const name = `parcel_${s.az}deg_${s.pitch}deg.png`;
    files.push({ name, data: new Uint8Array(await s.blob.arrayBuffer()) });
    if (includeAi && s.aiBlob) {
      files.push({ name: `parcel_ai_${s.az}deg_${s.pitch}deg.png`,
                   data: new Uint8Array(await s.aiBlob.arrayBuffer()) });
    }
  }
  // Pure-JS CRC32 (no dep). Cached table.
  const crcTable = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
    crcTable[i] = c;
  }
  const crc32 = (data) => {
    let c = 0xffffffff;
    for (let i = 0; i < data.length; i++) c = crcTable[(c ^ data[i]) & 0xff] ^ (c >>> 8);
    return (c ^ 0xffffffff) >>> 0;
  };
  let offset = 0;
  const localChunks = [];
  const centralChunks = [];
  for (const f of files) {
    const nameBytes = enc.encode(f.name);
    const crc = crc32(f.data);
    const size = f.data.length;
    // Local file header (30 bytes + name)
    const lfh = new Uint8Array(30 + nameBytes.length);
    const dv = new DataView(lfh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true);          // version
    dv.setUint16(6, 0, true);            // flags
    dv.setUint16(8, 0, true);            // method = stored
    dv.setUint16(10, 0, true);           // time
    dv.setUint16(12, 0, true);           // date
    dv.setUint32(14, crc, true);
    dv.setUint32(18, size, true);
    dv.setUint32(22, size, true);
    dv.setUint16(26, nameBytes.length, true);
    dv.setUint16(28, 0, true);
    lfh.set(nameBytes, 30);
    localChunks.push(lfh, f.data);
    // Central directory entry (46 + name)
    const cdh = new Uint8Array(46 + nameBytes.length);
    const dvc = new DataView(cdh.buffer);
    dvc.setUint32(0, 0x02014b50, true);
    dvc.setUint16(4, 20, true);
    dvc.setUint16(6, 20, true);
    dvc.setUint16(8, 0, true);
    dvc.setUint16(10, 0, true);
    dvc.setUint16(12, 0, true); dvc.setUint16(14, 0, true);
    dvc.setUint32(16, crc, true);
    dvc.setUint32(20, size, true);
    dvc.setUint32(24, size, true);
    dvc.setUint16(28, nameBytes.length, true);
    dvc.setUint16(30, 0, true); dvc.setUint16(32, 0, true);
    dvc.setUint16(34, 0, true); dvc.setUint16(36, 0, true);
    dvc.setUint32(38, 0, true);
    dvc.setUint32(42, offset, true);
    cdh.set(nameBytes, 46);
    centralChunks.push(cdh);
    offset += lfh.length + size;
  }
  const cdSize = centralChunks.reduce((s, c) => s + c.length, 0);
  const cdOffset = offset;
  // EOCD
  const eocd = new Uint8Array(22);
  const dve = new DataView(eocd.buffer);
  dve.setUint32(0, 0x06054b50, true);
  dve.setUint16(8, files.length, true);
  dve.setUint16(10, files.length, true);
  dve.setUint32(12, cdSize, true);
  dve.setUint32(16, cdOffset, true);
  return new Blob([...localChunks, ...centralChunks, eocd], { type: 'application/zip' });
}

document.getElementById('capture-zip').addEventListener('click', async () => {
  const selected = _captureShots.filter(s => s.selected);
  if (selected.length === 0) return;
  const includeAi = selected.some(s => s.aiBlob);
  const blob = await _buildCaptureZip(selected, includeAi);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `parcel_capture_${new Date().toISOString().slice(0,19).replace(/[:.]/g, '-')}.zip`;

  setTimeout(() => URL.revokeObjectURL(url), 10000);
});
