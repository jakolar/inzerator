<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inženýrátor — Lokace</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    body { font-family: -apple-system, "Helvetica Neue", sans-serif;
           background: #f5f5f7; color: #1d1d1f; max-width: 800px;
           margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
         margin: 0 0 16px 0; }
    .location-row { display: flex; align-items: center; gap: 12px;
                    padding: 12px 14px; background: white;
                    border-radius: 8px; margin-bottom: 8px;
                    box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .location-row .label { flex: 1; font-weight: 500; }
    .location-row .status { font-size: 13px; color: #666; }
    .status-ready { color: #2a8a2a; }
    .status-partial { color: #c08000; }
    .status-generating { color: #1a73e8; }
    .btn { padding: 10px 16px; border: 0; border-radius: 6px;
           background: #1a73e8; color: white; cursor: pointer;
           font-size: 13px; min-height: 40px; }
    .btn:focus-visible { outline: 2px solid #1a73e8; outline-offset: 2px; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .empty { padding: 24px; text-align: center; color: #999; }
    .error { color: #c30; padding: 12px; background: #fff0f0;
             border-radius: 6px; margin: 8px 0; }
    /* Toast container — replaces alert() for non-blocking errors. */
    #toasts { position: fixed; top: 16px; right: 16px; z-index: 100;
              display: flex; flex-direction: column; gap: 8px;
              max-width: min(380px, calc(100% - 32px)); }
    .toast { padding: 12px 14px; border-radius: 8px;
             box-shadow: 0 4px 16px rgba(0,0,0,0.15);
             font-size: 13px; line-height: 1.5; color: #fff;
             display: flex; gap: 10px; align-items: flex-start;
             animation: toast-in 0.18s ease-out; }
    .toast.error { background: #c0392b; }
    .toast.info { background: #1a73e8; }
    .toast.ok { background: #2a8a2a; }
    .toast .close { cursor: pointer; opacity: 0.7; font-size: 16px;
                    line-height: 1; padding: 0 4px; user-select: none; }
    .toast .close:hover { opacity: 1; }
    @keyframes toast-in { from { transform: translateX(20px); opacity: 0; } }
    /* Job-row progress: compact label "krok N/M (název) ⇣ 42 %" + bar. */
    .job-progress { font-size: 12px; display: flex; flex-direction: column;
                    gap: 3px; flex: 1; max-width: 280px; }
    .job-progress .text { color: #1a73e8; }
    .job-progress .text.fail { color: #c30; }
    .job-progress .bar { height: 4px; background: #e8eef9; border-radius: 2px;
                         overflow: hidden; }
    .job-progress .bar > i { display: block; height: 100%; background: #1a73e8;
                             transition: width 0.25s; }
    .job-progress .bar > i.fail { background: #c30; }
    @media (prefers-reduced-motion: reduce) {
      .toast { animation: none; }
      .job-progress .bar > i { transition: none; }
    }
  </style>
</head>
<body>
  <h1 style="display:flex;align-items:center;gap:12px;">
    <span>Lokace</span>
    <button class="btn" id="new-location-btn"
            style="font-size:14px;padding:8px 14px;font-weight:600;min-height:auto;">+ Nová lokace</button>
    <a href="/image-edit/"
       style="margin-left:auto;font-size:14px;font-weight:normal;
       padding:8px 14px;background:#1a6a8e;color:#fff;border-radius:4px;
       text-decoration:none;">🖼 Image Edit</a>
  </h1>
  <div id="locations"><div class="empty">Načítám…</div></div>
  <div id="form-container"></div>
  <div id="toasts"></div>

  <script>
  // === Renders ===
  async function renderLocations() {
    const r = await fetch('/api/locations').then(r => r.json()).catch(e => null);
    const el = document.getElementById('locations');
    if (!r) {
      el.innerHTML = '<div class="error">Backend nedostupný</div>';
      return;
    }
    if (r.length === 0) {
      el.innerHTML = '<div class="empty">Žádné lokace. Klikni „+ Nová lokace".</div>';
      return;
    }
    el.innerHTML = r.map(loc => `
      <div class="location-row" data-slug="${loc.slug}">
        <span class="label">${escapeHtml(loc.label)}</span>
        <span class="status status-${loc.status}">${statusLabel(loc)}</span>
        ${loc.status === 'partial'
          ? `<button class="btn" data-action="retry-from-disk" data-slug="${loc.slug}">Retry</button>`
          : ''}
        ${loc.status === 'ready'
          ? `<a class="btn" href="/v2.html?region=${loc.slug}">Otevřít</a>
             <button class="btn btn-secondary" data-action="force-recompress" data-slug="${loc.slug}" title="Re-Draco s aktuálním quant presetem (outer/closeup=12, inner=14)">Recompress</button>`
          : ''}
        ${loc.has_heightfield
          ? `<a class="btn btn-secondary" href="/heightfield/?slug=${loc.slug}" title="Heightfield viewer (LERC + WebP, ~10 MB)">HF</a>`
          : ''}
      </div>
    `).join('');
    el.querySelectorAll('[data-action="retry-from-disk"]').forEach(btn => {
      btn.onclick = () => postJob(btn.dataset.slug, {resume_from_disk: true});
    });
    el.querySelectorAll('[data-action="force-recompress"]').forEach(btn => {
      btn.onclick = () => {
        if (!confirm(`Re-Draco ${btn.dataset.slug}? Zabere ~1 min, mezitím je viewer offline pro tuhle lokaci.`)) return;
        postJob(btn.dataset.slug, {resume_from_disk: true, force_recompress: true});
      };
    });
  }

  async function postJob(slug, extra) {
    const r = await fetch('/api/jobs', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({slug, ...extra}),
    });
    const data = await r.json();
    if (r.status !== 200) {
      showToast(`Selhalo (${r.status}): ${data.error || 'unknown'}`, 'error');
      return;
    }
    startPolling();
  }

  function statusLabel(loc) {
    if (loc.status === 'ready') return '✓ připraveno';
    // `partial` means one of two things — distinguish so user knows
    // whether the location is usable (missing only Draco compress) or
    // truly broken (pipeline stopped mid-way). The presence of inner
    // is the practical signal: viewer can open with non-compressed
    // GLBs, just slower.
    if (loc.status === 'partial') {
      return loc.has_inner ? '⚠ nezkomprimováno' : '⚠ rozdělané';
    }
    return loc.status;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Non-blocking notification. Auto-dismiss after 6 s for ok/info,
  // sticky for errors so the user has time to read + copy if needed.
  function showToast(msg, kind = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${kind}`;
    el.innerHTML = `<div style="flex:1">${escapeHtml(msg)}</div>
                    <span class="close" title="Zavřít">×</span>`;
    el.querySelector('.close').onclick = () => el.remove();
    document.getElementById('toasts').appendChild(el);
    if (kind !== 'error') setTimeout(() => el.remove(), 6000);
  }

  let SELECTED_HIT = null;
  let SEARCH_KIND = 'address';   // 'address' | 'parcel'

  const KIND_HINTS = {
    address: {
      placeholder: 'Hnojice 47',
      tip: 'Adresa: stačí napsat obec a číslo (diakritika tolerována jen u adres s číslem).',
    },
    parcel: {
      placeholder: '350/2 Stříbrnice',
      tip: 'Parcela: číslo (např. 350/2) + obec. KÚ se fold-matchne, takže funguje i bez diakritiky.',
    },
  };

  function renderForm(show) {
    const el = document.getElementById('form-container');
    if (!show) { el.innerHTML = ''; return; }
    // Auto-scroll so the form is visible even after dozens of locations
    // have pushed it below the fold. Done after the next tick so the
    // browser has laid out the new content before scrolling to it.
    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 0);
    el.innerHTML = `
      <div style="background:white; padding:16px; border-radius:8px; margin-top:16px;
                  box-shadow:0 1px 2px rgba(0,0,0,0.06);">
        <h3 style="margin-top:0;">Nová lokace</h3>
        <div style="margin-bottom:8px;">
          <button class="btn kind-btn" data-kind="address" style="border-radius:6px 0 0 6px;">Adresa</button><button class="btn kind-btn" data-kind="parcel" style="border-radius:0 6px 6px 0;">Parcela</button>
        </div>
        <div>
          <input id="addr-input" type="text" placeholder=""
                 style="width:60%; padding:6px;">
          <button class="btn" id="search-btn">Hledat</button>
        </div>
        <div id="search-tip" style="font-size:12px; color:#5a5a5a; margin-top:4px;"></div>
        <div id="search-results" style="margin-top:12px;"></div>
        <div id="selected-fields" style="margin-top:12px; display:none;">
          <p><b>Vybráno:</b> <span id="selected-label"></span></p>
          <label>Slug: <input id="slug-input" type="text"></label><br><br>
          <label>Label: <input id="label-input" type="text" style="width:60%"></label><br><br>
          <p style="font-size:12px; color:#666;">S-JTSK: <span id="sjtsk-display"></span></p>
          <button class="btn" id="generate-btn">Generovat</button>
          <button class="btn btn-secondary" id="cancel-form-btn">Zrušit</button>
        </div>
      </div>
    `;
    document.getElementById('search-btn').onclick = doSearch;
    document.getElementById('cancel-form-btn').onclick = () => renderForm(false);
    const addrInput = document.getElementById('addr-input');
    addrInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    // Typeahead: 300 ms po zastavení psaní fetch; nebloku­je tlačítko Hledat.
    // Krátké dotazy (<2 znaky) tichý no-op, aby user neviděl spam-error.
    addrInput.addEventListener('input', () => {
      clearTimeout(SEARCH_DEBOUNCE);
      const q = addrInput.value.trim();
      if (q.length < 2) return;
      SEARCH_DEBOUNCE = setTimeout(doSearch, 300);
    });
    document.querySelectorAll('.kind-btn').forEach(b => {
      b.onclick = () => setSearchKind(b.dataset.kind);
    });
    setSearchKind(SEARCH_KIND);
  }

  function setSearchKind(kind) {
    SEARCH_KIND = kind;
    const hint = KIND_HINTS[kind];
    document.getElementById('addr-input').placeholder = hint.placeholder;
    document.getElementById('search-tip').textContent = hint.tip;
    document.querySelectorAll('.kind-btn').forEach(b => {
      const active = b.dataset.kind === kind;
      b.classList.toggle('btn-secondary', !active);
    });
    // Re-run search if there's existing input so user sees toggle effect.
    const q = document.getElementById('addr-input').value.trim();
    if (q.length >= 2) doSearch();
  }

  let SEARCH_DEBOUNCE = null;

  async function doSearch() {
    const q = document.getElementById('addr-input').value.trim();
    const resultsEl = document.getElementById('search-results');
    if (!q) {
      resultsEl.innerHTML = '<div class="error">Zadej alespoň 2 znaky</div>';
      return;
    }
    resultsEl.innerHTML = '<i>Hledám…</i>';
    try {
      let r = await fetch(`/api/ruian/search?q=${encodeURIComponent(q)}&kind=${SEARCH_KIND}`);
      if (r.status === 503) {
        resultsEl.innerHTML = '<div class="error">ČÚZK nedostupné. Zkus později nebo zadej S-JTSK ručně.</div>';
        return;
      }
      let data = await r.json();
      // Auto-fallback: pokud v address módu nic, zkus parcel (a naopak).
      // Typický scénář: user napíše "Borová u Poličky 2664" (= parcel)
      // v defaultním Adresa módu → 0 výsledků. Místo "nic" mu nabídneme
      // co najdeme v opačném módu.
      if (data.length === 0) {
        const otherKind = SEARCH_KIND === 'address' ? 'parcel' : 'address';
        const r2 = await fetch(`/api/ruian/search?q=${encodeURIComponent(q)}&kind=${otherKind}`);
        if (r2.ok) {
          const data2 = await r2.json();
          if (data2.length > 0) {
            data = data2;
          }
        }
      }
      if (data.length === 0) {
        resultsEl.innerHTML = `
          <div class="error">Nic nenalezeno. Zkus i s diakritikou.</div>
          <details style="margin-top:8px;">
            <summary style="cursor:pointer; color:#1a73e8;">Zadat S-JTSK ručně</summary>
            <div style="margin-top:8px;">
              cx: <input id="manual-cx" type="number" step="0.01" style="width:120px">
              cy: <input id="manual-cy" type="number" step="0.01" style="width:120px">
              <button class="btn" id="manual-ok-btn">Použít</button>
            </div>
          </details>
        `;
        setTimeout(() => {
          document.getElementById('manual-ok-btn')?.addEventListener('click', async () => {
            const cx = parseFloat(document.getElementById('manual-cx').value);
            const cy = parseFloat(document.getElementById('manual-cy').value);
            if (isNaN(cx) || isNaN(cy)) { showToast('Zadej platná čísla', 'error'); return; }
            // Server-side SJTSK→WGS so the verify map has marker coords
            // without bundling proj4 in the page.
            const ll = await fetch(`/api/sjtsk2wgs?cx=${cx}&cy=${cy}`).then(r => r.json());
            if (typeof ll.lat !== 'number') { showToast('Konverze S-JTSK→WGS selhala', 'error'); return; }
            selectHit({label: `Manual ${cx}, ${cy}`, sjtsk_cx: cx, sjtsk_cy: cy,
                       wgs_lat: ll.lat, wgs_lon: ll.lon, obec: 'lokace'});
          });
        }, 0);
        return;
      }
      LAST_HITS = data;
      renderHitList(data);
    } catch (e) {
      resultsEl.innerHTML = `<div class="error">Chyba: ${escapeHtml(e.message)}</div>`;
    }
  }

  let LAST_HITS = [];
  let VERIFY_MAP = null;   // active Leaflet instance (destroyed on Zpět)

  function renderHitList(data) {
    const resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = data.map((hit, i) => `
      <div style="padding:8px; cursor:pointer; border-bottom:1px solid #eee;"
           data-i="${i}" class="hit-row">
        ${escapeHtml(hit.label)}
      </div>
    `).join('');
    resultsEl.querySelectorAll('.hit-row').forEach((el, i) => {
      el.onclick = () => selectHit(data[i]);
    });
  }

  // Verify mezikrok: než user potvrdí, ukáže se mini OSM mapa s markerem
  // na zvolené lokaci. Adresy jako "Hnojice 47" se v ČR vyskytují na víc
  // místech — vizuální ověření přes mapu uchrání před vygenerováním
  // špatné vesnice (a 30 min ztraceného času na ČÚZK pipeline).
  function selectHit(hit) {
    SELECTED_HIT = hit;
    const resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = `
      <div style="font-size:12px; color:#666; margin-bottom:8px;">
        Ověř, že je to opravdu ta lokace, kterou chceš generovat:
      </div>
      <div style="margin-bottom:6px;"><b>${escapeHtml(hit.label)}</b></div>
      <div id="verify-map" style="width:100%; height:280px; border-radius:6px;
           border:1px solid #ddd; margin-bottom:8px;"></div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        <button class="btn" id="confirm-hit-btn" style="flex:1; min-width:140px;">Potvrdit ✓</button>
        <button class="btn btn-secondary" id="back-to-results-btn" style="min-width:80px;">Zpět</button>
      </div>
    `;
    // Tear down previous map (Leaflet hates re-init on the same div)
    if (VERIFY_MAP) { try { VERIFY_MAP.remove(); } catch (_) {} VERIFY_MAP = null; }
    // Address hits zoom to street level; parcel hits a bit wider so the
    // user sees neighboring parcels for context.
    const z = hit.kind === 'parcel' ? 17 : 18;
    VERIFY_MAP = L.map('verify-map').setView([hit.wgs_lat, hit.wgs_lon], z);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19,
    }).addTo(VERIFY_MAP);
    L.marker([hit.wgs_lat, hit.wgs_lon]).addTo(VERIFY_MAP)
      .bindPopup(escapeHtml(hit.label)).openPopup();
    document.getElementById('confirm-hit-btn').onclick = () => confirmHit(hit);
    document.getElementById('back-to-results-btn').onclick = () => {
      if (VERIFY_MAP) { try { VERIFY_MAP.remove(); } catch (_) {} VERIFY_MAP = null; }
      renderHitList(LAST_HITS);
    };
  }

  async function confirmHit(hit) {
    if (VERIFY_MAP) { try { VERIFY_MAP.remove(); } catch (_) {} VERIFY_MAP = null; }
    document.getElementById('search-results').innerHTML = '';
    // Auto-slug: slugify(obec), kolize-check přes /api/locations
    const locs = await fetch('/api/locations').then(r => r.json());
    const existing = new Set(locs.map(l => l.slug));
    const base = slugifyJS(hit.obec);
    let slug = base;
    let n = 2;
    while (existing.has(slug)) { slug = `${base}-${n}`; n++; }

    document.getElementById('selected-label').textContent = hit.label;
    document.getElementById('slug-input').value = slug;
    document.getElementById('label-input').value = hit.label;
    document.getElementById('sjtsk-display').textContent =
      `${hit.sjtsk_cx.toFixed(2)}, ${hit.sjtsk_cy.toFixed(2)}`;
    document.getElementById('selected-fields').style.display = 'block';
    document.getElementById('generate-btn').onclick = doGenerate;
  }

  function slugifyJS(text) {
    return text
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  async function doGenerate() {
    if (!SELECTED_HIT) return;
    const body = {
      slug: document.getElementById('slug-input').value.trim(),
      label: document.getElementById('label-input').value.trim(),
      cx: SELECTED_HIT.sjtsk_cx,
      cy: SELECTED_HIT.sjtsk_cy,
    };
    const r = await fetch('/api/jobs', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (r.status !== 200) {
      const suggestion = data.suggestion ? ` — zkus slug: ${data.suggestion}` : '';
      showToast(`Chyba ${r.status}: ${data.error || 'unknown'}${suggestion}`, 'error');
      return;
    }
    renderForm(false);
    SELECTED_HIT = null;
    await renderLocations();
    startPolling();
  }

  // === Polling + Step Status ===
  let POLL_TIMER = null;
  let ACTIVE_JOBS = [];

  async function pollOnce() {
    try {
      const r = await fetch('/api/jobs?active=1');
      ACTIVE_JOBS = await r.json();
    } catch (e) {
      ACTIVE_JOBS = [];
    }
    renderActiveJobs();
    if (ACTIVE_JOBS.length > 0) {
      POLL_TIMER = setTimeout(pollOnce, 2000);
    } else {
      POLL_TIMER = null;
      await renderLocations();
    }
  }

  function startPolling() {
    if (POLL_TIMER === null) pollOnce();
  }

  function renderActiveJobs() {
    const container = document.getElementById('locations');
    const existing = Array.from(container.querySelectorAll('.location-row'));
    const existingBySlug = new Map(existing.map(el => [el.dataset.slug, el]));

    for (const job of ACTIVE_JOBS) {
      const row = renderJobRow(job);
      const old = existingBySlug.get(job.slug);
      if (old) old.replaceWith(row);
      else container.appendChild(row);
    }
  }

  function renderJobRow(job) {
    const div = document.createElement('div');
    div.className = 'location-row';
    div.dataset.slug = job.slug;
    div.dataset.jobId = job.job_id;
    const failedStep = job.steps.find(s => s.state === 'fail');
    const isDone = job.steps.every(s =>
      ['ok','fail','cancelled','skipped'].includes(s.state));
    const hasFail = !!failedStep;

    // Compact progress: just the current step name + N/M + a bar.
    // The 7-icon dump (⏳ ⏳ ✓ ✗ ↷ ⊘) overflowed on mobile and made
    // every step indistinguishable. The full step list is still in
    // `div.title` for the curious.
    const total = job.steps.length;
    const finishedCount = job.steps.filter(s =>
      ['ok','skipped'].includes(s.state)).length;
    const running = job.steps.find(s => s.state === 'running');
    const current = failedStep || running ||
                    job.steps.find(s => s.state === 'pending');
    const pct = Math.round((finishedCount / total) * 100);
    let label;
    if (hasFail) label = `✗ ${failedStep.name} selhal`;
    else if (isDone) label = `Hotovo (${finishedCount}/${total})`;
    else if (current) label = `${finishedCount + 1}/${total} · ${current.name}`;
    else label = 'čeká';

    div.innerHTML = `
      <span class="label">${escapeHtml(job.label || job.slug)}</span>
      <div class="job-progress">
        <span class="text${hasFail ? ' fail' : ''}">${escapeHtml(label)}</span>
        <span class="bar"><i class="${hasFail ? 'fail' : ''}" style="width:${pct}%"></i></span>
      </div>
      ${hasFail ? `<button class="btn" data-action="retry">Retry</button>` : ''}
      ${!isDone ? `<button class="btn btn-secondary" data-action="cancel">Cancel</button>` : ''}
    `;
    // Hover/long-press surfaces the full step trace so the detail is
    // still discoverable, just not in the always-visible row.
    div.title = job.steps.map(s => `${s.name}: ${s.state}`).join('\n');
    if (failedStep) {
      div.title += `\n\nERROR (${failedStep.name}): ${failedStep.error || 'unknown'}`;
    }
    div.querySelector('[data-action="retry"]')?.addEventListener('click',
      () => doRetry(job.job_id));
    div.querySelector('[data-action="cancel"]')?.addEventListener('click',
      () => doCancel(job.job_id));
    return div;
  }

  async function doRetry(job_id) {
    await fetch(`/api/jobs/${job_id}/retry`, {method: 'POST'});
    startPolling();
  }

  async function doCancel(job_id) {
    if (!confirm('Zrušit generování?')) return;
    await fetch(`/api/jobs/${job_id}/cancel`, {method: 'POST'});
    startPolling();
  }

  // Initial load
  (async () => {
    await renderLocations();
    const active = await fetch('/api/jobs?active=1').then(r => r.json()).catch(() => []);
    if (active.length > 0) startPolling();
  })();

  // Wire up button at the end
  document.getElementById('new-location-btn').onclick = () => renderForm(true);
  </script>
</body>
</html>
