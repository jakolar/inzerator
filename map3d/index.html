<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ČR 3D mapa</title>
<style>
  /* iOS Safari ignores user-scalable=no: a pinch/double-tap starting on
     the HUD or escaping the canvas zoomed the WHOLE page incl. UI
     (2026-07-11 report). touch-action:none + gesturestart preventDefault
     (script below) kill page zoom; buttons keep taps via manipulation. */
  html, body { margin: 0; height: 100%; overflow: hidden; background: #10151c;
               touch-action: none; overscroll-behavior: none;
               -webkit-user-select: none; user-select: none; }
  #ctl, #ctl2, #nav button { touch-action: manipulation; }
  #app { position: fixed; inset: 0; }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 5;
    font: 12px/1.5 system-ui, sans-serif; color: #dfe7f0;
    background: rgba(12, 18, 26, .72); border-radius: 8px; padding: 8px 12px;
    pointer-events: none; white-space: pre;
  }
  #ctl, #ctl2 {
    position: fixed; right: 10px; z-index: 5;
    font: 13px system-ui, sans-serif; color: #dfe7f0;
    background: rgba(12, 18, 26, .72); border-radius: 8px; padding: 8px 12px;
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    user-select: none;
  }
  #ctl { top: 10px; }
  #ctl2 { top: 52px; }
  #ctl input, #ctl2 input { accent-color: #7fae6b; }
  #nav {
    position: fixed; top: 58px; right: 10px; z-index: 5;
    display: flex; flex-direction: column; gap: 8px;
  }
  #nav button {
    width: 42px; height: 42px; border-radius: 50%; border: 0;
    background: rgba(12, 18, 26, .72); color: #dfe7f0;
    font-size: 20px; cursor: pointer; padding: 0;
  }
  #attrib {
    position: fixed; bottom: 8px; right: 10px; z-index: 5;
    font: 11px system-ui, sans-serif; color: rgba(223, 231, 240, .75);
    background: rgba(12, 18, 26, .55); border-radius: 6px; padding: 3px 8px;
  }
  #bsheet {
    position: fixed; left: 10px; right: 10px; bottom: 10px; z-index: 6;
    max-width: 420px; max-height: 45%; overflow-y: auto;
    font: 13px/1.5 system-ui, sans-serif; color: #dfe7f0;
    background: rgba(12, 18, 26, .88); border-radius: 12px;
    padding: 12px 14px; touch-action: pan-y;
  }
  #bsheet.hidden { display: none; }
  #bsheet table { border-collapse: collapse; margin-top: 6px; }
  #bsheet td { padding: 1px 10px 1px 0; vertical-align: top; }
  #bsheet td:first-child { color: rgba(223, 231, 240, .65); white-space: nowrap; }
  #bsheet a { color: #9ec7ff; }
  #bclose {
    position: absolute; top: 6px; right: 8px; border: 0; background: none;
    color: #dfe7f0; font-size: 18px; cursor: pointer; padding: 4px;
  }
  #loading {
    position: fixed; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center;
    background: #10151c; color: #dfe7f0; font: 14px system-ui, sans-serif;
    transition: opacity .4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">načítám…</div>
<label id="ctl"><input type="checkbox" id="bareToggle"> jen výšky</label>
<label id="ctl2"><input type="checkbox" id="cadToggle"> katastr</label>
<div id="nav">
  <button id="northBtn" title="Sever + nadhled">🧭</button>
  <button id="rotL" title="Otočit vlevo">⟲</button>
  <button id="rotR" title="Otočit vpravo">⟳</button>
  <button id="tiltUp" title="Více shora">⇱</button>
  <button id="tiltDown" title="Více z úhlu">⇲</button>
  <button id="homeBtn" title="Výchozí pohled">🏠</button>
</div>
<div id="bsheet" class="hidden"><button id="bclose">×</button><div id="bbody"></div></div>
<div id="attrib">Mapová data © ČÚZK (DMPOK, Ortofoto)</div>
<div id="loading"><div id="loadmsg">ČR 3D mapa — načítám dlaždice…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { MapControls } from 'three/addons/controls/MapControls.js';
import * as Lerc from 'https://cdn.jsdelivr.net/npm/lerc@4/+esm';

// iOS Safari page-pinch (proprietary gesture events) + double-tap zoom.
for (const ev of ['gesturestart', 'gesturechange', 'gestureend'])
  document.addEventListener(ev, e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

// Surface module-level failures in the overlay instead of a stuck spinner.
window.addEventListener('error', (e) => {
  const el = document.getElementById('loadmsg');
  if (el) el.innerHTML = `⚠ JS chyba: <code>${e.message}</code>`;
});

// ── Tile math (EPSG:3857 XYZ slippy) ──────────────────────────────────
const WMERC = 20037508.342789244;
// ČR data coverage; tiles fully outside are never requested.
const CR = { west: 11.8, south: 48.5, east: 19.0, north: 51.2 };
const lonToMercX = lon => lon / 180 * WMERC;
const latToMercY = lat => Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)) / Math.PI * WMERC;
const mercYToLat = y => (Math.atan(Math.exp(y / WMERC * Math.PI)) - Math.PI / 4) * 360 / Math.PI;
const tileSideMerc = z => 2 * WMERC / 2 ** z;
function lonLatToTile(lon, lat, z) {
  const n = 2 ** z;
  return {
    x: Math.floor((lon + 180) / 360 * n),
    y: Math.floor((1 - Math.asinh(Math.tan(lat * Math.PI / 180)) / Math.PI) / 2 * n),
  };
}
function tileToBBoxMerc(z, x, y) {
  const s = tileSideMerc(z);
  return { w: -WMERC + x * s, e: -WMERC + (x + 1) * s,
           n:  WMERC - y * s, s:  WMERC - (y + 1) * s };
}
function tileToBBoxWgs(z, x, y) {
  const b = tileToBBoxMerc(z, x, y);
  return { w: b.w / WMERC * 180, e: b.e / WMERC * 180,
           n: mercYToLat(b.n),   s: mercYToLat(b.s) };
}

// ── View state / URL params ───────────────────────────────────────────
const P = new URLSearchParams(location.search);
const BARE = document.getElementById('bareToggle');
BARE.checked = P.get('bare') === '1';
const startLat = parseFloat(P.get('lat') ?? '49.82');   // ČR centroid-ish
const startLon = parseFloat(P.get('lon') ?? '15.47');
const startZ   = parseFloat(P.get('z') ?? '8');
const EXAG     = parseFloat(P.get('ex') ?? '1');
// True-metre heights vs mercator-stretched horizontal: scale Y up by the
// mercator factor at ČR latitude so proportions are correct (spec kap. 2).
const Y_SCALE = (1 / Math.cos(startLat * Math.PI / 180)) * EXAG;

const ZMIN = 8, ZMAX = 18;
// Scene origin (mercator metres) — subtracted from all world coords for
// fp32 precision. Terrain Y = height * Y_SCALE above y=0 globally.
const ORIGIN = { x: lonToMercX(startLon), y: latToMercY(startLat) };
const toScene = (mx, my) => ({ x: mx - ORIGIN.x, z: -(my - ORIGIN.y) });
// Scene-space ČR bbox for the pan clamp (tick).
const CR_SCENE = {
  minX: lonToMercX(CR.west) - ORIGIN.x, maxX: lonToMercX(CR.east) - ORIGIN.x,
  minZ: -(latToMercY(CR.north) - ORIGIN.y),
  maxZ: -(latToMercY(CR.south) - ORIGIN.y),
};

// ── three.js scaffolding ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
// iOS GPUs can't linear-filter float32 textures (no OES_texture_float_linear)
// — the sampler returns 0 and terrain renders flat (2026-07-06 iPhone
// report). Half-float linear IS core WebGL2, so on such devices heights are
// uploaded as half floats relative to the tile minimum (uHBase adds the
// offset back in-shader; relative range keeps half precision ≤ ~0.25 m).
const FLOAT_LINEAR = !!renderer.extensions.get('OES_texture_float_linear')
  && P.get('half') !== '1';
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.getElementById('app').appendChild(renderer.domElement);
const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();

const scene = new THREE.Scene();
// Sky: a vertical gradient (zenith blue → horizon haze) as an equirect
// background, so tilting up shows sky instead of the old black. Paired with
// haze fog (below) so distant terrain melts into the horizon band rather
// than ending on a hard edge. Zero download — procedural canvas, unlike
// gtaol's 5 MB HDR (too heavy for the phone path).
const SKY_HAZE = 0xc4d6e6;
function skyTexture() {
  const c = document.createElement('canvas');
  c.width = 4; c.height = 512;
  const g = c.getContext('2d');
  const grd = g.createLinearGradient(0, 0, 0, 512);
  grd.addColorStop(0.00, '#c9d8e6');   // (below horizon, canvas bottom after flipY)
  grd.addColorStop(0.48, '#bcd4e6');   // horizon haze — matches fog colour
  grd.addColorStop(0.55, '#8fb6da');
  grd.addColorStop(1.00, '#4a80c4');   // zenith
  g.fillStyle = grd; g.fillRect(0, 0, 4, 512);
  const t = new THREE.CanvasTexture(c);
  t.mapping = THREE.EquirectangularReflectionMapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
scene.background = skyTexture();
// Fog density is recomputed every frame from the camera's orbit distance
// (see tick). A FIXED FogExp2 density that looked right up close washed the
// WHOLE country to solid haze when zoomed out — the camera is then 10s–100s
// of km from terrain, past the e-fold distance, so every tile renders as the
// haze colour ("mapa nejde vidět"). Scaling density ~ FOG_K/dist keeps the
// e-fold a constant fraction of the view distance at any zoom. ?fog= tunes
// the coefficient, ?fog=0 disables.
const _fogK = parseFloat(P.get('fog'));
const FOG_K = Number.isFinite(_fogK) ? _fogK : 0.07;
scene.fog = new THREE.FogExp2(SKY_HAZE, 0);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 5, 4.0e6);
// Distance heuristic: z=8 frames all of ČR, each zoom halves it.
const startDist = 450000 * 2 ** (8 - startZ);
camera.position.set(0, startDist * 0.85, startDist * 0.55);

const controls = new MapControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.maxPolarAngle = 1.45;                 // keep camera above horizon
controls.minDistance = 150;
controls.maxDistance = 900000;
controls.zoomToCursor = true;   // zoom onto what the cursor/finger points at
controls.update();

// ── Google-Maps-style touch gestures ──────────────────────────────────
// MapControls keeps mouse; touch is fully custom and ground-anchored like
// the phone-map convention: one finger grabs the ground (the point under
// the finger stays under it), pinch zooms onto the fingers, twist rotates
// around them, two-finger parallel vertical drag tilts, double-tap zooms
// in on the tap, two-finger tap zooms out, double-tap-then-drag zooms,
// a released pan keeps inertia.
controls.touches.ONE = -1;      // unknown value → controls ignore touch
controls.touches.TWO = -1;
const UP = new THREE.Vector3(0, 1, 0);
const gestureRay = new THREE.Raycaster();
let camAnim = null;   // {cam0,tgt0,cam1,tgt1,start} 250 ms ease-out (tick)
let panVel = null;    // scene-units/s inertia after a released pan (tick)

// Screen px → point on the horizontal plane y=h (null: ray misses/near sky).
function groundPoint(px, py, h) {
  gestureRay.setFromCamera(new THREE.Vector2(px / innerWidth * 2 - 1,
                                             1 - py / innerHeight * 2), camera);
  const t = (h - gestureRay.ray.origin.y) / gestureRay.ray.direction.y;
  return (t > 0 && t < 3e6)
    ? gestureRay.ray.origin.clone().addScaledVector(gestureRay.ray.direction, t)
    : null;
}
// Ground anchor under a screen point: intersect at the view-centre terrain
// height, then re-intersect at the terrain height found there (2 passes).
function terrainPoint(px, py) {
  const h0 = (terrainH(controls.target.x, controls.target.z) ?? 0) * Y_SCALE;
  let p = groundPoint(px, py, h0);
  if (!p) return null;
  const th = terrainH(p.x, p.z);
  if (th !== null) p = groundPoint(px, py, th * Y_SCALE) ?? p;
  return p;
}
// Surface pick for building selection: ray-march the DSM heightfield so a
// tap on a tall building hits its NEAR FACE, not the ground plane behind it
// (the plane intersect terrainPoint() uses sails over a tilted building).
// The mesh is displaced GPU-side — CPU geometry is flat — so intersectObjects
// can't see the blobs; we march terrainH() (coarse hGrid, includes buildings)
// instead. The hit point's x/z IS the plumb drop to the footprint; the
// building-detail query's 5 m tolerance absorbs the DSM blob's slight lean.
function pickSurface(px, py) {
  gestureRay.setFromCamera(new THREE.Vector2(px / innerWidth * 2 - 1,
                                             1 - py / innerHeight * 2), camera);
  const o = gestureRay.ray.origin, d = gestureRay.ray.direction;
  const plane = terrainPoint(px, py);            // fallback + distance bound
  const tMax = plane ? Math.min(o.distanceTo(plane) * 1.25, 6e5) : 6e5;
  const step = Math.max(3, tMax / 3000);         // <~building width, ≤3000 steps
  const surfY = (t) => {
    const h = terrainH(o.x + d.x * t, o.z + d.z * t);
    return h === null ? null : h * Y_SCALE;
  };
  let prev = 0;
  for (let t = step; t <= tMax; t += step) {
    const sy = surfY(t);
    if (sy === null) { prev = t; continue; }     // no tile data → keep marching
    if (o.y + d.y * t <= sy) {                    // ray went under surface in (prev,t]
      let lo = prev, hi = t;
      for (let i = 0; i < 14; i++) {
        const m = (lo + hi) / 2, msy = surfY(m);
        if (msy === null || o.y + d.y * m > msy) lo = m; else hi = m;
      }
      return o.clone().addScaledVector(d, hi);
    }
    prev = t;
  }
  return plane;                                   // no blob hit → plane result
}
function clampView() {
  const sph = new THREE.Spherical()
    .setFromVector3(camera.position.clone().sub(controls.target));
  sph.radius = Math.min(Math.max(sph.radius, controls.minDistance),
                        controls.maxDistance);
  sph.phi = Math.min(Math.max(sph.phi, 0.05), controls.maxPolarAngle);
  camera.position.copy(controls.target)
                 .add(new THREE.Vector3().setFromSpherical(sph));
  camera.lookAt(controls.target);
}
// Animated zoom about an anchor: scaling both camera and target towards A
// keeps A fixed on screen — double-tap recentres halfway onto the tap
// exactly like Google Maps. f<1 zooms in, f>1 out.
function startZoomAnim(f, anchor = null) {
  const A = anchor ?? controls.target.clone();
  const cam1 = A.clone().addScaledVector(camera.position.clone().sub(A), f);
  const tgt1 = A.clone().addScaledVector(controls.target.clone().sub(A), f);
  const off = cam1.clone().sub(tgt1);
  const d = Math.min(Math.max(off.length(), controls.minDistance),
                     controls.maxDistance);
  cam1.copy(tgt1).addScaledVector(off.normalize(), d);
  camAnim = { cam0: camera.position.clone(), tgt0: controls.target.clone(),
              cam1, tgt1, start: performance.now() };
}
{
  const el = renderer.domElement;
  const tp = new Map();     // pointerId → [x, y]
  let tapTimer = 0;         // pending single-tap → building info
  let mode = null;          // 'pan' | 'tilt' | 'pinch' | 'dtd' | null
  let panAnchor = null;     // grabbed ground point (one-finger pan)
  let panTrace = [];        // recent [t, dx, dz] world deltas → flick inertia
  let press = null;         // {t, x, y} of the single-finger down (tap detect)
  let lastTap = null;       // {t, x, y} of the last completed tap
  let dtdY = 0, dtdMoved = false;   // double-tap-drag state
  let g = null;             // two-finger state {d,a,mx,my, d0,a0,mx0,my0, anchor,t0,moved}
  const wrapPi = a => a > Math.PI ? a - 2 * Math.PI
               : a < -Math.PI ? a + 2 * Math.PI : a;

  el.addEventListener('pointerdown', e => {
    if (e.pointerType !== 'touch') return;
    tp.set(e.pointerId, [e.clientX, e.clientY]);
    camAnim = panVel = null;          // a touch interrupts any animation
    // Any new touch cancels a pending info-tap — otherwise a pan/pinch
    // started within the 320 ms window pops the card mid-gesture at the
    // old tap point. (The dtd branch re-clears; harmless.)
    clearTimeout(tapTimer);
    if (tp.size === 1) {
      press = { t: performance.now(), x: e.clientX, y: e.clientY };
      if (lastTap && press.t - lastTap.t < 300 &&
          Math.hypot(e.clientX - lastTap.x, e.clientY - lastTap.y) < 30) {
        mode = 'dtd';                 // second tap: zoom on release, or
        dtdY = e.clientY; dtdMoved = false;   // drag-to-zoom if it moves
        clearTimeout(tapTimer);       // it's a double-tap, not an info tap
      } else {
        mode = 'pan';
        panAnchor = terrainPoint(e.clientX, e.clientY);
        panTrace = [];
      }
    } else if (tp.size === 2) {
      const [p1, p2] = [...tp.values()];
      const mx = (p1[0] + p2[0]) / 2, my = (p1[1] + p2[1]) / 2;
      const d = Math.max(Math.hypot(p1[0] - p2[0], p1[1] - p2[1]), 1);
      const a = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
      g = { d, a, mx, my, start: new Map([...tp].map(([k, v]) => [k, [...v]])),
            // near-horizon rays miss the ground → fall back to the orbit
            // target so pinch/twist never go dead
            anchor: terrainPoint(mx, my) ?? controls.target.clone(),
            t0: performance.now(), moved: false };
      mode = null;                    // undecided: pinch vs tilt vs 2-finger tap
      panAnchor = null; press = null;
    } else { mode = null; g = null; }
  });

  el.addEventListener('pointermove', e => {
    if (!tp.has(e.pointerId)) return;
    tp.set(e.pointerId, [e.clientX, e.clientY]);

    if (tp.size === 1 && mode === 'dtd') {
      // Google's one-finger zoom: double-tap, hold, drag down = in, up = out
      const dy = e.clientY - dtdY; dtdY = e.clientY;
      if (Math.abs(dy) > 1) dtdMoved = true;
      const s = Math.exp(-dy * 0.006);
      const T = controls.target;
      camera.position.sub(T).multiplyScalar(s).add(T);
      clampView();
      return;
    }
    if (tp.size === 1 && mode === 'pan' && panAnchor) {
      const p = groundPoint(e.clientX, e.clientY, panAnchor.y);
      if (!p) return;
      const d = panAnchor.clone().sub(p);   // world follows the finger
      camera.position.add(d); controls.target.add(d);
      const now = performance.now();
      panTrace.push([now, d.x, d.z]);
      while (panTrace.length && now - panTrace[0][0] > 120) panTrace.shift();
      return;
    }
    if (tp.size !== 2 || !g) return;
    const [p1, p2] = [...tp.values()];
    const d = Math.max(Math.hypot(p1[0] - p2[0], p1[1] - p2[1]), 1);
    const a = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
    const mx = (p1[0] + p2[0]) / 2, my = (p1[1] + p2[1]) / 2;

    if (mode !== 'tilt' && mode !== 'pinch') {
      // Disambiguate once, then lock for the gesture (Google behaviour).
      // Touch events arrive one finger at a time, so distance/angle deltas
      // are transient noise — classify by the per-finger displacement
      // vectors instead: parallel & mostly vertical = tilt; any relative
      // motion (pinch/twist) or a parallel sideways drag = pinch mode
      // (whose anchor correction also covers two-finger pan).
      const [v1, v2] = [...tp].map(([id, p]) => {
        const s = g.start.get(id) ?? p;
        return [p[0] - s[0], p[1] - s[1]];
      });
      const rel = Math.hypot(v1[0] - v2[0], v1[1] - v2[1]);
      const ax = (v1[0] + v2[0]) / 2, ay = (v1[1] + v2[1]) / 2;
      const avg = Math.hypot(ax, ay);
      // Tilt is tested FIRST and with slack: a real vertical two-finger
      // drag is sloppy (fingers converge a bit, one leads) and kept
      // falling into pinch mode where it reads as pan ("interpretuje
      // náklon jako pohyb", 2026-07-10). Same vertical direction + mostly
      // vertical + relative motion clearly smaller than common motion.
      if (v1[1] * v2[1] > 0 && Math.abs(ay) > 8 &&
          Math.abs(ay) > 1.2 * Math.abs(ax) && rel < 0.8 * avg)
        mode = 'tilt';
      else if (rel > 15 || avg > 20) mode = 'pinch';
      if (mode) g.moved = true;
    }
    if (mode === 'tilt') {
      // fingers up = tilt towards the horizon (Google convention)
      const sph = new THREE.Spherical()
        .setFromVector3(camera.position.clone().sub(controls.target));
      sph.phi = Math.min(Math.max(sph.phi - (my - g.my) * 0.005, 0.05),
                         controls.maxPolarAngle);
      camera.position.copy(controls.target)
                     .add(new THREE.Vector3().setFromSpherical(sph));
      camera.lookAt(controls.target);
    } else if (mode === 'pinch' && g.anchor) {
      const A = g.anchor;
      // twist rotates the world around the ground point between the fingers
      const da = wrapPi(a - g.a);
      camera.position.sub(A).applyAxisAngle(UP, da).add(A);
      controls.target.sub(A).applyAxisAngle(UP, da).add(A);
      // pinch scales about the same point (spread = zoom in)
      const s = g.d / d;
      camera.position.sub(A).multiplyScalar(s).add(A);
      controls.target.sub(A).multiplyScalar(s).add(A);
      camera.lookAt(controls.target);
      // keep the anchor pinned under the (possibly moving) midpoint —
      // this is what makes pinch zoom onto the fingers, not view centre
      const p = groundPoint(mx, my, A.y);
      if (p) {
        const sh = A.clone().sub(p);
        camera.position.add(sh); controls.target.add(sh);
      }
      clampView();
    }
    g.d = d; g.a = a; g.mx = mx; g.my = my;
  });

  const endTp = e => {
    if (!tp.has(e.pointerId)) return;
    const n = tp.size;
    tp.delete(e.pointerId);
    const now = performance.now();
    if (n === 2) {
      // quick two-finger tap with no movement = zoom out (Google)
      if (g && !g.moved && now - g.t0 < 250) startZoomAnim(2);
      g = null; lastTap = null;
      if (tp.size === 1) {          // hand the surviving finger over to pan
        const [p] = [...tp.values()];
        mode = 'pan'; panAnchor = terrainPoint(p[0], p[1]); panTrace = [];
        press = null;
      } else mode = null;
      return;
    }
    if (mode === 'dtd') {
      if (!dtdMoved)                // clean double-tap: zoom in on the tap
        startZoomAnim(0.5, terrainPoint(e.clientX, e.clientY));
      lastTap = null; mode = null;
      return;
    }
    if (mode === 'pan') {
      const isTap = press && now - press.t < 250 &&

// Unit tile in XZ: x=[-0.5,0.5] west→east, z=[-0.5,0.5] north→south.
// uv.v = 0 at the north edge = LERC/JPEG raster row 0 (flipY=false).

// display (phone/retina) the 384 css-px split threshold means 768 device
// px over a 512^2 texture — refining 1.8× more tiles than the eye can
// resolve. 288 css px is ~1:1 texel per device px: same sharpness, fewer

  for (let i = SEG; i > 0; i--) perim.push((n - 1) * n + i);          // S edge E→W
  for (let j = SEG; j > 0; j--) perim.push(j * n);                    // W edge S→N

      pos[vi * 3] = u - 0.5; pos[vi * 3 + 2] = v - 0.5;
      uv[vi * 2] = u; uv[vi * 2 + 1] = v;

  perim.forEach((src, k) => {
    const vi = gridCount + k;

            const k = t.z - anc.z, s = 1 / 2 ** k;
            u.uCad.value = anc.cadTex; u.uHasCad.value = 1;
            u.uCadUv.value.set((t.x - (anc.x << k)) * s, (t.y - (anc.y << k)) * s, s);
          } else u.uHasCad.value = 0;
        }
      } else if (u.uHasCad.value) u.uHasCad.value = 0;
    }
    if (!t.orthoTex && !BARE.checked) {
      t.requestOrtho();   // no-op unless a backlog drop reset the request
      let anc = null, az = t.z;
      while (--az >= ZMIN) {
        const c = tiles.get(`${az}/${t.x >> (t.z - az)}/${t.y >> (t.z - az)}`);
        if (c?.orthoTex) { anc = c; break; }
      }
      const u = t.mesh.material.uniforms;
      if (anc) {
        const k = t.z - anc.z, s = 1 / 2 ** k;
        u.uOrtho.value = anc.orthoTex;
        u.uHasOrtho.value = 1;
        u.uOrthoUv.value.set((t.x - (anc.x << k)) * s,
                             (t.y - (anc.y << k)) * s, s);
      } else u.uHasOrtho.value = 0;
    }
  }
  shown = next;
}

// Predictive prefetch: when the fetch queue is idle, warm tiles the camera
// is heading towards at low priority, so movement reveals ready tiles
// instead of loading ones. Two predictors: pan (target velocity, ~1.5 s
// ahead) and zoom-in (camera distance shrinking → next-finer level under
// the view centre; the pan predictor never fires for zoom because the
// target barely moves during the most common gesture).
const prevTarget = new THREE.Vector3();
let prevDist = 0;
function warm3x3(z, mx, my) {
  const n = 2 ** z;
  const tx = Math.floor((mx + WMERC) / (2 * WMERC) * n);
  const ty = Math.floor((WMERC - my) / (2 * WMERC) * n);
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const t = getTile(z, tx + dx, ty + dy);
      if (t.state === 'idle' && t.inCR) enqueue(t, 1e6);  // behind real work
    }
  }
}
function prefetch() {
  const v = controls.target.clone().sub(prevTarget);
  prevTarget.copy(controls.target);
  const dist = camera.position.distanceTo(controls.target);
  const zoomIn = prevDist > 0 && dist < prevDist * 0.997;
  prevDist = dist;
  if (pending.length || inflight > 1) return;   // only when idle
  if (zoomIn && visZMax && visZMax < ZMAX)
    warm3x3(visZMax + 1,
            controls.target.x + ORIGIN.x, ORIGIN.y - controls.target.z);
  if (v.length() < 2) return;                   // camera not really panning
  const ahead = controls.target.clone().addScaledVector(v, 90); // ~1.5 s @60fps
  warm3x3(Math.min(visZMax || ZMIN, ZMAX),
          ahead.x + ORIGIN.x, ORIGIN.y - ahead.z);
}

// Terrain height (m) under a scene-space point, from the finest cached
// tile — nearest sample of the 32² CPU grids kept for this purpose.
function terrainH(sx, sz) {
  const mx = sx + ORIGIN.x, my = ORIGIN.y - sz;
  for (let z = Math.min(visZMax || ZMIN, ZMAX); z >= ZMIN; z--) {
    const n = 2 ** z;
    const tx = Math.floor((mx + WMERC) / (2 * WMERC) * n);
    const ty = Math.floor((WMERC - my) / (2 * WMERC) * n);
    const t = tiles.get(`${z}/${tx}/${ty}`);
    if (!t?.hGrid) continue;
    const b = tileToBBoxMerc(z, tx, ty);
    const G = 32;
    const gx = Math.min(G - 1, Math.floor((mx - b.w) / (b.e - b.w) * G));
    const gy = Math.min(G - 1, Math.floor((b.n - my) / (b.n - b.s) * G));
    return t.hGrid[gy * G + gx];
  }
  return null;
}

// Evict ready tiles untouched for ~5 s once over the mesh budget (roots
// stay). Budget counts READY tiles — the tiles map also holds thousands
// of idle/empty metadata stubs, and budgeting on tiles.size meant every
// ready tile idle >2 s was disposed each sweep: constant refetch churn
// (HUD "fetche 2612" for ~200 visible tiles, 2026-07-06).
// Scaled by device RAM where the browser reports it (Chrome; Safari gets
// the 4 GB default): 150 tiles on a 2 GB phone, 600 on an 8 GB desktop.
const CACHE_MAX = Math.round(
  300 * Math.min(2, Math.max(0.5, (navigator.deviceMemory ?? 4) / 4)));
function evict() {
  if (stats.ready <= CACHE_MAX) return;
  const candidates = [...tiles.values()]
    .filter(t => t.z > ZMIN && t.state === 'ready' && frame - (t.lastUsed ?? 0) > 300)
    .sort((a, b) => (a.lastUsed ?? 0) - (b.lastUsed ?? 0));
  for (const t of candidates.slice(0, stats.ready - CACHE_MAX)) t.dispose();
}

// ── Main loop ─────────────────────────────────────────────────────────
const hud = document.getElementById('hud');
const loading = document.getElementById('loading');
let frame = 0, firstRendered = false;

await Lerc.load();
window.__map3d = { tiles, stats, camera, controls };   // debug console handle

BARE.addEventListener('change', () => {
  const v = BARE.checked ? 1 : 0;
  for (const t of tiles.values())
    if (t.mesh) {
      t.mesh.material.uniforms.uBare.value = v;
      if (!BARE.checked) t.requestOrtho();  // bare mode skipped the fetch
    }
});

CAD.addEventListener('change', () => {
  // applyVisibility binds/unbinds uCad and resolves inheritance each frame;
  // just kick fetches for on-screen tiles now so the overlay appears without
  // waiting for the next camera move.
  if (CAD.checked)
    for (const t of tiles.values())
      if (t.mesh?.visible && !t.cadTex) t.requestCad();
});

let lastTick = performance.now();
function tick() {
  requestAnimationFrame(tick);
  frame++;
  const nowT = performance.now();
  const dt = Math.min((nowT - lastTick) / 1000, 0.1);
  lastTick = nowT;
  controls.update();
  if (camAnim) {          // tap-zoom / compass / home flight, ease-out
    const k = Math.min((nowT - camAnim.start) / (camAnim.dur ?? 250), 1);
    const ease = 1 - (1 - k) ** 2;
    camera.position.lerpVectors(camAnim.cam0, camAnim.cam1, ease);
    controls.target.lerpVectors(camAnim.tgt0, camAnim.tgt1, ease);
    camera.lookAt(controls.target);
    if (k >= 1) camAnim = null;
  }
  if (panVel) {           // flick inertia, exponential decay ~0.5 s
    camera.position.addScaledVector(panVel, dt);
    controls.target.addScaledVector(panVel, dt);
    panVel.multiplyScalar(Math.exp(-dt * 5));
    if (panVel.length() < camera.position.distanceTo(controls.target) * 0.02)
      panVel = null;
  }
  // Keep the view over the data: panning/flicking beyond the ČR bbox left
  // the user stranded over the void ("úplně jsem se ztratil", 2026-07-10).
  // Clamp the orbit target and drag the camera along by the same delta.
  {
    const cx = Math.min(Math.max(controls.target.x, CR_SCENE.minX), CR_SCENE.maxX);
    const cz = Math.min(Math.max(controls.target.z, CR_SCENE.minZ), CR_SCENE.maxZ);
    if (cx !== controls.target.x || cz !== controls.target.z) {
      camera.position.x += cx - controls.target.x;
      camera.position.z += cz - controls.target.z;
      controls.target.x = cx; controls.target.z = cz;
      panVel = null;
    }
  }
  // Ground clamp: flying under the map showed mesh undersides/skirts and
  // flickered during movement (2026-07-07 report). DSM includes canopy
  // and buildings, so +20 m clears local obstacles too.
  const th = terrainH(camera.position.x, camera.position.z);
  const floorY = th === null ? 5 : (th + 20) * Y_SCALE;
  if (camera.position.y < floorY) camera.position.y = floorY;
  // Distance-scaled haze: e-fold at a fixed fraction of the orbit distance,
  // so a zoomed-out country view stays clear while a close/tilted view melts
  // the far terrain into the horizon. Capped so a street-level view can't
  // over-haze.
  if (FOG_K > 0) {
    const camDist = camera.position.distanceTo(controls.target);
    scene.fog.density = Math.min(3e-4, FOG_K / Math.max(camDist, 1));
  }
  projView.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
  frustum.setFromProjectionMatrix(projView);
  const show = [];
  for (const r of roots) selectNode(r, show);
  applyVisibility(show);
  prefetch();
  pump();
  if (frame % 120 === 0) evict();
  renderer.render(scene, camera);

  // visCount, not stats.ready: heights decode before the first ortho JPEG
  // lands, and hasOrthoPath keeps those tiles hidden — overlay would drop
  // onto a black screen.
  if (!firstRendered && visCount > 0) {
    firstRendered = true;
    loading.classList.add('hidden');
  }
  // Pre-bake of z=8..13 may still be running server-side; explain instead
  // of spinning forever when every visible tile 404s.
  if (!firstRendered && frame === 400 && stats.ready === 0 && stats.empty > 0) {
    document.getElementById('loadmsg').innerHTML =
      'Nízké zoomy se na serveru ještě dopočítávají —<br>' +
      'zkuste detail, např. <code>?lat=49.62&lon=17.29&z=15</code>';
  }
  if (frame % 15 === 0) {
    const zInfo = visCount
      ? (visZMin === visZMax ? `z=${visZMin}` : `z=${visZMin}–${visZMax}`)
      : 'z=—';
    // GPU memory of the streamed model: height textures + ortho textures
    // (×1.33 for mipmaps). Shared geometry is a single ~1.3 MB buffer.
    let gpu = 0;
    const hBytes = FLOAT_LINEAR ? 4 : 2;
    for (const t of tiles.values()) {
      if (t.heightTex) gpu += 256 * 256 * hBytes;
      if (t.orthoTex) {
        const im = t.orthoTex.image;
        gpu += (im?.width ?? 512) * (im?.height ?? 512) * 4 * 1.33;
      }
    }
    const jsHeap = performance.memory
      ? ` · JS ${(performance.memory.usedJSHeapSize / 1048576).toFixed(0)} MB`
      : '';
    // HD = on-screen tiles with a 512^2 texture (0.20 m/px @2x pass or
    // hires WMS cut) — quick check that the rebaked tiles actually render.
    let hd = 0;
    for (const t of shown) if ((t.orthoTex?.image?.width ?? 0) >= 512) hd++;
    hud.textContent =
      `zoom ${zInfo} · ${visCount} dlaždic na obrazovce` +
      (hd ? ` · ${hd} HD` : '') + `\n` +
      `${stats.ready} ready · ${pending.length + inflight} načítá` +
      ` · ortho ${orthoInflight + orthoBacklog.length}` +
      ` · ${stats.empty} prázdné\n` +
      `cache ${tiles.size} · fetche ${stats.fetches}` +
      (stats.failed ? ` · chyby ${stats.failed}` : '') +
      `\nGPU ${(gpu / 1048576).toFixed(0)} MB${jsHeap}`;
  }
}
tick();
</script>
</body>
</html>
